<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payouts - Spekto Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    :root { --purple: #560591; --tint: #F5EEFF; --bg: #F7F5FA; --border: #EEE; --dark: #1A0533; --green: #22C55E; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; }
    .shell { display: flex; min-height: 100vh; }
    .sidebar { width: 230px; background: var(--dark); display: flex; flex-direction: column; padding: 24px 0; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .s-mark { width: 34px; height: 34px; background: rgba(255,255,255,0.1); border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .s-name { font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -1px; }
    .admin-tag { font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }
    .nav-section { padding: 16px 12px 4px; }
    .nav-section-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.5px; padding: 0 8px; margin-bottom: 4px; }
    .nav { display: flex; flex-direction: column; gap: 1px; padding: 0 12px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 7px; font-size: 13px; color: rgba(255,255,255,0.55); font-weight: 500; text-decoration: none; transition: all 0.15s; }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.12); color: #fff; }
    .nav-item i { font-size: 16px; flex-shrink: 0; }
    .nav-badge { margin-left: auto; background: #DC2626; color: #fff; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
    .sidebar-foot { margin-top: auto; padding: 12px; border-top: 1px solid rgba(255,255,255,0.08); }
    .admin-user { display: flex; align-items: center; gap: 10px; padding: 8px 12px; }
    .admin-avatar { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .admin-info { flex: 1; min-width: 0; }
    .admin-name-s { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .admin-role-s { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 1px; }
    .btn-logout-sm { width: 28px; height: 28px; background: rgba(255,255,255,0.08); border: none; border-radius: 6px; color: rgba(255,255,255,0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .main { flex: 1; margin-left: 230px; display: flex; flex-direction: column; min-width: 0; }
    .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; flex-wrap: wrap; gap: 10px; }
    .topbar-title { font-size: 17px; font-weight: 700; color: #0D0D0D; }
    .content { padding: 24px 28px; }
    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 18px; }
    .stat-label { font-size: 11px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
    .stat-val { font-size: 24px; font-weight: 800; color: #0D0D0D; font-family: 'DM Sans', sans-serif; letter-spacing: -0.5px; }
    .stat-val.green { color: #166534; }
    /* Next batch card */
    .next-batch-card { background: var(--dark); border-radius: 14px; padding: 22px 26px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .batch-info { display: flex; flex-direction: column; gap: 4px; }
    .batch-title { font-size: 16px; font-weight: 700; color: #fff; }
    .batch-sub { font-size: 13px; color: rgba(255,255,255,0.5); }
    .batch-stats { display: flex; gap: 24px; }
    .batch-stat { text-align: right; }
    .batch-stat-val { font-size: 22px; font-weight: 800; color: #fff; font-family: 'DM Sans', sans-serif; }
    .batch-stat-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .btn-process { height: 44px; background: var(--green); color: #fff; border: none; border-radius: 10px; padding: 0 24px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 8px; }
    .btn-process:disabled { opacity: 0.5; cursor: not-allowed; }
    /* Tab bar */
    .tab-bar { display: flex; gap: 4px; background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 6px; margin-bottom: 20px; overflow-x: auto; }
    .tab-btn { flex-shrink: 0; padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; color: #666; background: transparent; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .tab-btn.active { background: var(--purple); color: #fff; }
    .tab-count { font-size: 11px; font-weight: 700; padding: 1px 6px; border-radius: 10px; background: rgba(255,255,255,0.25); }
    .tab-btn:not(.active) .tab-count { background: #F3F4F6; color: #374151; }
    .tab-count.alert { background: #DC2626; color: #fff; }
    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    /* Row styles */
    .payout-row { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
    .payout-row.on-hold { border-left: 3px solid #FCA5A5; }
    .scout-av { width: 38px; height: 38px; border-radius: 50%; background: #EDE4F7; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #560591; flex-shrink: 0; }
    .row-info { flex: 1; min-width: 0; }
    .row-name { font-size: 14px; font-weight: 600; color: #0D0D0D; }
    .row-sub { font-size: 12px; color: #999; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-amount { font-size: 18px; font-weight: 800; color: #0D0D0D; font-family: 'DM Sans', sans-serif; flex-shrink: 0; }
    .row-amount.hold { color: #854D0E; }
    .row-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    /* Badges */
    .badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; display: inline-block; }
    .badge-OnHold { background: #FEE2E2; color: #991B1B; }
    .badge-Processing { background: #E0F2FE; color: #0369A1; }
    .badge-Paid { background: #DCFCE7; color: #166534; }
    .badge-Processed { background: #DCFCE7; color: #166534; }
    .badge-Failed { background: #FEE2E2; color: #991B1B; }
    /* Batch table */
    .batch-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
    .batch-table th { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.4px; padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    .batch-table td { font-size: 13px; color: #0D0D0D; padding: 13px 16px; border-bottom: 1px solid #F9F9F9; }
    .batch-table tr:last-child td { border-bottom: none; }
    /* Misc */
    .empty-state { text-align: center; padding: 40px 20px; background: #fff; border-radius: 14px; border: 1px solid var(--border); }
    .empty-state i { font-size: 32px; color: #ddd; margin-bottom: 10px; display: block; }
    .empty-state p { font-size: 13px; color: #999; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: #999; font-size: 14px; gap: 10px; }
    .spinner { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #E0E0E0; border-top-color: var(--purple); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1F2937; color: #fff; font-size: 13px; font-weight: 500; padding: 12px 20px; border-radius: 10px; z-index: 999; display: none; }
    .toast.success { background: #166534; }
    .toast.error { background: #991B1B; }
    .admin-receipt-btn { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--purple); background: none; border: none; padding: 0; cursor: pointer; font-family: 'Inter', sans-serif; white-space: nowrap; }
    .admin-receipt-btn:hover { text-decoration: underline; }
    .ref-tag { display: inline-block; font-size: 10px; font-weight: 600; color: #999; background: #F3F4F6; border-radius: 5px; padding: 1px 6px; margin-left: 6px; white-space: nowrap; vertical-align: middle; }
    .batch-ref-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; color: #6B7280; background: #F3F4F6; border-radius: 4px; padding: 2px 6px; margin-left: 4px; font-family: 'Inter', sans-serif; letter-spacing: 0.2px; white-space: nowrap; vertical-align: middle; }
    .batch-filter-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--purple); background: #F5EEFF; border: 1px solid #D8B4FE; border-radius: 20px; padding: 4px 12px; margin-bottom: 14px; cursor: pointer; user-select: none; }
    .batch-filter-chip .chip-x { font-size: 14px; line-height: 1; font-weight: 700; margin-left: 2px; opacity: 0.7; }
    .batch-filter-chip:hover .chip-x { opacity: 1; }
    .batch-table tr[data-batchref] { cursor: pointer; }
    .batch-table tr[data-batchref]:hover td { background: #F5EEFF; }
    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #B0B0B0; pointer-events: none; }
    .search-input { width: 100%; height: 40px; border: 1.5px solid #E0E0E0; border-radius: 8px; padding: 0 14px 0 38px; font-size: 13px; font-family: 'Inter', sans-serif; outline: none; background: #fff; color: #0D0D0D; }
    .search-input:focus { border-color: var(--purple); }
    .menu-toggle { display: none; width: 36px; height: 36px; border: none; background: transparent; cursor: pointer; align-items: center; justify-content: center; border-radius: 8px; padding: 0; flex-shrink: 0; }
    .menu-toggle i { font-size: 22px; color: #555; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 99; }
    .sidebar-overlay.open { display: block; }
    @media (max-width: 768px) {
      .menu-toggle { display: flex; }
      .sidebar { transform: translateX(-230px); transition: transform 0.25s ease; }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .content { padding: 16px; }
      .topbar { padding: 14px 16px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div class="shell">

      <div class="topbar-title">Payouts</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient(
    'https://nyvnvtxhlnjvfhcmnihh.supabase.co',
    'sb_publishable_AZSoskR9Ou8e-rl0QlPWUg_vOehXCRL'
  )

  let pendingInspections = []
  let adminData = null
  let completedPayoutItems = []
  let activeBatchFilter = null
  const adminReceiptItemsById = new Map()

  function printAdminReceipt(item) {
    const u = item.scout
    const insp = item.inspections
    const amount = parseFloat(item.amount) || 0
    const paidDate = item.paid_at || item.updated_at
    const dateStr = paidDate ? new Date(paidDate).toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' }) : '—'
    const nameStr = u ? `${u.first_name || ''} ${u.last_name || ''}`.trim() : 'Unknown Scout'
    const addr = insp?.address || '—'
    const refNum = insp?.ref_number || (item.id || '').substring(0, 8).toUpperCase()
    const transferId = item.stripe_transfer_id || ''

    const w = window.open('', '_blank', 'width=760,height=920')
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Spekto Payout Receipt ${refNum}</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;color:#0D0D0D;padding:60px;max-width:680px;margin:0 auto}
.logo{font-family:'DM Sans',sans-serif;font-size:26px;font-weight:800;color:#560591;letter-spacing:-1.5px}
.receipt-type{font-size:12px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:48px}
.ref-num{font-size:16px;font-weight:700;text-align:right}
.ref-date{font-size:13px;color:#999;margin-top:3px;text-align:right}
.bill-section{margin-bottom:40px}
.bill-label{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.bill-name{font-size:15px;font-weight:600}
.divider{border:none;border-top:1.5px solid #E5E7EB;margin-bottom:0}
.line-item{display:flex;justify-content:space-between;gap:24px;padding:20px 0;border-bottom:1px solid #F3F4F6}
.item-title{font-size:14px;font-weight:600}
.item-addr{font-size:12px;color:#999;margin-top:4px}
.item-amt{font-size:15px;font-weight:700;white-space:nowrap}
.total-row{display:flex;justify-content:space-between;align-items:baseline;padding:20px 0}
.total-label{font-size:14px;font-weight:700}
.total-amt{font-size:24px;font-weight:800;font-family:'DM Sans',sans-serif;color:#560591}
.status-pill{display:inline-flex;align-items:center;gap:6px;background:#DCFCE7;color:#166534;font-size:12px;font-weight:600;padding:4px 14px;border-radius:20px;margin-bottom:16px}
.dot{width:7px;height:7px;border-radius:50%;background:#22C55E;display:inline-block}
.transfer-note{font-size:12px;color:#999;margin-bottom:32px;font-family:monospace}
.gst-note{font-size:12px;color:#999;margin-bottom:40px}
.footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid #F3F4F6;padding-top:20px}
.footer-logo{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:800;color:#560591;letter-spacing:-1px}
.footer-note{font-size:11px;color:#bbb}
@media print{body{padding:24px}}
</style></head><body>
<div class="header">
  <div><div class="logo">SPEKTO</div><div class="receipt-type">Payout Receipt — Admin Copy</div></div>
  <div><div class="ref-num">#${refNum}</div><div class="ref-date">${dateStr}</div></div>
</div>
<div class="bill-section">
  <div class="bill-label">Paid To (Scout)</div>
  <div class="bill-name">${nameStr}</div>
</div>
<hr class="divider">
<div class="line-item">
  <div><div class="item-title">Scout payout — Property Inspection</div><div class="item-addr">${addr}</div></div>
  <div class="item-amt">$${amount.toFixed(2)}</div>
</div>
<div class="total-row">
  <div class="total-label">Total Paid</div>
  <div class="total-amt">$${amount.toFixed(2)}</div>
</div>
<div class="status-pill"><span class="dot"></span>Paid</div>
${transferId ? `<div class="transfer-note">Stripe transfer: ${transferId}</div>` : ''}
<div class="gst-note">No GST applicable — Spekto is not currently GST registered.</div>
<div class="footer">
  <div class="footer-logo">SPEKTO</div>
  <div class="footer-note">Generated ${new Date().toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'})}</div>
</div>
<script>window.onload=()=>{window.focus();window.print()}<\/script>
</body></html>`)
    w.document.close()
  }

  // ── helpers ────────────────────────────────────────────────────────────────

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.className = `toast ${type}`
    t.style.display = 'block'
    setTimeout(() => { t.style.display = 'none' }, 3500)
  }

  function getNextTuesday() {
    const now = new Date()
    const day = now.getDay()
    const daysUntil = (2 - day + 7) % 7 || 7
    const tuesday = new Date(now)
    tuesday.setDate(now.getDate() + daysUntil)
    return tuesday.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })
  }

  function fmtDate(str) {
    if (!str) return '—'
    return new Date(str).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' })
  }

  function scoutInitials(u) {
    if (!u) return '?'
    return ((u.first_name?.[0] || '') + (u.last_name?.[0] || '')).toUpperCase() || '?'
  }

  function scoutName(u) {
    if (!u) return 'Unknown Scout'
    return (u.first_name || '') + ' ' + (u.last_name || '')
  }

  function payout(insp) {
    const v = parseFloat(insp?.pricing_snapshot?.pay_to_scout)
    return isNaN(v) ? '—' : '$' + v.toFixed(2)
  }

  function payoutNum(insp) {
    return parseFloat(insp?.pricing_snapshot?.pay_to_scout) || 0
  }

  // ── tab switching ──────────────────────────────────────────────────────────

  function switchTab(n) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === String(n)))
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.panel === String(n)))
  }

  // ── render ─────────────────────────────────────────────────────────────────

  function renderStats(pending, onHold, totalPaid, pendingCount) {
    return `
      <div class="stats">
        <div class="stat-card">

  function renderNextBatchCard(totalPending) {
    const nextTuesday = getNextTuesday()
    const count = pendingInspections.length
    return `
      <div class="next-batch-card">
        <div class="batch-info">
          <div class="batch-title">Next Tuesday payout batch</div>
          <div class="batch-sub">${nextTuesday} · ${count} inspection${count !== 1 ? 's' : ''} ready · Disputed inspections excluded automatically</div>
        </div>

  function renderTab1(inspections) {
    const emptyHtml = `<div class="empty-state" id="tab1Empty"><i class="ti ti-wallet-off"></i><p>No inspections pending payout. When clients release payment the inspections will appear here.</p></div>`

      return `
        <div class="payout-row" data-ref="${insp.ref_number || ''}" data-address="${(insp.address || '').toLowerCase()}" data-scout="${scoutName(u).toLowerCase()}">

    const rows = items.map(item => {
      const u = item.scout

      const date = fmtDate(batch?.created_at)

      const transfer = item.stripe_transfer_id || '—'

      const addr = insp?.address || ''

        <div class="payout-row" data-ref="${refNum || ''}" data-address="${addr.toLowerCase()}" data-scout="${scoutName(u).toLowerCase()}">

          <div class="row-info">

            <div class="row-sub">${addr || '—'}${refTag} · ${date}${batchTag} · Transfer: ${transfer}</div>

  function renderTab3(items, filterBatchRef) {
    const emptyHtml = `<div class="empty-state" id="tab3Empty"><i class="ti ti-circle-check"></i><p>No completed payouts yet.</p></div>`
    const searchBox = `<div class="search-wrap"><i class="ti ti-search"></i><input class="search-input" id="search3" type="text" placeholder="Search by inspection ID, address or scout name..."></div>`
    if (items.length === 0) return searchBox + emptyHtml
    const filterChip = filterBatchRef
      ? `<div class="batch-filter-chip" id="batchFilterChip" data-batchref="${filterBatchRef}"><i class="ti ti-filter" style="font-size:13px"></i> Filtered by: ${filterBatchRef}<span class="chip-x">&#x2715;</span></div>`
      : ''
    const rows = items.map(item => {
      adminReceiptItemsById.set(item.id, item)
      const u = item.scout
      const batch = item.payout_batches
      const insp = item.inspections
      const batchRef = batch?.batch_reference || item.batch_id || null
      const date = fmtDate(item.updated_at)
      const amount = item.amount != null ? '$' + parseFloat(item.amount).toFixed(2) : '—'
      const transfer = item.stripe_transfer_id || '—'
      const refNum = insp?.ref_number
      const refTag = refNum ? `<span class="ref-tag">#${refNum}</span>` : ''
      const batchTag = batchRef ? `<span class="batch-ref-tag"><i class="ti ti-stack" style="font-size:10px"></i>${batchRef}</span>` : ''
      const addr = insp?.address || ''
      const hidden = filterBatchRef && batchRef !== filterBatchRef ? ' style="display:none"' : ''
      return `
        <div class="payout-row" data-ref="${refNum || ''}" data-address="${addr.toLowerCase()}" data-scout="${scoutName(u).toLowerCase()}" data-batchref="${batchRef || ''}"${hidden}>
          <div class="scout-av">${scoutInitials(u)}</div>
          <div class="row-info">
            <div class="row-name">${scoutName(u)}</div>
            <div class="row-sub">${addr || '—'}${refTag} · ${date}${batchTag} · Transfer: ${transfer}</div>
          </div>
          <div class="row-right">
            <span class="badge badge-Paid">Paid</span>
            <div class="row-amount">${amount}</div>
            <button class="admin-receipt-btn" data-admin-receipt-id="${item.id}"><i class="ti ti-receipt" style="font-size:12px"></i> Receipt</button>
          </div>
        </div>`
    }).join('')
    return searchBox + filterChip + `<div id="tab3List">${rows}</div>` + emptyHtml.replace('id="tab3Empty"', 'id="tab3Empty" style="display:none"')
  }

          <div class="scout-av">${scoutInitials(u)}</div>
          <div class="row-info">
            <div class="row-name">${scoutName(u)}</div>
            <div class="row-sub">${insp.address || '—'}${refTag}</div>
          </div>
          <div class="row-right">
            <span class="badge badge-OnHold">On hold</span>
            <div class="row-amount hold">${payout(insp)}</div>

  function renderTab5(items) {
    const emptyHtml = `<div class="empty-state" id="tab5Empty"><i class="ti ti-circle-x"></i><p>No failed payouts.</p></div>`
    const searchBox = `<div class="search-wrap"><i class="ti ti-search"></i><input class="search-input" id="search5" type="text" placeholder="Search by inspection ID, address or scout name..."></div>`

    const rows = items.map(item => {

        <div class="payout-row" data-ref="${refNum || ''}" data-address="${addr.toLowerCase()}" data-scout="${scoutName(u).toLowerCase()}">

          <div class="row-info">
            <div class="row-name">${scoutName(u)}</div>
            <div class="row-sub">${addr || '—'}${refTag} · ${date}${batchTag} · ${reason}</div>
          </div>
          <div class="row-right">
            <span class="badge badge-Failed">Failed</span>
            <div class="row-amount">${amount}</div>
          </div>
        </div>`
    }).join('')
    return searchBox + `<div id="tab5List">${rows}</div>` + emptyHtml.replace('id="tab5Empty"', 'id="tab5Empty" style="display:none"')

  function renderTab6(batches) {
    const emptyHtml = `<div class="empty-state" id="tab6Empty"><i class="ti ti-list"></i><p>No payout batches have been run yet.</p></div>`
    const searchBox = `<div class="search-wrap"><i class="ti ti-search"></i><input class="search-input" id="search6" type="text" placeholder="Search by batch reference..."></div>`
    if (batches.length === 0) return searchBox + emptyHtml
    const rows = batches.map(b => {
      const statusBadge = b.status === 'Processed'
        ? '<span class="badge badge-Processed">Processed</span>'
        : b.status === 'Processing'
        ? '<span class="badge badge-Processing">Processing</span>'
        : '<span class="badge badge-Failed">Failed</span>'
      const total = b.total_amount != null ? '$' + parseFloat(b.total_amount).toFixed(2) : '—'
      const scoutsPaid = b.scouts_paid ?? '—'
      const period = b.period_label || '—'
      const batchRef = b.batch_reference || b.id || ''
      return `<tr data-batchref="${String(batchRef).toLowerCase()}">
        <td style="font-weight:600">${batchRef}</td>
        <td>${period}</td>
        <td style="font-weight:700">${total}</td>
        <td>${scoutsPaid}</td>
        <td>${statusBadge}</td>
        <td>${fmtDate(b.created_at)}</td>
      </tr>`
    }).join('')
    return searchBox + `
      <table class="batch-table" id="tab6Table">
        <thead>
          <tr>
            <th>Batch Reference</th>
            <th>Period</th>
            <th>Total Amount</th>
            <th>Scouts Paid</th>
            <th>Status</th>
            <th>Date Run</th>
          </tr>
        </thead>
        <tbody id="tab6Tbody">${rows}</tbody>
      </table>` + emptyHtml.replace('id="tab6Empty"', 'id="tab6Empty" style="display:none"')
  }

  // ── main load ──────────────────────────────────────────────────────────────

  async function loadPayouts() {
    const [
      { data: pendingRaw },
      { data: onHoldRaw },
      { data: paidSummary },
      { data: processingItems },
      { data: completedItems },
      { data: failedItems },
      { data: batches }
    ] = await Promise.all([
      supabase.from('inspections')
        .select('*, scout:scout_id(first_name, last_name)')
        .eq('status', 'PendingPayment')
        .order('created_at', { ascending: true }),

      supabase.from('inspections')
        .select('*, scout:scout_id(first_name, last_name)')
        .eq('status', 'Disputed')
        .not('scout_id', 'is', null),

      supabase.from('inspections')
        .select('id, pricing_snapshot')
        .eq('status', 'Paid'),

      supabase.from('payout_batch_items')
        .select('*, scout:scout_id(first_name, last_name), payout_batches(batch_reference, created_at), inspections(ref_number, address)')
        .eq('status', 'Processing'),

      supabase.from('payout_batch_items')
        .select('*, scout:scout_id(first_name, last_name), payout_batches(batch_reference, created_at), inspections(ref_number, address)')
        .eq('status', 'Paid')
        .order('updated_at', { ascending: false }),

      supabase.from('payout_batch_items')
        .select('*, scout:scout_id(first_name, last_name), payout_batches(batch_reference, created_at), inspections(ref_number, address)')
        .eq('status', 'Failed')
        .order('updated_at', { ascending: false }),

      supabase.from('payout_batches')
        .select('*')
        .order('created_at', { ascending: false })
    ])

    pendingInspections = pendingRaw || []
    const onHoldInspections = onHoldRaw || []

    const totalPending = pendingInspections.reduce((s, i) => s + payoutNum(i), 0)
    const totalOnHold = onHoldInspections.reduce((s, i) => s + payoutNum(i), 0)
    const totalPaid = (paidSummary || []).reduce((s, i) => s + payoutNum(i), 0)

    const tab2Items = processingItems || []
    completedPayoutItems = completedItems || []
    const tab3Items = completedPayoutItems
    const tab4Items = onHoldInspections
    const tab5Items = failedItems || []
    const tab6Batches = batches || []
    activeBatchFilter = null

    const tab4Alert = tab4Items.length > 0
    const tab5Alert = tab5Items.length > 0

    const html = `
      ${renderStats(totalPending, totalOnHold, totalPaid, pendingInspections.length)}

      <div class="tab-bar">
        <button class="tab-btn active" data-tab="1">
          Ready for Payouts <span class="tab-count">${pendingInspections.length}</span>
        </button>
        <button class="tab-btn" data-tab="2">
          Processing <span class="tab-count">${tab2Items.length}</span>
        </button>
        <button class="tab-btn" data-tab="3">
          Completed <span class="tab-count">${tab3Items.length}</span>
        </button>
        <button class="tab-btn" data-tab="4">
          On Hold <span class="tab-count${tab4Alert ? ' alert' : ''}">${tab4Items.length}</span>
        </button>
        <button class="tab-btn" data-tab="5">
          Failed <span class="tab-count${tab5Alert ? ' alert' : ''}">${tab5Items.length}</span>
        </button>
        <button class="tab-btn" data-tab="6">
          Batch History <span class="tab-count">${tab6Batches.length}</span>
        </button>
      </div>

      <div class="tab-panel active" data-panel="1">
        ${renderNextBatchCard(totalPending)}
        ${renderTab1(pendingInspections)}
      </div>

      <div class="tab-panel" data-panel="2">
        ${renderTab2(tab2Items)}
      </div>

      <div class="tab-panel" data-panel="3">
        ${renderTab3(tab3Items, null)}
      </div>

      <div class="tab-panel" data-panel="4">
        ${renderTab4(tab4Items)}
      </div>

      <div class="tab-panel" data-panel="5">
        ${renderTab5(tab5Items)}
      </div>

      <div class="tab-panel" data-panel="6">
        ${renderTab6(tab6Batches)}
      </div>`

    document.getElementById('mainContent').innerHTML = html

    // wire tab buttons
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab))
    })

    // wire search boxes (tabs 1-5: filter .payout-row cards; tab 6: filter table rows)
    function wireRowSearch(inputId, listId, emptyId) {
      const input = document.getElementById(inputId)
      if (!input) return
      input.addEventListener('input', () => {
        const q = input.value.toLowerCase().trim()
        const list = document.getElementById(listId)
        if (!list) return
        let visibleCount = 0
        list.querySelectorAll('.payout-row').forEach(row => {
          const ref = '#' + row.dataset.ref
          const addr = row.dataset.address || ''
          const scout = row.dataset.scout || ''
          const match = !q || ref.includes(q) || addr.includes(q) || scout.includes(q)
          row.style.display = match ? '' : 'none'
          if (match) visibleCount++
        })
        const empty = document.getElementById(emptyId)
        if (empty) empty.style.display = visibleCount === 0 ? '' : 'none'
      })
    }
    wireRowSearch('search1', 'tab1List', 'tab1Empty')
    wireRowSearch('search2', 'tab2List', 'tab2Empty')
    wireRowSearch('search3', 'tab3List', 'tab3Empty')
    wireRowSearch('search4', 'tab4List', 'tab4Empty')
    wireRowSearch('search5', 'tab5List', 'tab5Empty')

    // wire tab 6 batch reference search
    const search6 = document.getElementById('search6')
    if (search6) {
      search6.addEventListener('input', () => {
        const q = search6.value.toLowerCase().trim()
        const tbody = document.getElementById('tab6Tbody')
        const empty = document.getElementById('tab6Empty')
        if (!tbody) return
        let visibleCount = 0
        tbody.querySelectorAll('tr').forEach(tr => {
          const ref = tr.dataset.batchref || ''
          const match = !q || ref.includes(q)
          tr.style.display = match ? '' : 'none'
          if (match) visibleCount++
        })
        const table = document.getElementById('tab6Table')
        if (table) table.style.display = visibleCount === 0 ? 'none' : ''
        if (empty) empty.style.display = visibleCount === 0 ? '' : 'none'
      })
    }

    // wire tab6 batch row clicks → filter completed tab
    function applyBatchFilter(batchRef) {
      activeBatchFilter = batchRef
      const panel3 = document.querySelector('.tab-panel[data-panel="3"]')
      if (panel3) panel3.innerHTML = renderTab3(completedPayoutItems, batchRef)
      wireRowSearch('search3', 'tab3List', 'tab3Empty')
      // wire chip dismiss
      const chip = document.getElementById('batchFilterChip')
      if (chip) {
        chip.addEventListener('click', () => {
          applyBatchFilter(null)
        })
      }
      switchTab('3')
    }

    const tab6Tbody = document.getElementById('tab6Tbody')
    if (tab6Tbody) {
      tab6Tbody.querySelectorAll('tr[data-batchref]').forEach(tr => {
        tr.addEventListener('click', () => {
          const ref = tr.querySelector('td:first-child')?.textContent?.trim()
          if (ref) applyBatchFilter(ref)
        })
      })
    }

    // wire process button
    const processBtn = document.getElementById('processBtn')
    if (processBtn) processBtn.addEventListener('click', processBatch)
  }

  // ── process batch ──────────────────────────────────────────────────────────

  async function processBatch() {
    const total = pendingInspections.reduce((s, i) => s + payoutNum(i), 0).toFixed(2)
    if (!confirm(`Process Stripe payouts of $${total} to ${pendingInspections.length} scouts?\n\nScouts without an active Stripe Connect account will be skipped and remain pending.`)) return

    const btn = document.getElementById('processBtn')
    btn.disabled = true
    btn.innerHTML = '<div class="spinner" style="border-top-color:#fff"></div> Processing...'

    try {
      const { data: { session } } = await supabase.auth.getSession()
      const res = await fetch('https://nyvnvtxhlnjvfhcmnihh.supabase.co/functions/v1/stripe-payout-batch', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' }
      })
      const result = await res.json()

      if (result.error) {
        showToast('Batch failed: ' + result.error, 'error')
        btn.disabled = false
        btn.innerHTML = '<i class="ti ti-send" style="font-size:16px"></i> Process batch'
        return
      }

      const skippedItems = result.results?.filter(r => r.status === 'skipped') || []
      const failed = result.results?.filter(r => r.status === 'failed').length || 0
      let msg = `${result.processed} of ${result.total} payouts sent via Stripe`
      if (skippedItems.length) {
        const reasons = [...new Set(skippedItems.map(r => r.error).filter(Boolean))]
        msg += ` · ${skippedItems.length} skipped (${reasons.join('; ')})`
      }
      if (failed) msg += ` · ${failed} failed`
      showToast(msg, result.processed > 0 ? 'success' : 'error')

      await supabase.from('admin_actions').insert({
        admin_id: adminData.id,
        action_type: 'PayoutBatchProcessed',
        target_table: 'payout_batches',
        target_id: result.batch_id,
        new_value: result.processed + ' paid',
        notes: `Stripe batch: ${result.processed}/${result.total} processed`
      })
    } catch (err) {
      showToast('Unexpected error: ' + err.message, 'error')
    }

    btn.disabled = false
    btn.innerHTML = '<i class="ti ti-send" style="font-size:16px"></i> Process batch'
    await loadPayouts()
  }

  // ── init ───────────────────────────────────────────────────────────────────

  async function init() {
    const { data: { user } } = await supabase.auth.getUser()
    if (!user) { window.location.href = 'login.html'; return; }

    const { data: admin } = await supabase
      .from('admins')
      .select('id, first_name, last_name, role, is_active')
      .eq('email', user.email)
      .single()

    if (!admin || !admin.is_active) {
      await supabase.auth.signOut()
      window.location.href = 'login.html'
      return
    }

    adminData = admin
    const initials = (admin.first_name?.[0] || '') + (admin.last_name?.[0] || '')
    document.getElementById('adminAvatar').textContent = initials.toUpperCase()
    document.getElementById('adminName').textContent = admin.first_name + ' ' + admin.last_name
    document.getElementById('adminRole').textContent = admin.role === 'superadmin' ? 'Super Admin' : 'Admin'
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut()
      window.location.href = 'login.html'
    })

    const { data: openDisputes } = await supabase
      .from('disputes').select('id').not('status', 'in', '("Resolved","Dismissed")')
    document.getElementById('disputeBadge').textContent = (openDisputes || []).length

    await loadPayouts()
  }

  // ── mobile menu ────────────────────────────────────────────────────────────

  document.getElementById('menuToggle').addEventListener('click', () => {
    document.querySelector('.sidebar').classList.toggle('open')
    document.getElementById('sidebarOverlay').classList.toggle('open')
  })
  document.getElementById('sidebarOverlay').addEventListener('click', () => {
    document.querySelector('.sidebar').classList.remove('open')
    document.getElementById('sidebarOverlay').classList.remove('open')
  })
  document.querySelectorAll('.sidebar .nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelector('.sidebar').classList.remove('open')
      document.getElementById('sidebarOverlay').classList.remove('open')
    })
  })

  document.addEventListener('click', e => {
    const btn = e.target.closest('[data-admin-receipt-id]')
    if (!btn) return
    e.stopPropagation()
    const item = adminReceiptItemsById.get(btn.dataset.adminReceiptId)
    if (item) printAdminReceipt(item)
  })

  init()
</script>
