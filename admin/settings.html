<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Spekto Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    :root { --purple: #560591; --tint: #F5EEFF; --bg: #F7F5FA; --border: #EEE; --dark: #1A0533; --green: #22C55E; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; }
    .shell { display: flex; min-height: 100vh; }
    .sidebar { width: 230px; background: var(--dark); display: flex; flex-direction: column; padding: 24px 0; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .s-mark { width: 34px; height: 34px; background: rgba(255,255,255,0.1); border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .s-name { font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -1px; }
    .admin-tag { font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }
    .nav-section { padding: 16px 12px 4px; }
    .nav-section-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.5px; padding: 0 8px; margin-bottom: 4px; }
    .nav { display: flex; flex-direction: column; gap: 1px; padding: 0 12px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 7px; font-size: 13px; color: rgba(255,255,255,0.55); font-weight: 500; text-decoration: none; transition: all 0.15s; }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.12); color: #fff; }
    .nav-item i { font-size: 16px; flex-shrink: 0; }
    .nav-badge { margin-left: auto; background: #DC2626; color: #fff; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
    .sidebar-foot { margin-top: auto; padding: 12px; border-top: 1px solid rgba(255,255,255,0.08); }
    .admin-user { display: flex; align-items: center; gap: 10px; padding: 8px 12px; }
    .admin-avatar { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .admin-info { flex: 1; min-width: 0; }
    .admin-name-s { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .admin-role-s { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 1px; }
    .btn-logout-sm { width: 28px; height: 28px; background: rgba(255,255,255,0.08); border: none; border-radius: 6px; color: rgba(255,255,255,0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .btn-logout-sm:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .main { flex: 1; margin-left: 230px; display: flex; flex-direction: column; min-width: 0; }
    .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-size: 17px; font-weight: 700; color: #0D0D0D; }
    .content { padding: 24px 28px; max-width: 860px; }
    .section-card { background: #fff; border-radius: 14px; border: 1px solid var(--border); margin-bottom: 24px; overflow: hidden; }
    .section-head { padding: 18px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .section-title { font-size: 15px; font-weight: 700; color: #0D0D0D; display: flex; align-items: center; gap: 8px; }
    .section-title i { font-size: 17px; color: var(--purple); }
    .section-desc { font-size: 12px; color: #999; margin-top: 3px; }
    .section-meta { font-size: 11px; color: #bbb; flex-shrink: 0; margin-top: 4px; }
    .pricing-grid { padding: 20px 24px; display: flex; flex-direction: column; gap: 0; }
    .pricing-row { display: grid; grid-template-columns: 180px 1fr 1fr 1fr 1fr; gap: 12px; align-items: center; padding: 14px 0; border-bottom: 1px solid #F5F5F5; }
    .pricing-row:last-child { border-bottom: none; }
    .pricing-row-header { display: grid; grid-template-columns: 180px 1fr 1fr 1fr 1fr; gap: 12px; padding: 0 0 10px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
    .col-head { font-size: 10px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.4px; }
    .type-label { font-size: 13px; font-weight: 600; color: #0D0D0D; }
    .type-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
    .field-wrap { display: flex; flex-direction: column; gap: 3px; }
    .field-input { height: 36px; border: 1.5px solid #E0E0E0; border-radius: 8px; padding: 0 10px 0 26px; font-size: 13px; font-family: 'Inter', sans-serif; color: #0D0D0D; width: 100%; outline: none; background: #fff; }
    .field-input:focus { border-color: var(--purple); }
    .field-input.readonly { background: #FAFAFA; color: #999; cursor: default; }
    .field-input-wrap { position: relative; }
    .field-prefix { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 12px; color: #aaa; font-weight: 500; pointer-events: none; }
    .field-input-unit { height: 36px; border: 1.5px solid #E0E0E0; border-radius: 8px; padding: 0 36px 0 10px; font-size: 13px; font-family: 'Inter', sans-serif; color: #0D0D0D; width: 100%; outline: none; background: #fff; }
    .field-input-unit:focus { border-color: var(--purple); }
    .field-suffix { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); font-size: 11px; color: #aaa; pointer-events: none; }
    .section-footer { padding: 16px 24px; border-top: 1px solid #F5F5F5; display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
    .btn-save { height: 38px; background: var(--purple); color: #fff; border: none; border-radius: 8px; padding: 0 20px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 6px; }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-save:hover:not(:disabled) { opacity: 0.9; }
    .mp-grid { padding: 20px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .mp-field { display: flex; flex-direction: column; gap: 6px; }
    .mp-label { font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.4px; }
    .mp-hint { font-size: 11px; color: #aaa; margin-top: 2px; }
    .calc-note { font-size: 10px; color: #bbb; font-style: italic; margin-top: 2px; }
    .warn-banner { margin: 0 24px 20px; background: #FFF8F8; border: 1.5px solid #FEE2E2; border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
    .warn-banner i { color: #991B1B; font-size: 15px; flex-shrink: 0; }
    .warn-text { font-size: 12px; color: #991B1B; line-height: 1.5; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: #999; font-size: 14px; gap: 10px; }
    .spinner { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #E0E0E0; border-top-color: var(--purple); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 24px; right: 24px; font-size: 13px; font-weight: 600; padding: 12px 20px; border-radius: 10px; z-index: 9999; display: none; color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .toast.success { background: #166534; display: flex; align-items: center; gap: 8px; }
    .toast.error { background: #991B1B; display: flex; align-items: center; gap: 8px; }
    @media (max-width: 900px) {
      .pricing-row, .pricing-row-header { grid-template-columns: 140px 1fr 1fr 1fr 1fr; }
    }
    @media (max-width: 700px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .content { padding: 16px; }
      .topbar { padding: 14px 16px; }
      .pricing-row, .pricing-row-header { grid-template-columns: 1fr 1fr; }
      .pricing-row .col-head:nth-child(n+3), .pricing-row .field-wrap:nth-child(n+3) { display: none; }
      .mp-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="s-mark">
        <svg width="20" height="18" viewBox="0 0 30 26" fill="none">
          <rect x="1" y="5" width="28" height="20" rx="4" stroke="white" stroke-width="2"/>
          <path d="M10 5L11.5 2h7L20 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="15" cy="15" r="5" stroke="white" stroke-width="2"/>
          <circle cx="15" cy="15" r="2" fill="white"/>
          <circle cx="24" cy="9" r="1.5" fill="white"/>
        </svg>
      </div>
      <div>
        <div class="s-name">SPEKTO</div>
        <div class="admin-tag">Admin Portal</div>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Overview</div>
      <div class="nav"><a class="nav-item" href="dashboard.html"><i class="ti ti-layout-dashboard"></i> Dashboard</a></div>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Operations</div>
      <div class="nav">
        <a class="nav-item" href="inspections.html"><i class="ti ti-clipboard-list"></i> Inspections</a>
        <a class="nav-item" href="disputes.html"><i class="ti ti-alert-triangle"></i> Disputes <span class="nav-badge" id="disputeBadge">0</span></a>
        <a class="nav-item" href="payouts.html"><i class="ti ti-wallet"></i> Payouts</a>
        <a class="nav-item" href="verification.html"><i class="ti ti-id-badge"></i> Verification</a>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Users</div>
      <div class="nav">
        <a class="nav-item" href="users.html"><i class="ti ti-users"></i> All Users</a>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Platform</div>
      <div class="nav">
        <a class="nav-item" href="marketplace.html"><i class="ti ti-shopping-bag"></i> Marketplace</a>
        <a class="nav-item active" href="settings.html"><i class="ti ti-settings"></i> Settings</a>
      </div>
    </div>
    <div class="sidebar-foot">
      <div class="admin-user">
        <div class="admin-avatar" id="adminAvatar">?</div>
        <div class="admin-info">
          <div class="admin-name-s" id="adminName">Loading...</div>
          <div class="admin-role-s" id="adminRole">Admin</div>
        </div>
        <button class="btn-logout-sm" id="logoutBtn"><i class="ti ti-logout"></i></button>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Platform Settings</div>
    </div>
    <div class="content" id="mainContent">
      <div class="loading"><div class="spinner"></div> Loading settings...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient(
    'https://nyvnvtxhlnjvfhcmnihh.supabase.co',
    'sb_publishable_AZSoskR9Ou8e-rl0QlPWUg_vOehXCRL'
  )

  let pricingData = []
  let mpData = null
  let adminData = null

  async function init() {
    const { data: { user } } = await supabase.auth.getUser()
    if (!user) { window.location.href = 'login.html'; return; }

    const { data: admin } = await supabase
      .from('admins')
      .select('id, first_name, last_name, role, is_active')
      .eq('email', user.email)
      .single()

    if (!admin || !admin.is_active) {
      await supabase.auth.signOut()
      window.location.href = 'login.html'
      return
    }

    adminData = admin
    document.getElementById('adminAvatar').textContent =
      ((admin.first_name?.[0] || '') + (admin.last_name?.[0] || '')).toUpperCase()
    document.getElementById('adminName').textContent = admin.first_name + ' ' + admin.last_name
    document.getElementById('adminRole').textContent = admin.role === 'superadmin' ? 'Super Admin' : 'Admin'
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut()
      window.location.href = 'login.html'
    })

    const { data: openDisputes } = await supabase
      .from('disputes').select('id').not('status', 'in', '("Resolved","Dismissed")')
    document.getElementById('disputeBadge').textContent = (openDisputes || []).length

    await loadData()
  }

  async function loadData() {
    const [{ data: pricing }, { data: mp }] = await Promise.all([
      supabase.from('pricing').select('*').order('id'),
      supabase.from('marketplace_pricing').select('*').eq('id', 'standard').single()
    ])

    pricingData = pricing || []
    mpData = mp

    render()
  }

  function fmt(val) {
    return parseFloat(val || 0).toFixed(2)
  }

  function fmtDate(ts) {
    if (!ts) return 'Never'
    return new Date(ts).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
  }

  function render() {
    const orderMap = { external: 0, internal: 1, internalExternal: 2 }
    const sorted = [...pricingData].sort((a, b) => (orderMap[a.id] ?? 9) - (orderMap[b.id] ?? 9))

    const pricingRows = sorted.map(p => `
      <div class="pricing-row" data-id="${p.id}">
        <div>
          <div class="type-label">${p.inspection_type}</div>
          <div class="type-sub">${p.id === 'external' ? 'Exterior only' : p.id === 'internal' ? 'Interior only' : 'Full walkthrough'}</div>
        </div>
        <div class="field-wrap">
          <div class="field-input-wrap">
            <span class="field-prefix">$</span>
            <input class="field-input" type="number" min="0" step="0.01" data-field="pay_to_scout" value="${fmt(p.pay_to_scout)}">
          </div>
        </div>
        <div class="field-wrap">
          <div class="field-input-wrap">
            <span class="field-prefix">$</span>
            <input class="field-input" type="number" min="0" step="0.01" data-field="fee_excluding_gst" value="${fmt(p.fee_excluding_gst)}">
          </div>
        </div>
        <div class="field-wrap">
          <div class="field-input-wrap">
            <span class="field-prefix">$</span>
            <input class="field-input" type="number" min="0" step="0.01" data-field="gst" value="${fmt(p.gst)}">
          </div>
        </div>
        <div class="field-wrap">
          <div class="field-input-wrap">
            <span class="field-prefix">$</span>
            <input class="field-input" type="number" min="0" step="0.01" data-field="total" value="${fmt(p.total)}">
          </div>
        </div>
      </div>`).join('')

    const mpLastUpdated = mpData?.updated_at ? `Last updated ${fmtDate(mpData.updated_at)}` : ''

    document.getElementById('mainContent').innerHTML = `
      <div class="section-card">
        <div class="section-head">
          <div>
            <div class="section-title"><i class="ti ti-clipboard-list"></i> Inspection Pricing</div>
            <div class="section-desc">Fees and scout payouts for each inspection type. Changes apply to new inspections only.</div>
          </div>
          <div class="section-meta" id="pricingMeta">Last updated ${fmtDate(pricingData[0]?.updated_at)}</div>
        </div>
        <div class="warn-banner">
          <i class="ti ti-alert-triangle"></i>
          <div class="warn-text">Changing prices affects all future bookings immediately. Existing inspections retain their original pricing snapshot.</div>
        </div>
        <div class="pricing-grid">
          <div class="pricing-row-header">
            <div class="col-head">Type</div>
            <div class="col-head">Scout pay</div>
            <div class="col-head">Fee ex GST</div>
            <div class="col-head">GST</div>
            <div class="col-head">Client total</div>
          </div>
          ${pricingRows}
        </div>
        <div class="section-footer">
          <button class="btn-save" id="savePricingBtn" onclick="savePricing()">
            <i class="ti ti-device-floppy"></i> Save pricing
          </button>
        </div>
      </div>

      <div class="section-card">
        <div class="section-head">
          <div>
            <div class="section-title"><i class="ti ti-shopping-bag"></i> Marketplace Pricing</div>
            <div class="section-desc">Buyer price and listing configuration for the property video marketplace.</div>
          </div>
          <div class="section-meta">${mpLastUpdated}</div>
        </div>
        <div class="mp-grid">
          <div class="mp-field">
            <div class="mp-label">Listing price (inc. GST)</div>
            <div class="field-input-wrap">
              <span class="field-prefix">$</span>
              <input class="field-input" id="mp_price" type="number" min="0" step="0.01" value="${fmt(mpData?.price)}">
            </div>
            <div class="mp-hint">Total amount buyers pay per listing</div>
          </div>
          <div class="mp-field">
            <div class="mp-label">GST amount</div>
            <div class="field-input-wrap">
              <span class="field-prefix">$</span>
              <input class="field-input readonly" id="mp_gst" type="number" readonly value="${fmt(mpData?.gst)}">
            </div>
            <div class="calc-note">Auto-calculated (1/11 of price)</div>
          </div>
          <div class="mp-field">
            <div class="mp-label">Price ex GST</div>
            <div class="field-input-wrap">
              <span class="field-prefix">$</span>
              <input class="field-input readonly" id="mp_price_ex_gst" type="number" readonly value="${fmt(mpData?.price_ex_gst)}">
            </div>
            <div class="calc-note">Auto-calculated (price − GST)</div>
          </div>
          <div class="mp-field">
            <div class="mp-label">Listing duration</div>
            <div class="field-input-wrap">
              <input class="field-input-unit" id="mp_listing_duration" type="number" min="1" value="${mpData?.listing_duration_days ?? 365}">
              <span class="field-suffix">days</span>
            </div>
            <div class="mp-hint">How long a listing stays active after creation</div>
          </div>
          <div class="mp-field">
            <div class="mp-label">Buyer access duration</div>
            <div class="field-input-wrap">
              <input class="field-input-unit" id="mp_access_duration" type="number" min="1" value="${mpData?.access_duration_hours ?? 48}">
              <span class="field-suffix">hrs</span>
            </div>
            <div class="mp-hint">How long a buyer can access a purchased video</div>
          </div>
          <div class="mp-field">
            <div class="mp-label">Max downloads per purchase</div>
            <div class="field-input-wrap">
              <input class="field-input-unit" id="mp_max_downloads" type="number" min="1" value="${mpData?.max_downloads ?? 3}">
              <span class="field-suffix">downloads</span>
            </div>
          </div>
          <div class="mp-field">
            <div class="mp-label">Preview clip length</div>
            <div class="field-input-wrap">
              <input class="field-input-unit" id="mp_preview_duration" type="number" min="1" value="${mpData?.preview_duration_seconds ?? 5}">
              <span class="field-suffix">secs</span>
            </div>
            <div class="mp-hint">Free preview shown to buyers before purchase</div>
          </div>
        </div>
        <div class="section-footer">
          <button class="btn-save" id="saveMpBtn" onclick="saveMarketplacePricing()">
            <i class="ti ti-device-floppy"></i> Save settings
          </button>
        </div>
      </div>`

    document.getElementById('mp_price').addEventListener('input', recalcGst)
  }

  function recalcGst() {
    const price = parseFloat(document.getElementById('mp_price').value) || 0
    const gst = price / 11
    const exGst = price - gst
    document.getElementById('mp_gst').value = gst.toFixed(2)
    document.getElementById('mp_price_ex_gst').value = exGst.toFixed(2)
  }

  window.savePricing = async function() {
    const btn = document.getElementById('savePricingBtn')
    btn.disabled = true
    btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 0.8s linear infinite"></i> Saving...'

    const rows = document.querySelectorAll('.pricing-row[data-id]')
    let hasError = false

    for (const row of rows) {
      const id = row.dataset.id
      const pay_to_scout = parseFloat(row.querySelector('[data-field="pay_to_scout"]').value)
      const fee_excluding_gst = parseFloat(row.querySelector('[data-field="fee_excluding_gst"]').value)
      const gst = parseFloat(row.querySelector('[data-field="gst"]').value)
      const total = parseFloat(row.querySelector('[data-field="total"]').value)

      const { error } = await supabase
        .from('pricing')
        .update({ pay_to_scout, fee_excluding_gst, gst, total, updated_at: new Date().toISOString() })
        .eq('id', id)

      if (error) { hasError = true; break }
    }

    btn.disabled = false
    btn.innerHTML = '<i class="ti ti-device-floppy"></i> Save pricing'

    if (hasError) {
      showToast('Failed to save pricing. Please try again.', 'error')
    } else {
      showToast('Inspection pricing saved', 'success')
      document.getElementById('pricingMeta').textContent = `Last updated ${new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })}`
    }
  }

  window.saveMarketplacePricing = async function() {
    const btn = document.getElementById('saveMpBtn')
    btn.disabled = true
    btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 0.8s linear infinite"></i> Saving...'

    const price = parseFloat(document.getElementById('mp_price').value)
    const gst = parseFloat(document.getElementById('mp_gst').value)
    const price_ex_gst = parseFloat(document.getElementById('mp_price_ex_gst').value)
    const listing_duration_days = parseInt(document.getElementById('mp_listing_duration').value)
    const access_duration_hours = parseInt(document.getElementById('mp_access_duration').value)
    const max_downloads = parseInt(document.getElementById('mp_max_downloads').value)
    const preview_duration_seconds = parseInt(document.getElementById('mp_preview_duration').value)

    const { error } = await supabase
      .from('marketplace_pricing')
      .update({
        price, gst, price_ex_gst,
        listing_duration_days, access_duration_hours,
        max_downloads, preview_duration_seconds,
        updated_by: (await supabase.auth.getUser()).data.user?.id,
        updated_at: new Date().toISOString()
      })
      .eq('id', 'standard')

    btn.disabled = false
    btn.innerHTML = '<i class="ti ti-device-floppy"></i> Save settings'

    if (error) {
      showToast('Failed to save settings. Please try again.', 'error')
    } else {
      showToast('Marketplace settings saved', 'success')
    }
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast')
    t.className = `toast ${type}`
    t.innerHTML = `<i class="ti ti-${type === 'success' ? 'circle-check' : 'alert-circle'}"></i> ${msg}`
    t.style.display = 'flex'
    setTimeout(() => { t.style.display = 'none' }, 3500)
  }

  init()
</script>
</body>
</html>
