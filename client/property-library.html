<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Library - Spekto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    :root { --purple: #560591; --tint: #F5EEFF; --bg: #F7F5FA; --border: #EEE; --green: #22C55E; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; }
    .shell { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: var(--purple); display: flex; flex-direction: column; padding: 28px 0; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 20px 28px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .s-mark { width: 36px; height: 36px; background: rgba(255,255,255,0.15); border-radius: 9px; border: 1px solid rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .s-name { font-family: 'DM Sans', sans-serif; font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -1.5px; }
    .nav { display: flex; flex-direction: column; gap: 2px; padding: 20px 12px; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 500; text-decoration: none; transition: all 0.15s; }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.15); color: #fff; }
    .nav-item i { font-size: 17px; }
    .sidebar-foot { padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
    .user-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .user-name { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 500; }
    .main { flex: 1; margin-left: 220px; display: flex; flex-direction: column; min-width: 0; }
    .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-size: 18px; font-weight: 700; color: #0D0D0D; letter-spacing: -0.3px; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .search-box { display: flex; align-items: center; gap: 8px; background: #F7F5FA; border: 1.5px solid #E0E0E0; border-radius: 8px; padding: 0 12px; height: 36px; }
    .search-box i { font-size: 15px; color: #aaa; }
    .search-box input { border: none; background: transparent; outline: none; font-size: 13px; font-family: 'Inter', sans-serif; color: #0D0D0D; width: 200px; }
    .view-toggle { display: flex; background: #F7F5FA; border: 1.5px solid #E0E0E0; border-radius: 8px; overflow: hidden; }
    .view-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: #aaa; border: none; background: transparent; transition: all 0.15s; }
    .view-btn.active { background: var(--purple); color: #fff; }
    .content { padding: 24px 28px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 16px 18px; }
    .stat-label { font-size: 11px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
    .stat-val { font-size: 22px; font-weight: 800; color: #0D0D0D; letter-spacing: -0.5px; font-family: 'DM Sans', sans-serif; }
    .filters { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 2px; }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn { background: #fff; border: 1.5px solid #E0E0E0; border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: #666; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.15s; }
    .filter-btn.active { background: var(--purple); border-color: var(--purple); color: #fff; }
    .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .list-view { display: flex; flex-direction: column; gap: 10px; }
    .video-card { background: #fff; border-radius: 14px; border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: box-shadow 0.15s; }
    .video-card:hover { box-shadow: 0 4px 16px rgba(86,5,145,0.08); border-color: #D4B8F5; }
    .video-thumb { height: 160px; background: #111827; position: relative; display: flex; align-items: center; justify-content: center; }
    .video-thumb video { width: 100%; height: 100%; object-fit: cover; }
    .play-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; position: absolute; }
    .play-btn i { font-size: 18px; color: #fff; margin-left: 2px; }
    .type-pill { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.3px; }
    .date-pill { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
    .video-info { padding: 14px 16px; }
    .video-addr { font-size: 14px; font-weight: 600; color: #0D0D0D; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .video-meta { display: flex; flex-wrap: wrap; gap: 8px; }
    .meta-chip { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #999; }
    .meta-chip i { font-size: 12px; color: #bbb; }
    .video-actions { padding: 10px 16px; border-top: 1px solid #F3F3F3; display: flex; gap: 8px; }
    .btn-play { flex: 1; height: 34px; background: var(--tint); color: var(--purple); border: none; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .btn-download { flex: 1; height: 34px; background: #fff; color: #444; border: 1.5px solid #E0E0E0; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 5px; text-decoration: none; }
    .btn-download:hover { border-color: var(--purple); color: var(--purple); }
    .list-item { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 14px 18px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: box-shadow 0.15s; }
    .list-item:hover { box-shadow: 0 2px 8px rgba(86,5,145,0.06); border-color: #D4B8F5; }
    .list-thumb { width: 72px; height: 52px; background: #111827; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; overflow: hidden; }
    .list-thumb video { width: 100%; height: 100%; object-fit: cover; }
    .list-thumb i { font-size: 20px; color: rgba(255,255,255,0.4); }
    .list-type { position: absolute; bottom: 3px; left: 3px; background: rgba(0,0,0,0.7); color: #fff; font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 4px; text-transform: uppercase; }
    .list-info { flex: 1; min-width: 0; }
    .list-addr { font-size: 13px; font-weight: 600; color: #0D0D0D; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-meta { display: flex; gap: 12px; margin-top: 4px; flex-wrap: wrap; }
    .list-meta-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #999; }
    .list-meta-item i { font-size: 12px; }
    .list-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-sm { height: 32px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 5px; padding: 0 12px; border: none; }
    .btn-sm-play { background: var(--tint); color: var(--purple); }
    .btn-sm-dl { background: #fff; color: #444; border: 1.5px solid #E0E0E0 !important; text-decoration: none; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #111; border-radius: 16px; overflow: hidden; width: 100%; max-width: 800px; position: relative; }
    .modal-close { position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; background: rgba(255,255,255,0.1); border: none; border-radius: 50%; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
    .modal video { width: 100%; max-height: 60vh; display: block; }
    .modal-info { padding: 16px 20px; }
    .modal-addr { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .modal-meta { display: flex; gap: 14px; flex-wrap: wrap; }
    .modal-meta-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: rgba(255,255,255,0.5); }
    .modal-meta-item i { font-size: 13px; }
    .modal-actions { padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; }
    .btn-modal-dl { flex: 1; height: 40px; background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none; }
    .btn-modal-insp { flex: 1; height: 40px; background: var(--purple); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none; }
    .empty-state { text-align: center; padding: 60px 20px; background: #fff; border-radius: 14px; border: 1px solid var(--border); }
    .empty-state i { font-size: 40px; color: #ddd; margin-bottom: 16px; display: block; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: #0D0D0D; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; color: #999; margin-bottom: 20px; }
    .btn-new { display: inline-flex; align-items: center; gap: 6px; background: var(--purple); color: #fff; font-size: 13px; font-weight: 700; border: none; border-radius: 8px; padding: 10px 18px; cursor: pointer; text-decoration: none; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: #999; font-size: 14px; gap: 10px; }
    .spinner { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #E0E0E0; border-top-color: var(--purple); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .insp-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 8px; text-transform: uppercase; }
    .insp-ext { background: #E0F2FE; color: #0369A1; }
    .insp-int { background: #EDE9FE; color: #5B21B6; }
    @media (max-width: 700px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .content { padding: 16px; }
      .topbar { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
      .grid-view { grid-template-columns: 1fr 1fr; }
      .search-box input { width: 120px; }
    }
    @media (max-width: 420px) {
      .grid-view { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="s-mark">
        <svg width="20" height="18" viewBox="0 0 30 26" fill="none">
          <rect x="1" y="5" width="28" height="20" rx="4" stroke="white" stroke-width="2"/>
          <path d="M10 5L11.5 2h7L20 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="15" cy="15" r="5" stroke="white" stroke-width="2"/>
          <circle cx="15" cy="15" r="2" fill="white"/>
          <circle cx="24" cy="9" r="1.5" fill="white"/>
        </svg>
      </div>
      <div class="s-name">SPEKTO</div>
    </div>
    <nav class="nav">
      <a class="nav-item" href="dashboard.html"><i class="ti ti-layout-dashboard"></i> My Inspections</a>
      <a class="nav-item" href="new-inspection.html"><i class="ti ti-plus"></i> New Inspection</a>
      <a class="nav-item active" href="property-library.html"><i class="ti ti-video"></i> Property Library</a>
      <a class="nav-item" href="billing.html"><i class="ti ti-credit-card"></i> Billing</a>
      <a class="nav-item" href="disputes.html"><i class="ti ti-alert-triangle"></i> My Disputes</a>
      <a class="nav-item" href="settings.html"><i class="ti ti-settings"></i> Settings</a>
    </nav>
    <div class="sidebar-foot">
      <div class="user-row">
        <div class="avatar" id="userAvatar">?</div>
        <div class="user-name" id="userName">Loading...</div>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Property Library</div>
      <div class="topbar-right">
        <div class="search-box">
          <i class="ti ti-search"></i>
          <input type="text" id="searchInput" placeholder="Search address...">
        </div>
        <div class="view-toggle">
          <button class="view-btn active" id="gridBtn" title="Grid view"><i class="ti ti-layout-grid"></i></button>
          <button class="view-btn" id="listBtn" title="List view"><i class="ti ti-list"></i></button>
        </div>
      </div>
    </div>

    <div class="content" id="mainContent">
      <div class="loading"><div class="spinner"></div> Loading library...</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="videoModal">
  <div class="modal">
    <button class="modal-close" id="modalClose">&#215;</button>
    <video id="modalVideo" controls></video>
    <div class="modal-info">
      <div class="modal-addr" id="modalAddr"></div>
      <div class="modal-meta">
        <div class="modal-meta-item"><i class="ti ti-calendar"></i> <span id="modalDate"></span></div>
        <div class="modal-meta-item"><i class="ti ti-clock"></i> <span id="modalTime"></span></div>
        <div class="modal-meta-item"><i class="ti ti-camera"></i> <span id="modalType"></span></div>
        <div class="modal-meta-item"><i class="ti ti-map-pin"></i> <span id="modalGps"></span></div>
      </div>
    </div>
    <div class="modal-actions">
      <a class="btn-modal-dl" id="modalDownload" download><i class="ti ti-download"></i> Download</a>
      <a class="btn-modal-insp" id="modalViewInsp"><i class="ti ti-external-link"></i> View inspection</a>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  import { initNotificationBell } from '../config/notifications.js'
  const supabase = createClient(
    'https://nyvnvtxhlnjvfhcmnihh.supabase.co',
    'sb_publishable_AZSoskR9Ou8e-rl0QlPWUg_vOehXCRL'
  )

  let allCaptures = []
  let filteredCaptures = []
  let currentFilter = 'all'
  let currentView = 'grid'
  let searchQuery = ''

  async function init() {
    const { data: { user } } = await supabase.auth.getUser()
    if (!user) { window.location.href = '../auth/login.html'; return; }

    const { data: userData } = await supabase
      .from('users')
      .select('first_name, last_name')
      .eq('id', user.id)
      .single()

    if (userData) {
      const initials = (userData.first_name?.[0] || '') + (userData.last_name?.[0] || '')
      document.getElementById('userAvatar').textContent = initials.toUpperCase()
      document.getElementById('userName').textContent = userData.first_name + ' ' + userData.last_name
    }

    initNotificationBell(supabase, user.id)
    const { data: inspections } = await supabase
      .from('inspections')
      .select('id, address, date, time, inspection_type, status')
      .eq('client_id', user.id)
      .in('status', ['Completed', 'PendingPayment', 'Paid', 'Disputed'])
      .order('date', { ascending: false })

    if (!inspections || inspections.length === 0) {
      renderEmpty()
      return
    }

    const inspectionIds = inspections.map(i => i.id)
    const inspectionMap = {}
    inspections.forEach(i => { inspectionMap[i.id] = i })

    const { data: captures } = await supabase
      .from('captures')
      .select('*')
      .in('inspection_id', inspectionIds)
      .eq('is_deleted', false)
      .eq('is_replaced', false)
      .order('recorded_at', { ascending: false })

    allCaptures = (captures || []).map(c => ({
      ...c,
      inspection: inspectionMap[c.inspection_id]
    }))

    filteredCaptures = [...allCaptures]
    renderPage()
    setupListeners()
  }

  function renderPage() {
    const totalVideos = allCaptures.length
    const totalProperties = new Set(allCaptures.map(c => c.inspection_id)).size
    const external = allCaptures.filter(c => c.capture_type === 'external').length
    const internal = allCaptures.filter(c => c.capture_type === 'internal').length

    let html = `
      <div class="stats">
        <div class="stat-card"><div class="stat-label">Total videos</div><div class="stat-val">${totalVideos}</div></div>
        <div class="stat-card"><div class="stat-label">Properties</div><div class="stat-val">${totalProperties}</div></div>
        <div class="stat-card"><div class="stat-label">External</div><div class="stat-val">${external}</div></div>
        <div class="stat-card"><div class="stat-label">Internal</div><div class="stat-val">${internal}</div></div>
      </div>
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All videos</button>
        <button class="filter-btn" data-filter="external">External only</button>
        <button class="filter-btn" data-filter="internal">Internal only</button>
      </div>
      <div id="videoContainer"></div>`

    document.getElementById('mainContent').innerHTML = html
    renderVideos()

    document.getElementById('filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn')
      if (!btn) return
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      currentFilter = btn.dataset.filter
      applyFilters()
    })
  }

  function applyFilters() {
    filteredCaptures = allCaptures.filter(c => {
      const matchesType = currentFilter === 'all' || c.capture_type === currentFilter
      const matchesSearch = !searchQuery ||
        c.inspection?.address?.toLowerCase().includes(searchQuery.toLowerCase())
      return matchesType && matchesSearch
    })
    renderVideos()
  }

  function renderVideos() {
    const container = document.getElementById('videoContainer')
    if (!container) return

    if (filteredCaptures.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="ti ti-video-off"></i>
          <h3>No videos found</h3>
          <p>${searchQuery ? 'No videos match your search. Try a different address.' : 'Videos from completed inspections will appear here.'}</p>
          ${!searchQuery ? `<a class="btn-new" href="new-inspection.html"><i class="ti ti-plus"></i> New Inspection</a>` : ''}
        </div>`
      return
    }

    if (currentView === 'grid') {
      container.className = 'grid-view'
      container.innerHTML = filteredCaptures.map((cap, idx) => {
        const insp = cap.inspection
        const date = insp?.date ? new Date(insp.date).toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' }) : '—'
        const typeLabel = cap.capture_type === 'external' ? 'External' : 'Internal'
        const recordedAt = cap.recorded_at ? new Date(cap.recorded_at).toLocaleString('en-AU', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '—'

        return `
          <div class="video-card" onclick="openModal(${idx})">
            <div class="video-thumb">
              <div class="play-btn"><i class="ti ti-player-play"></i></div>
              <div class="type-pill">${typeLabel}</div>
              <div class="date-pill">${date}</div>
            </div>
            <div class="video-info">
              <div class="video-addr">${insp?.address || '—'}</div>
              <div class="video-meta">
                <div class="meta-chip"><i class="ti ti-clock"></i> ${recordedAt}</div>
                ${cap.gps_latitude ? `<div class="meta-chip"><i class="ti ti-map-pin"></i> GPS verified</div>` : ''}
              </div>
            </div>
            <div class="video-actions">
              <button class="btn-play" onclick="event.stopPropagation();openModal(${idx})"><i class="ti ti-player-play" style="font-size:13px"></i> Play</button>
              <a class="btn-download" href="${cap.video_url}" download="${cap.file_name || 'capture'}" onclick="event.stopPropagation()"><i class="ti ti-download" style="font-size:13px"></i> Download</a>
            </div>
          </div>`
      }).join('')
    } else {
      container.className = 'list-view'
      container.innerHTML = filteredCaptures.map((cap, idx) => {
        const insp = cap.inspection
        const date = insp?.date ? new Date(insp.date).toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' }) : '—'
        const typeLabel = cap.capture_type === 'external' ? 'External' : 'Internal'
        const typeBadge = cap.capture_type === 'external' ? 'insp-ext' : 'insp-int'
        const recordedAt = cap.recorded_at ? new Date(cap.recorded_at).toLocaleString('en-AU', { hour:'2-digit', minute:'2-digit' }) : '—'

        return `
          <div class="list-item" onclick="openModal(${idx})">
            <div class="list-thumb">
              <i class="ti ti-video"></i>
              <div class="list-type">${typeLabel}</div>
            </div>
            <div class="list-info">
              <div class="list-addr">${insp?.address || '—'}</div>
              <div class="list-meta">
                <div class="list-meta-item"><i class="ti ti-calendar"></i> ${date}</div>
                <div class="list-meta-item"><i class="ti ti-clock"></i> ${recordedAt}</div>
                ${cap.gps_latitude ? `<div class="list-meta-item"><i class="ti ti-map-pin"></i> GPS verified</div>` : ''}
                <span class="insp-badge ${typeBadge}">${typeLabel}</span>
              </div>
            </div>
            <div class="list-actions">
              <button class="btn-sm btn-sm-play" onclick="event.stopPropagation();openModal(${idx})"><i class="ti ti-player-play" style="font-size:12px"></i> Play</button>
              <a class="btn-sm btn-sm-dl" href="${cap.video_url}" download="${cap.file_name || 'capture'}" onclick="event.stopPropagation()"><i class="ti ti-download" style="font-size:12px"></i></a>
            </div>
          </div>`
      }).join('')
    }
  }

  function renderEmpty() {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state" style="margin-top:40px">
        <i class="ti ti-video-off"></i>
        <h3>Your property library is empty</h3>
        <p>Videos from your completed inspections will appear here. Create your first inspection to get started.</p>
        <a class="btn-new" href="new-inspection.html"><i class="ti ti-plus"></i> New Inspection</a>
      </div>`
  }

  window.openModal = (idx) => {
    const cap = filteredCaptures[idx]
    if (!cap) return
    const insp = cap.inspection
    const date = insp?.date ? new Date(insp.date).toLocaleDateString('en-AU', { day:'numeric', month:'long', year:'numeric' }) : '—'
    const typeLabel = cap.capture_type === 'external' ? 'External capture' : 'Internal capture'

    document.getElementById('modalVideo').src = cap.video_url
    document.getElementById('modalAddr').textContent = insp?.address || '—'
    document.getElementById('modalDate').textContent = date
    document.getElementById('modalTime').textContent = insp?.time?.slice(0,5) || '—'
    document.getElementById('modalType').textContent = typeLabel
    document.getElementById('modalGps').textContent = cap.gps_latitude
      ? `${parseFloat(cap.gps_latitude).toFixed(4)}°S, ${parseFloat(cap.gps_longitude).toFixed(4)}°E`
      : 'Not available'
    document.getElementById('modalDownload').href = cap.video_url
    document.getElementById('modalDownload').download = cap.file_name || 'capture'
    document.getElementById('modalViewInsp').href = `inspection-detail.html?id=${cap.inspection_id}`
    document.getElementById('videoModal').classList.add('open')
    document.getElementById('modalVideo').play()
  }

  function setupListeners() {
    document.getElementById('modalClose').addEventListener('click', closeModal)
    document.getElementById('videoModal').addEventListener('click', e => {
      if (e.target === document.getElementById('videoModal')) closeModal()
    })
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal() })

    document.getElementById('gridBtn').addEventListener('click', () => {
      currentView = 'grid'
      document.getElementById('gridBtn').classList.add('active')
      document.getElementById('listBtn').classList.remove('active')
      renderVideos()
    })

    document.getElementById('listBtn').addEventListener('click', () => {
      currentView = 'list'
      document.getElementById('listBtn').classList.add('active')
      document.getElementById('gridBtn').classList.remove('active')
      renderVideos()
    })

    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value.trim()
      applyFilters()
    })
  }

  function closeModal() {
    document.getElementById('videoModal').classList.remove('open')
    document.getElementById('modalVideo').pause()
    document.getElementById('modalVideo').src = ''
  }

  init()
</script>
</body>
</html>
