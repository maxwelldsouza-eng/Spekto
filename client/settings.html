<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Spekto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <script>window._googleMapsReady = function(){}</script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBDTc3xKB4nlhqjMPRQQTDYFjPiUc8wa1o&libraries=places&callback=_googleMapsReady"></script>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    :root { --purple: #560591; --tint: #F5EEFF; --bg: #F7F5FA; --border: #EEE; --green: #22C55E; --red: #E53935; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; }
    .shell { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: var(--purple); display: flex; flex-direction: column; padding: 28px 0; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 20px 28px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .s-mark { width: 36px; height: 36px; background: rgba(255,255,255,0.15); border-radius: 9px; border: 1px solid rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .s-name { font-family: 'DM Sans', sans-serif; font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -1.5px; }
    .nav { display: flex; flex-direction: column; gap: 2px; padding: 20px 12px; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 500; text-decoration: none; transition: all 0.15s; }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.15); color: #fff; }
    .nav-item i { font-size: 17px; }
    .sidebar-foot { padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
    .user-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .user-name { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 500; }
    .btn-logout-sm { width: 28px; height: 28px; background: rgba(255,255,255,0.08); border: none; border-radius: 6px; color: rgba(255,255,255,0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .btn-logout-sm:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .main { flex: 1; margin-left: 220px; display: flex; flex-direction: column; min-width: 0; }
    .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-size: 18px; font-weight: 700; color: #0D0D0D; letter-spacing: -0.3px; }
    .content { padding: 24px 28px; max-width: 720px; }
    .card { background: #fff; border-radius: 14px; border: 1px solid var(--border); padding: 22px 24px; margin-bottom: 16px; }
    .card-title { font-size: 14px; font-weight: 700; color: #0D0D0D; display: flex; align-items: center; gap: 8px; margin-bottom: 18px; }
    .card-title i { font-size: 17px; color: var(--purple); }
    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: #444; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 7px; }
    .field input, .field select { width: 100%; height: 42px; border: 1.5px solid #E0E0E0; border-radius: 8px; padding: 0 14px; font-size: 14px; color: #0D0D0D; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s; background: #fff; }
    .field input:focus, .field select:focus { border-color: var(--purple); }
    .field input:disabled { background: #F9F9F9; color: #999; cursor: not-allowed; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .row3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 14px; }
    .hint { font-size: 11px; color: #aaa; margin-top: 5px; line-height: 1.5; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #F3F3F3; }
    .toggle-row:last-child { border-bottom: none; padding-bottom: 0; }
    .toggle-label { font-size: 14px; font-weight: 500; color: #0D0D0D; }
    .toggle-sub { font-size: 12px; color: #999; margin-top: 2px; }
    .toggle { width: 44px; height: 24px; background: #E0E0E0; border-radius: 12px; position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0; border: none; }
    .toggle.on { background: var(--purple); }
    .toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: left 0.2s; }
    .toggle.on::after { left: 23px; }
    .profile-hero { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #F3F3F3; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--tint); border: 3px solid #D4B8F5; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: var(--purple); font-family: 'DM Sans', sans-serif; flex-shrink: 0; position: relative; cursor: pointer; overflow: hidden; }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .avatar-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.45); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.18s; }
    .profile-avatar:hover .avatar-overlay { opacity: 1; }
    .avatar-overlay i { font-size: 20px; color: #fff; }
    .avatar-uploading { position: absolute; inset: 0; background: rgba(0,0,0,0.55); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .avatar-uploading-spinner { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; animation: spin 0.8s linear infinite; }
    .profile-name { font-size: 18px; font-weight: 700; color: #0D0D0D; }
    .profile-email { font-size: 13px; color: #999; margin-top: 3px; }
    .profile-member { font-size: 11px; color: #bbb; margin-top: 4px; }
    .btn-save { height: 44px; background: var(--purple); color: #fff; font-size: 14px; font-weight: 700; border: none; border-radius: 10px; padding: 0 28px; cursor: pointer; font-family: 'Inter', sans-serif; transition: opacity 0.15s; }
    .btn-save:hover { opacity: 0.9; }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { height: 44px; background: #fff; color: var(--purple); font-size: 14px; font-weight: 600; border: 1.5px solid var(--purple); border-radius: 10px; padding: 0 28px; cursor: pointer; font-family: 'Inter', sans-serif; }
    .btn-logout { height: 44px; background: #fff; color: #991B1B; font-size: 14px; font-weight: 600; border: 1.5px solid #FCA5A5; border-radius: 10px; padding: 0 28px; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 8px; }
    .btn-logout:hover { background: #FFF8F8; }
    .switch-role-box { background: var(--tint); border: 1.5px solid #D4B8F5; border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
    .switch-role-icon { width: 40px; height: 40px; background: var(--purple); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .switch-role-icon i { font-size: 18px; color: #fff; }
    .switch-role-info { flex: 1; }
    .switch-role-title { font-size: 13px; font-weight: 700; color: var(--purple); }
    .switch-role-sub { font-size: 12px; color: #8B4FC8; margin-top: 2px; }
    .btn-switch { height: 36px; background: var(--purple); color: #fff; border: none; border-radius: 8px; padding: 0 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; white-space: nowrap; flex-shrink: 0; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1F2937; color: #fff; font-size: 13px; font-weight: 500; padding: 12px 20px; border-radius: 10px; z-index: 999; display: none; }
    .toast.success { background: #166534; }
    .toast.error { background: #991B1B; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: #999; font-size: 14px; gap: 10px; }
    .spinner { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #E0E0E0; border-top-color: var(--purple); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Suppress any Stripe-injected wallet / "Save with" buttons */
    #stripeCardElement iframe[name*="__privateStripeFrame"],
    .stripe-save-button, [data-stripe-button] { display: none !important; }
    .menu-toggle { display: none; width: 36px; height: 36px; border: none; background: transparent; cursor: pointer; align-items: center; justify-content: center; border-radius: 8px; padding: 0; flex-shrink: 0; }
    .menu-toggle i { font-size: 22px; color: #555; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 99; }
    .sidebar-overlay.open { display: block; }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-220px); transition: transform 0.25s ease; }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: flex; }
      .main { margin-left: 0; }
      .content { padding: 16px; }
      .topbar { padding: 14px 16px; }
      .row2 { grid-template-columns: 1fr; }
      .row3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="s-mark">
        <svg width="20" height="18" viewBox="0 0 30 26" fill="none">
          <rect x="1" y="5" width="28" height="20" rx="4" stroke="white" stroke-width="2"/>
          <path d="M10 5L11.5 2h7L20 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="15" cy="15" r="5" stroke="white" stroke-width="2"/>
          <circle cx="15" cy="15" r="2" fill="white"/>
          <circle cx="24" cy="9" r="1.5" fill="white"/>
        </svg>
      </div>
      <div class="s-name">SPEKTO</div>
    </div>
    <nav class="nav">
      <a class="nav-item" href="dashboard.html"><i class="ti ti-layout-dashboard"></i> My Inspections</a>
      <a class="nav-item" href="new-inspection.html"><i class="ti ti-plus"></i> New Inspection</a>
      <a class="nav-item" href="property-library.html"><i class="ti ti-video"></i> Property Library</a>
      <a class="nav-item" href="marketplace.html"><i class="ti ti-shopping-bag"></i> Marketplace</a>
      <a class="nav-item" href="billing.html"><i class="ti ti-credit-card"></i> Billing</a>
      <a class="nav-item" href="disputes.html"><i class="ti ti-alert-triangle"></i> My Disputes</a>
      <a class="nav-item active" href="settings.html"><i class="ti ti-settings"></i> Settings</a>
    </nav>
    <div class="sidebar-foot">
      <div class="user-row">
        <div class="avatar" id="userAvatar">?</div>
        <div class="user-name" id="userName">Loading...</div>
        <button class="btn-logout-sm" id="sidebarLogoutBtn" title="Sign out">
          <i class="ti ti-logout"></i>
        </button>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menu-toggle" id="menuToggle"><i class="ti ti-menu-2"></i></button>
      <div class="topbar-title">Settings</div>
    </div>
    <div class="content" id="mainContent">
      <div class="loading"><div class="spinner"></div> Loading settings...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  import { initNotificationBell } from '../config/notifications.js'
  const supabase = createClient(
    'https://nyvnvtxhlnjvfhcmnihh.supabase.co',
    'sb_publishable_AZSoskR9Ou8e-rl0QlPWUg_vOehXCRL'
  )

  let currentUser = null
  let userData = null
  let clientProfile = null
  let notifPrefs = {}

  const _mapsLoaded = new Promise(resolve => {
    if (typeof google !== 'undefined' && google.maps) resolve()
    else window._googleMapsReady = resolve
  })

  async function setupBillingAddressAutocomplete() {
    await _mapsLoaded
    const input = document.getElementById('billingAddress')
    if (!input) return
    const ac = new google.maps.places.Autocomplete(input, {
      types: ['address'],
      componentRestrictions: { country: 'au' }
    })
    ac.addListener('place_changed', () => {
      const place = ac.getPlace()
      if (!place.address_components) return

      const stateAbbrevMap = {
        'New South Wales': 'NSW',
        'Victoria': 'VIC',
        'Queensland': 'QLD',
        'Western Australia': 'WA',
        'South Australia': 'SA',
        'Tasmania': 'TAS',
        'Australian Capital Territory': 'ACT',
        'Northern Territory': 'NT'
      }

      let streetNumber = '', route = '', suburb = '', state = '', postcode = ''
      for (const comp of place.address_components) {
        if (comp.types.includes('street_number')) streetNumber = comp.long_name
        else if (comp.types.includes('route')) route = comp.long_name
        else if (comp.types.includes('locality')) suburb = comp.long_name
        else if (comp.types.includes('administrative_area_level_1')) {
          state = stateAbbrevMap[comp.long_name] || comp.short_name
        }
        else if (comp.types.includes('postal_code')) postcode = comp.long_name
      }

      input.value = [streetNumber, route].filter(Boolean).join(' ')
      const suburbEl = document.getElementById('billingSuburb')
      const stateEl = document.getElementById('billingState')
      const postcodeEl = document.getElementById('billingPostcode')
      if (suburbEl) suburbEl.value = suburb
      if (stateEl) stateEl.value = state
      if (postcodeEl) postcodeEl.value = postcode
    })
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.className = `toast ${type}`
    t.style.display = 'block'
    setTimeout(() => { t.style.display = 'none' }, 3000)
  }

  async function init() {
    const { data: { user } } = await supabase.auth.getUser()
    if (!user) { window.location.href = '../auth/login.html'; return; }
    currentUser = user

    initNotificationBell(supabase, currentUser.id)
    const [{ data: uData }, { data: cData }] = await Promise.all([
      supabase.from('users').select('*').eq('id', user.id).single(),
      supabase.from('client_profiles').select('*').eq('user_id', user.id).single()
    ])

    userData = uData
    clientProfile = cData

    if (userData) {
      const initials = (userData.first_name?.[0] || '') + (userData.last_name?.[0] || '')
      if (userData.avatar_url) {
        document.getElementById('userAvatar').innerHTML = `<img src="${userData.avatar_url}" alt="Avatar">`
      } else {
        document.getElementById('userAvatar').textContent = initials.toUpperCase()
      }
      document.getElementById('userName').textContent = userData.first_name + ' ' + userData.last_name
    }


    renderPage()
  }

  function renderPage() {
    const initials = (userData?.first_name?.[0] || '') + (userData?.last_name?.[0] || '')
    const memberSince = userData?.created_at
      ? new Date(userData.created_at).toLocaleDateString('en-AU', { month: 'long', year: 'numeric' })
      : ''

    document.getElementById('mainContent').innerHTML = `
      <div class="card">
        <div class="profile-hero">
          <label for="avatarInput" style="display:contents">
            <div class="profile-avatar" id="profileAvatarEl">
              ${userData?.avatar_url ? `<img src="${userData.avatar_url}" alt="Profile picture">` : `<span id="profileInitials">${initials.toUpperCase()}</span>`}
              <div class="avatar-overlay"><i class="ti ti-camera"></i></div>
            </div>
          </label>
          <input type="file" id="avatarInput" accept="image/*" style="display:none">
          <div>
            <div class="profile-name">${userData?.first_name || ''} ${userData?.last_name || ''}</div>
            <div class="profile-email">${userData?.email || ''}</div>
            <div class="profile-member">Member since ${memberSince}</div>
          </div>
        </div>
        <div class="card-title"><i class="ti ti-user"></i> Personal details</div>
        <div class="row2">
          <div class="field">
            <label>First name</label>
            <input type="text" id="firstName" value="${userData?.first_name || ''}">
          </div>
          <div class="field">
            <label>Last name</label>
            <input type="text" id="lastName" value="${userData?.last_name || ''}">
          </div>
        </div>
        <div class="row2">
          <div class="field">
            <label>Email address</label>
            <input type="email" id="email" value="${userData?.email || ''}" disabled>
            <div class="hint">Email cannot be changed here. Contact support to update your email.</div>
          </div>
          <div class="field">
            <label>Phone number</label>
            <input type="tel" id="phone" value="${userData?.phone_number || ''}" placeholder="+61 4XX XXX XXX">
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:6px">
          <button class="btn-save" id="savePersonalBtn">Save changes</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-building"></i> Company details</div>
        <div class="row2">
          <div class="field">
            <label>Company name <span style="font-size:10px;color:#aaa;font-weight:400;text-transform:none">(optional)</span></label>
            <input type="text" id="companyName" value="${clientProfile?.company_name || ''}" placeholder="Acme Property Group">
          </div>
          <div class="field">
            <label>ABN <span style="font-size:10px;color:#aaa;font-weight:400;text-transform:none">(optional)</span></label>
            <input type="text" id="abn" value="${clientProfile?.abn || ''}" placeholder="XX XXX XXX XXX">
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:6px">
          <button class="btn-save" id="saveCompanyBtn">Save changes</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-map-pin"></i> Billing address</div>
        <div class="field">
          <label>Street address</label>
          <input type="text" id="billingAddress" value="${clientProfile?.billing_address || ''}" placeholder="123 Main Street">
        </div>
        <div class="row3">
          <div class="field">
            <label>Suburb</label>
            <input type="text" id="billingSuburb" value="${clientProfile?.billing_suburb || ''}" placeholder="Sydney">
          </div>
          <div class="field">
            <label>State</label>
            <select id="billingState">
              <option value="">Select</option>
              ${['NSW','VIC','QLD','WA','SA','TAS','ACT','NT'].map(s =>
                `<option value="${s}" ${clientProfile?.billing_state === s ? 'selected' : ''}>${s}</option>`
              ).join('')}
            </select>
          </div>
          <div class="field">
            <label>Postcode</label>
            <input type="text" id="billingPostcode" value="${clientProfile?.billing_postcode || ''}" placeholder="2000" maxlength="4">
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:6px">
          <button class="btn-save" id="saveBillingBtn">Save address</button>
        </div>
      </div>

      <div class="card" id="paymentMethodCard">
        <div class="card-title"><i class="ti ti-credit-card"></i> Payment method</div>
        <div id="savedCardInfo" style="font-size:13px;color:#666;margin-bottom:14px">Loading...</div>
        <div id="stripeCardWrapper" style="display:none">
          <div id="stripeCardElement" style="border:1.5px solid #E0E0E0;border-radius:8px;padding:12px 14px;background:#fff;margin-bottom:8px"></div>
          <div id="cardError" style="color:#DC2626;font-size:12px;margin-bottom:8px;display:none"></div>
          <div style="display:flex;justify-content:flex-end;margin-top:4px">
            <button id="saveCardBtn" style="height:44px;background:#560591;color:#fff;border:none;border-radius:10px;padding:0 28px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;">Save card</button>
          </div>
        </div>
        <div style="margin-top:8px">
          <button class="btn-secondary" id="showCardFormBtn">Add card</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-bell"></i> Notifications</div>
        <p style="font-size:13px;color:#999;margin:0 0 16px">Mandatory notifications (payments, disputes, cancellations) are always on and cannot be disabled.</p>
        <div style="display:grid;grid-template-columns:1fr 68px 68px;align-items:center;padding-bottom:8px;border-bottom:1.5px solid #EDE8F5;margin-bottom:2px">
          <div></div>
          <div style="font-size:11px;font-weight:700;color:#888;text-align:center;text-transform:uppercase;letter-spacing:0.4px">Email</div>
          <div style="font-size:11px;font-weight:700;color:#888;text-align:center;text-transform:uppercase;letter-spacing:0.4px">In-App</div>
        </div>
        <div id="notifPrefsRows"><div style="padding:14px 0;color:#bbb;font-size:13px">Loading…</div></div>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-camera"></i> Switch to Scout mode</div>
        <div class="switch-role-box">
          <div class="switch-role-icon"><i class="ti ti-camera"></i></div>
          <div class="switch-role-info">
            <div class="switch-role-title">You can also use Spekto as a Scout</div>
            <div class="switch-role-sub">Accept inspection jobs, record property videos and earn money</div>
          </div>
          <button class="btn-switch" id="switchToScoutBtn">Switch to Scout</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-lock"></i> Password</div>
        <div style="font-size:13px;color:#999;margin-bottom:14px">To change your password we will send a reset link to your email address.</div>
        <button class="btn-secondary" id="resetPasswordBtn">Send password reset email</button>
      </div>

      <div style="display:flex;justify-content:flex-start;margin-top:8px;margin-bottom:32px">
        <button class="btn-logout" id="logoutBtn"><i class="ti ti-logout" style="font-size:16px"></i> Log out</button>
      </div>`

    setupListeners()
  }

  function setupListeners() {
    document.getElementById('savePersonalBtn').addEventListener('click', savePersonal)
    document.getElementById('saveCompanyBtn').addEventListener('click', saveCompany)
    document.getElementById('saveBillingBtn').addEventListener('click', saveBilling)
    loadNotifPrefs()
    document.getElementById('resetPasswordBtn').addEventListener('click', sendPasswordReset)
    document.getElementById('switchToScoutBtn').addEventListener('click', switchToScout)
    document.getElementById('logoutBtn').addEventListener('click', handleLogout)
    document.getElementById('sidebarLogoutBtn').addEventListener('click', handleLogout)
    document.getElementById('avatarInput').addEventListener('change', handleAvatarUpload)
    setupBillingAddressAutocomplete()
    setupPaymentMethod()
  }

  async function handleAvatarUpload(e) {
    const file = e.target.files[0]
    if (!file) return

    if (file.size > 5 * 1024 * 1024) {
      showToast('Image must be under 5MB.', 'error')
      e.target.value = ''
      return
    }

    const avatarEl = document.getElementById('profileAvatarEl')
    const uploadingDiv = document.createElement('div')
    uploadingDiv.className = 'avatar-uploading'
    uploadingDiv.innerHTML = '<div class="avatar-uploading-spinner"></div>'
    avatarEl.appendChild(uploadingDiv)

    try {
      const ext = file.name.split('.').pop().toLowerCase()
      const path = `${currentUser.id}/avatar.${ext}`

      const { error: uploadError } = await supabase.storage
        .from('avatars')
        .upload(path, file, { upsert: true, contentType: file.type })

      if (uploadError) throw uploadError

      const { data: { publicUrl } } = supabase.storage.from('avatars').getPublicUrl(path)
      const publicUrlWithBust = publicUrl + '?t=' + Date.now()

      const { error: dbError } = await supabase
        .from('users')
        .update({ avatar_url: publicUrl })
        .eq('id', currentUser.id)

      if (dbError) throw dbError

      userData.avatar_url = publicUrl
      avatarEl.innerHTML = `<img src="${publicUrlWithBust}" alt="Profile picture"><div class="avatar-overlay"><i class="ti ti-camera"></i></div>`
      document.getElementById('userAvatar').innerHTML = `<img src="${publicUrlWithBust}" alt="Avatar">`
      showToast('Profile picture updated')
    } catch (err) {
      showToast('Failed to upload image', 'error')
      uploadingDiv.remove()
    }
    e.target.value = ''
  }

  const SUPABASE_URL = 'https://nyvnvtxhlnjvfhcmnihh.supabase.co'
  const STRIPE_PK = 'pk_test_51TjpX1COe0yffLUxk6l80GdxR4O0xOViTSHetQPTyvSaJuNkVzJyN1xGy3Ylz22Z8BYQl5VsQ3zkvs6XfSmVpnKk00qfObOPTi'

  async function setupPaymentMethod() {
    const { data: userData } = await supabase.from('users').select('stripe_customer_id').eq('id', currentUser.id).single()
    const hasSavedCard = !!userData?.stripe_customer_id
    const infoEl = document.getElementById('savedCardInfo')
    const showFormBtn = document.getElementById('showCardFormBtn')

    if (hasSavedCard) {
      infoEl.innerHTML = '<span style="color:#166534"><i class="ti ti-circle-check" style="font-size:14px;vertical-align:-2px"></i> Payment method saved</span>'
      showFormBtn.textContent = 'Update card'
    } else {
      infoEl.textContent = 'No payment method saved. Add a card to enable instant inspection booking.'
    }

    const stripe = Stripe(STRIPE_PK)
    const elements = stripe.elements()
    const cardElement = elements.create('card', {
      hidePostalCode: true,
      style: { base: { fontFamily: 'Inter, sans-serif', fontSize: '14px', color: '#0D0D0D', '::placeholder': { color: '#bbb' } } }
    })

    showFormBtn.addEventListener('click', () => {
      document.getElementById('stripeCardWrapper').style.display = 'block'
      showFormBtn.style.display = 'none'
      cardElement.mount('#stripeCardElement')
    })

    document.getElementById('saveCardBtn').addEventListener('click', async () => {
      const saveBtn = document.getElementById('saveCardBtn')
      const errorEl = document.getElementById('cardError')
      saveBtn.disabled = true
      saveBtn.textContent = 'Saving...'
      errorEl.style.display = 'none'

      try {
        const { data: { session } } = await supabase.auth.getSession()
        const res = await fetch(`${SUPABASE_URL}/functions/v1/stripe-setup-intent`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' }
        })
        const { client_secret, error: fnErr } = await res.json()
        if (fnErr) throw new Error(fnErr)

        const { setupIntent, error: stripeErr } = await stripe.confirmCardSetup(client_secret, {
          payment_method: { card: cardElement }
        })
        if (stripeErr) throw new Error(stripeErr.message)

        const res2 = await fetch(`${SUPABASE_URL}/functions/v1/stripe-save-payment-method`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ payment_method_id: setupIntent.payment_method })
        })
        const result = await res2.json()
        if (result.error) throw new Error(result.error)

        const brand = (result.brand || 'Card').charAt(0).toUpperCase() + (result.brand || 'card').slice(1)
        infoEl.innerHTML = `<span style="color:#166534"><i class="ti ti-circle-check" style="font-size:14px;vertical-align:-2px"></i> ${brand} ending ${result.last4} saved</span>`
        document.getElementById('stripeCardWrapper').style.display = 'none'
        showFormBtn.textContent = 'Update card'
        showFormBtn.style.display = 'inline-block'
        showToast('Payment method saved successfully')
      } catch (err) {
        errorEl.textContent = err.message
        errorEl.style.display = 'block'
      } finally {
        saveBtn.disabled = false
        saveBtn.textContent = 'Save card'
      }
    })
  }

  const CLIENT_NOTIF_TYPES = [
    { type: 'inspection_accepted', label: 'Inspection accepted', sub: 'When a Scout accepts your inspection' },
    { type: 'inspection_completed', label: 'Inspection completed', sub: 'When your inspection is ready to view' },
  ]

  async function loadNotifPrefs() {
    const types = CLIENT_NOTIF_TYPES.map(t => t.type)
    const { data: prefs } = await supabase
      .from('notification_preferences')
      .select('type, email_enabled, inapp_enabled')
      .eq('user_id', currentUser.id)
      .in('type', types)

    notifPrefs = {}
    for (const p of (prefs || [])) notifPrefs[p.type] = { email: p.email_enabled, inapp: p.inapp_enabled }

    const rows = CLIENT_NOTIF_TYPES.map(({ type, label, sub }) => {
      const email = notifPrefs[type]?.email ?? true
      const inapp = notifPrefs[type]?.inapp ?? true
      return `<div style="display:grid;grid-template-columns:1fr 68px 68px;align-items:center;padding:11px 0;border-bottom:1px solid #F5F2FB">
        <div>
          <div style="font-size:14px;font-weight:500;color:#1A0533">${label}</div>
          <div style="font-size:12px;color:#aaa;margin-top:2px">${sub}</div>
        </div>
        <div style="display:flex;justify-content:center">
          <button class="toggle ${email ? 'on' : ''}" onclick="setNotifPref('${type}','email',this)"></button>
        </div>
        <div style="display:flex;justify-content:center">
          <button class="toggle ${inapp ? 'on' : ''}" onclick="setNotifPref('${type}','inapp',this)"></button>
        </div>
      </div>`
    }).join('')

    document.getElementById('notifPrefsRows').innerHTML = rows
  }

  window.setNotifPref = async (type, channel, btn) => {
    const newVal = !btn.classList.contains('on')
    btn.className = `toggle ${newVal ? 'on' : ''}`
    if (!notifPrefs[type]) notifPrefs[type] = { email: true, inapp: true }
    notifPrefs[type][channel] = newVal
    await supabase.from('notification_preferences').upsert({
      user_id: currentUser.id, type,
      email_enabled: notifPrefs[type].email,
      inapp_enabled: notifPrefs[type].inapp,
      updated_at: new Date().toISOString(),
    }, { onConflict: 'user_id,type' })
  }

  async function savePersonal() {
    const btn = document.getElementById('savePersonalBtn')
    btn.disabled = true
    btn.textContent = 'Saving...'

    const firstName = document.getElementById('firstName').value.trim()
    const lastName = document.getElementById('lastName').value.trim()
    const phone = document.getElementById('phone').value.trim()

    const { error } = await supabase
      .from('users')
      .update({ first_name: firstName, last_name: lastName, phone_number: phone || null, updated_at: new Date().toISOString() })
      .eq('id', currentUser.id)

    btn.disabled = false
    btn.textContent = 'Save changes'

    if (error) {
      showToast('Error saving changes. Please try again.', 'error')
    } else {
      const initials = (firstName?.[0] || '') + (lastName?.[0] || '')
      if (!userData?.avatar_url) {
        document.getElementById('userAvatar').textContent = initials.toUpperCase()
      }
      document.getElementById('userName').textContent = firstName + ' ' + lastName
      showToast('Personal details saved successfully')
    }
  }

  async function saveCompany() {
    const btn = document.getElementById('saveCompanyBtn')
    btn.disabled = true
    btn.textContent = 'Saving...'

    const { error } = await supabase
      .from('client_profiles')
      .update({
        company_name: document.getElementById('companyName').value.trim() || null,
        abn: document.getElementById('abn').value.trim() || null,
        updated_at: new Date().toISOString()
      })
      .eq('user_id', currentUser.id)

    btn.disabled = false
    btn.textContent = 'Save changes'

    if (error) showToast('Error saving company details.', 'error')
    else showToast('Company details saved successfully')
  }

  async function saveBilling() {
    const btn = document.getElementById('saveBillingBtn')
    btn.disabled = true
    btn.textContent = 'Saving...'

    const { error } = await supabase
      .from('client_profiles')
      .update({
        billing_address: document.getElementById('billingAddress').value.trim() || null,
        billing_suburb: document.getElementById('billingSuburb').value.trim() || null,
        billing_state: document.getElementById('billingState').value || null,
        billing_postcode: document.getElementById('billingPostcode').value.trim() || null,
        updated_at: new Date().toISOString()
      })
      .eq('user_id', currentUser.id)

    btn.disabled = false
    btn.textContent = 'Save address'

    if (error) showToast('Error saving billing address.', 'error')
    else showToast('Billing address saved successfully')
  }


  async function switchToScout() {
    const btn = document.getElementById('switchToScoutBtn')
    btn.disabled = true
    btn.textContent = 'Switching...'

    const { data: scoutProfile } = await supabase
      .from('scout_profiles')
      .select('id')
      .eq('user_id', currentUser.id)
      .single()

    if (!scoutProfile) {
      await supabase.from('scout_profiles').insert({
        user_id: currentUser.id,
        scout_status: 'PendingVerification',
        total_completions: 0,
        notification_email: true,
        notification_in_app: true
      })
    }

    await supabase
      .from('users')
      .update({ active_role: 'scout', updated_at: new Date().toISOString() })
      .eq('id', currentUser.id)

    window.location.href = '../scout/dashboard.html'
  }

  async function sendPasswordReset() {
    const btn = document.getElementById('resetPasswordBtn')
    btn.disabled = true
    btn.textContent = 'Sending...'

    const { error } = await supabase.auth.resetPasswordForEmail(currentUser.email, {
      redirectTo: 'https://maxwelldsouza-eng.github.io/Spekto/auth/reset-password.html'
    })

    btn.disabled = false
    btn.textContent = 'Send password reset email'

    if (error) showToast('Error sending reset email.', 'error')
    else showToast('Password reset email sent to ' + currentUser.email)
  }

  async function handleLogout() {
    await supabase.auth.signOut()
    window.location.href = '../auth/login.html'
  }

  init()

  document.getElementById('menuToggle').addEventListener('click', () => {
    document.querySelector('.sidebar').classList.toggle('open')
    document.getElementById('sidebarOverlay').classList.toggle('open')
  })
  document.getElementById('sidebarOverlay').addEventListener('click', () => {
    document.querySelector('.sidebar').classList.remove('open')
    document.getElementById('sidebarOverlay').classList.remove('open')
  })
  document.querySelectorAll('.sidebar .nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelector('.sidebar').classList.remove('open')
      document.getElementById('sidebarOverlay').classList.remove('open')
    })
  })
</script>
