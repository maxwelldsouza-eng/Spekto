<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Inspections - Spekto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    :root {
      --purple: #560591;
      --tint: #F5EEFF;
      --bg: #F7F5FA;
      --border: #EEE;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; }
    .shell { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: 220px; background: var(--purple);
      display: flex; flex-direction: column;
      padding: 28px 0; flex-shrink: 0;
      position: fixed; top: 0; left: 0;
      height: 100vh; z-index: 100;
    }
    .sidebar-logo {
      display: flex; align-items: center; gap: 10px;
      padding: 0 20px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .s-mark {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .s-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 20px; font-weight: 800;
      color: #fff; letter-spacing: -1.5px;
    }
    .nav { display: flex; flex-direction: column; gap: 2px; padding: 20px 12px; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      cursor: pointer; font-size: 13px;
      color: rgba(255,255,255,0.6); font-weight: 500;
      text-decoration: none; transition: all 0.15s;
    }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.15); color: #fff; }
    .nav-item i { font-size: 17px; }
    .sidebar-foot {
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .user-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .user-name { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 500; }
    .btn-logout-sm { width: 28px; height: 28px; background: rgba(255,255,255,0.08); border: none; border-radius: 6px; color: rgba(255,255,255,0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .btn-logout-sm:hover { background: rgba(255,255,255,0.15); color: #fff; }

    /* MAIN */
    .main { flex: 1; margin-left: 220px; display: flex; flex-direction: column; min-width: 0; }
    .topbar {
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex; align-items: center; justify-content: space-between; gap: 24px;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-size: 18px; font-weight: 700; color: #0D0D0D; letter-spacing: -0.3px; }
    .btn-new {
      background: var(--purple); color: #fff;
      font-size: 13px; font-weight: 700;
      border: none; border-radius: 8px;
      padding: 10px 18px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
    }
    .content { padding: 24px 28px; }

    /* STATS */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px; margin-bottom: 24px;
    }
    .stat-card {
      background: #fff; border-radius: 12px;
      border: 1px solid var(--border); padding: 18px;
    }
    .stat-label { font-size: 11px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
    .stat-val { font-size: 26px; font-weight: 800; color: #0D0D0D; letter-spacing: -0.5px; font-family: 'DM Sans', sans-serif; }

    /* FILTERS */
    .filters {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px; overflow-x: auto; padding-bottom: 2px;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      background: #fff; border: 1.5px solid #E0E0E0;
      border-radius: 20px; padding: 6px 14px;
      font-size: 12px; font-weight: 600; color: #666;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: all 0.15s;
    }
    .filter-btn.active { background: var(--purple); border-color: var(--purple); color: #fff; }

    /* TILE GRID */
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .tile {
      background: #fff; border-radius: 14px;
      border: 1px solid var(--border); padding: 18px;
      display: flex; flex-direction: column; gap: 12px;
      transition: box-shadow 0.15s;
    }
    .tile:hover { box-shadow: 0 4px 16px rgba(86,5,145,0.08); border-color: #D4B8F5; }
    .tile-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .tile-addr { font-size: 14px; font-weight: 600; color: #0D0D0D; line-height: 1.4; }
    .tile-meta { display: flex; flex-direction: column; gap: 5px; }
    .tile-meta-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888; }
    .tile-meta-row i { font-size: 13px; color: #bbb; }
    .tile-actions { display: flex; gap: 8px; padding-top: 4px; border-top: 1px solid #F3F3F3; }
    .btn-view {
      flex: 1; height: 36px; background: var(--tint);
      color: var(--purple); border: none; border-radius: 6px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .btn-edit {
      flex: 1; height: 36px; background: #fff;
      color: var(--purple); border: 1.5px solid var(--purple);
      border-radius: 6px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif;
    }

    /* BADGES */
    .badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; }
    .badge-Posted { background: #EDE4F7; color: #560591; }
    .badge-Accepted { background: #E0F2FE; color: #0369A1; }
    .badge-InProgress { background: #EDE9FE; color: #5B21B6; }
    .badge-Completed { background: #DCFCE7; color: #166534; }
    .badge-PendingPayment { background: #FEF9C3; color: #854D0E; }
    .badge-Disputed { background: #FEE2E2; color: #991B1B; }
    .badge-Paid { background: #D1FAE5; color: #065F46; }
    .badge-Cancelled { background: #F3F4F6; color: #6B7280; }
    .insp-ref { font-size: 11px; color: #aaa; font-weight: 500; margin-bottom: 6px; letter-spacing: 0.3px; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center; padding: 60px 20px;
      background: #fff; border-radius: 14px;
      border: 1px solid var(--border);
    }
    .empty-state i { font-size: 40px; color: #ddd; margin-bottom: 16px; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: #0D0D0D; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; color: #999; margin-bottom: 20px; }

    /* LOADING */
    .loading {
      display: flex; align-items: center; justify-content: center;
      padding: 60px; color: #999; font-size: 14px; gap: 10px;
    }
    .spinner {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid #E0E0E0;
      border-top-color: var(--purple);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .menu-toggle { display: none; width: 36px; height: 36px; border: none; background: transparent; cursor: pointer; align-items: center; justify-content: center; border-radius: 8px; padding: 0; flex-shrink: 0; }
    .menu-toggle i { font-size: 22px; color: #555; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 99; }
    .sidebar-overlay.open { display: block; }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-220px); transition: transform 0.25s ease; }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: flex; }
      .main { margin-left: 0; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .content { padding: 16px; }
      .topbar { padding: 14px 16px; }
      .tile-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 420px) {
      .tile-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="s-mark">
        <svg width="20" height="18" viewBox="0 0 30 26" fill="none">
          <rect x="1" y="5" width="28" height="20" rx="4" stroke="white" stroke-width="2"/>
          <path d="M10 5L11.5 2h7L20 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="15" cy="15" r="5" stroke="white" stroke-width="2"/>
          <circle cx="15" cy="15" r="2" fill="white"/>
          <circle cx="24" cy="9" r="1.5" fill="white"/>
        </svg>
      </div>
      <div class="s-name">SPEKTO</div>
    </div>
    <nav class="nav">
      <a class="nav-item active" href="dashboard.html"><i class="ti ti-layout-dashboard"></i> My Inspections</a>
      <a class="nav-item" href="new-inspection.html"><i class="ti ti-plus"></i> New Inspection</a>
      <a class="nav-item" href="property-library.html"><i class="ti ti-video"></i> Property Library</a>
      <a class="nav-item" href="marketplace.html"><i class="ti ti-shopping-bag"></i> Marketplace</a>
      <a class="nav-item" href="billing.html"><i class="ti ti-credit-card"></i> Billing</a>
      <a class="nav-item" href="disputes.html"><i class="ti ti-alert-triangle"></i> My Disputes</a>
      <a class="nav-item" href="settings.html"><i class="ti ti-settings"></i> Settings</a>
    </nav>
    <div class="sidebar-foot">
      <div class="user-row">
        <div class="avatar" id="userAvatar">?</div>
        <div class="user-name" id="userName">Loading...</div>
        <button class="btn-logout-sm" id="logoutBtn" title="Sign out">
          <i class="ti ti-logout"></i>
        </button>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menu-toggle" id="menuToggle"><i class="ti ti-menu-2"></i></button>
      <div class="topbar-title">My Inspections</div>
      <a class="btn-new" href="new-inspection.html">
        <i class="ti ti-plus" style="font-size:15px"></i> New Inspection
      </a>
    </div>

    <div class="content">
      <div class="stats">
        <div class="stat-card"><div class="stat-label">Total</div><div class="stat-val" id="statTotal">0</div></div>
        <div class="stat-card"><div class="stat-label">Active</div><div class="stat-val" id="statActive">0</div></div>
        <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-val" id="statCompleted">0</div></div>
        <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-val" id="statPending">0</div></div>
      </div>

      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="Posted">Posted</button>
        <button class="filter-btn" data-filter="Accepted">Accepted</button>
        <button class="filter-btn" data-filter="Completed">Completed</button>
        <button class="filter-btn" data-filter="PendingPayment">Pending Payment</button>
        <button class="filter-btn" data-filter="Paid">Paid</button>
        <button class="filter-btn" data-filter="Cancelled">Cancelled</button>
      </div>

      <div id="inspectionContainer">
        <div class="loading"><div class="spinner"></div> Loading inspections...</div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  import { initNotificationBell } from '../config/notifications.js'
  const supabase = createClient(
    'https://nyvnvtxhlnjvfhcmnihh.supabase.co',
    'sb_publishable_AZSoskR9Ou8e-rl0QlPWUg_vOehXCRL'
  )

  let allInspections = []
  let currentFilter = 'all'

  async function init() {
    const { data: { user } } = await supabase.auth.getUser()
    if (!user) { window.location.href = '../auth/login.html'; return; }

    const { data: userData } = await supabase
      .from('users')
      .select('first_name, last_name, active_role')
      .eq('id', user.id)
      .single()

    if (userData) {
      const initials = (userData.first_name?.[0] || '') + (userData.last_name?.[0] || '')
      document.getElementById('userAvatar').textContent = initials.toUpperCase()
      document.getElementById('userName').textContent = userData.first_name + ' ' + userData.last_name
      if (userData.active_role === 'scout') {
        window.location.href = '../scout/dashboard.html'
      }
    }

    initNotificationBell(supabase, user.id)
    await loadInspections(user.id)
  }

  async function loadInspections(clientId) {
    const { data, error } = await supabase
      .from('inspections')
      .select('*')
      .eq('client_id', clientId)
      .order('created_at', { ascending: false })

    if (error) {
      document.getElementById('inspectionContainer').innerHTML =
        '<div class="loading">Error loading inspections. Please refresh.</div>'
      return
    }

    allInspections = data || []
    updateStats()
    renderTiles(allInspections)
  }

  function updateStats() {
    const active = ['Posted', 'Accepted', 'InProgress']
    document.getElementById('statTotal').textContent = allInspections.length
    document.getElementById('statActive').textContent =
      allInspections.filter(i => active.includes(i.status)).length
    document.getElementById('statCompleted').textContent =
      allInspections.filter(i => i.status === 'Completed').length
    document.getElementById('statPending').textContent =
      allInspections.filter(i => i.status === 'PendingPayment').length
  }

  function renderTiles(inspections) {
    const container = document.getElementById('inspectionContainer')
    if (inspections.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="ti ti-clipboard-off"></i>
          <h3>No inspections yet</h3>
          <p>Create your first inspection to get started</p>
          <a class="btn-new" href="new-inspection.html" style="display:inline-flex">
            <i class="ti ti-plus"></i> New Inspection
          </a>
        </div>`
      return
    }

    const grid = document.createElement('div')
    grid.className = 'tile-grid'

    inspections.forEach(insp => {
      const date = new Date(insp.date)
      const day = date.getDate().toString().padStart(2, '0')
      const month = date.toLocaleString('default', { month: 'short' })
      const typeLabel = insp.inspection_type === 'external' ? 'External only'
        : insp.inspection_type === 'internal' ? 'Internal only'
        : 'Internal & External'
      const price = insp.pricing_snapshot?.total
        ? '$' + parseFloat(insp.pricing_snapshot.total).toFixed(2)
        : ''

      const tile = document.createElement('div')
      tile.className = 'tile'
      tile.innerHTML = `
        <div class="tile-top">
          <div style="text-align:center;background:#F7F5FA;border-radius:8px;padding:8px 12px;min-width:48px;flex-shrink:0;">
            <div style="font-size:22px;font-weight:800;color:#560591;line-height:1;font-family:'DM Sans',sans-serif">${day}</div>
            <div style="font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px">${month}</div>
          </div>
          <span class="badge badge-${insp.status}">${insp.status.replace('PendingPayment', 'Pending Payment').replace('InProgress', 'In Progress')}</span>
        </div>
        <div class="tile-addr">${insp.address}</div>
        <div class="insp-ref">#${insp.ref_number || ''}</div>
        <div class="tile-meta">
          <div class="tile-meta-row"><i class="ti ti-clock"></i> ${insp.time?.slice(0,5) || ''}</div>
          <div class="tile-meta-row"><i class="ti ti-camera"></i> ${typeLabel}</div>
          ${price ? `<div class="tile-meta-row"><i class="ti ti-credit-card"></i> ${price}</div>` : ''}
        </div>
        <div class="tile-actions">
          ${insp.status === 'Posted'
            ? `<button class="btn-edit" onclick="editInspection('${insp.id}')">Edit</button>`
            : ''}
          <button class="btn-view" onclick="viewInspection('${insp.id}')">View</button>
        </div>`
      grid.appendChild(tile)
    })

    container.innerHTML = ''
    container.appendChild(grid)
  }

  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn')
    if (!btn) return
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    currentFilter = btn.dataset.filter
    const filtered = currentFilter === 'all'
      ? allInspections
      : allInspections.filter(i => i.status === currentFilter)
    renderTiles(filtered)
  })

  window.viewInspection = (id) => {
    window.location.href = `inspection-detail.html?id=${id}`
  }

  window.editInspection = (id) => {
    window.location.href = `new-inspection.html?id=${id}`
  }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await supabase.auth.signOut()
    window.location.href = '../auth/login.html'
  })

  init()

  document.getElementById('menuToggle').addEventListener('click', () => {
    document.querySelector('.sidebar').classList.toggle('open')
    document.getElementById('sidebarOverlay').classList.toggle('open')
  })
  document.getElementById('sidebarOverlay').addEventListener('click', () => {
    document.querySelector('.sidebar').classList.remove('open')
    document.getElementById('sidebarOverlay').classList.remove('open')
  })
  document.querySelectorAll('.sidebar .nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelector('.sidebar').classList.remove('open')
      document.getElementById('sidebarOverlay').classList.remove('open')
    })
  })
</script>
</body>
</html>
