<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Spekto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #560591;
            --light-tint: #F5EEFF;
            --green: #22C55E;
            --background: #F7F5FA;
            --error-red: #E53935;
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --border-color: #D1D5DB;
            --font-inter: 'Inter', sans-serif;
            --font-dm-sans: 'DM Sans', sans-serif;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-inter);
            background-color: var(--background);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            min-height: 100vh;
            background-color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .left-panel {
            background-color: var(--purple);
            width: 45%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .spekto-logo svg {
            width: 150px;
            height: auto;
        }

        .right-panel {
            width: 55%;
            padding: 3rem 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-container h1 {
            font-family: var(--font-dm-sans);
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .form-container p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 0 2px var(--light-tint);
        }

        .name-group {
            display: flex;
            gap: 1rem;
        }
        .name-group .form-group {
            flex: 1;
        }

        .password-hint {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .role-selector {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .role-card {
            flex: 1;
            padding: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            transition: all 0.2s;
        }

        .role-card.selected {
            border-color: var(--purple);
            background-color: var(--light-tint);
            color: var(--purple);
        }
        
        .role-card:not(.selected):hover {
            border-color: #A9A9A9;
        }

        .role-card input[type="radio"] {
            display: none;
        }
        
        .role-card .role-title {
            font-size: 1rem;
            font-weight: 600;
        }

        .btn {
            width: 100%;
            padding: 0.875rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background-color: var(--green);
            color: white;
            margin-top: 1.5rem;
        }
        .btn-primary:hover {
            background-color: #16a34a;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-secondary);
            margin: 1.5rem 0;
            font-size: 0.875rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }
        .divider:not(:empty)::before {
            margin-right: .5em;
        }
        .divider:not(:empty)::after {
            margin-left: .5em;
        }

        .btn-secondary {
            background-color: white;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            background-color: #f9fafb;
        }
        .btn-secondary svg {
            width: 20px;
            height: 20px;
        }

        .error-message {
            color: var(--error-red);
            font-size: 0.8rem;
            margin-top: 0.25rem;
            display: none;
        }

        input.invalid {
            border-color: var(--error-red);
        }

        input.invalid:focus {
            box-shadow: 0 0 0 2px rgba(229, 57, 53, 0.2);
        }

        /* Mobile Responsive Styles */
        @media (max-width: 900px) {
            .right-panel {
                padding: 2rem;
            }
        }

        @media (max-width: 640px) {
            body {
                min-height: auto;
            }
            .container {
                flex-direction: column;
                min-height: 100vh;
                box-shadow: none;
            }
            .left-panel {
                width: 100%;
                height: 80px;
                padding: 1rem;
            }
            .spekto-logo svg {
                width: 100px;
            }
            .right-panel {
                width: 100%;
                padding: 1.5rem;
                flex-grow: 1;
            }
            .form-container h1 {
                font-size: 1.875rem;
            }
            .name-group {
                flex-direction: column;
                gap: 0;
            }
            .name-group .form-group {
                margin-bottom: 1.25rem;
            }
        }
    </style>
</head>
<body>

    <main class="container">
        <section class="left-panel">
            <div style="display:flex;align-items:center;gap:14px">
                <div style="width:52px;height:52px;background:rgba(255,255,255,0.15);border-radius:14px;border:1.5px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;">
    <svg width="30" height="26" viewBox="0 0 30 26" fill="none">
      <rect x="1" y="5" width="28" height="20" rx="4" stroke="white" stroke-width="2"/>
      <path d="M10 5L11.5 2h7L20 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="15" cy="15" r="5" stroke="white" stroke-width="2"/>
      <circle cx="15" cy="15" r="2" fill="white"/>
      <circle cx="24" cy="9" r="1.5" fill="white"/>
    </svg>
  </div>
  <div style="font-family:'DM Sans',sans-serif;font-size:36px;font-weight:800;color:#fff;letter-spacing:-2px;">SPEKTO</div>
</div>
        </section>

        <section class="right-panel">
            <div class="form-container">
                <h1>Create an account</h1>
                <p>Start your journey with Spekto.</p>
                <form id="registrationForm" novalidate>
                    <div class="name-group">
                        <div class="form-group">
                            <label for="firstName">First name</label>
                            <input type="text" id="firstName" name="firstName" required>
                            <div class="error-message" id="firstNameError">First name is required</div>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last name</label>
                            <input type="text" id="lastName" name="lastName" required>
                            <div class="error-message" id="lastNameError">Last name is required</div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email address</label>
                        <input type="email" id="email" name="email" required>
                        <div class="error-message" id="emailError">Please enter a valid email</div>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                        <p class="password-hint">Minimum 8 characters</p>
                        <div class="error-message" id="passwordError">Password must be at least 8 characters</div>
                    </div>
                    <div class="form-group">
                        <label>Select your role</label>
                        <div class="role-selector">
                            <label class="role-card selected" for="role-client">
                                <input type="radio" id="role-client" name="role" value="Client" checked>
                                <div class="role-title">Client</div>
                            </label>
                            <label class="role-card" for="role-scout">
                                <input type="radio" id="role-scout" name="role" value="Scout">
                                <div class="role-title">Scout</div>
                            </label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" id="createAccountBtn">Create account</button>
                </form>

                <div class="divider">or sign up with</div>

                <button class="btn btn-secondary" id="googleSignInBtn">
                    <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.223,0-9.657-3.467-11.303-8H6.306C9.656,39.663,16.318,44,24,44z"/>
                        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.574l6.19,5.238C39.901,35.636,44,30.418,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                    </svg>
                    Continue with Google
                </button>
            </div>
        </section>
    </main>
    
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const supabase = createClient(
            'https://nyvnvtxhlnjvfhcmnihh.supabase.co',
            'sb_publishable_AZSoskR9Ou8e-rl0QlPWUg_vOehXCRL'
        );

        // DOM Elements
        const form = document.getElementById('registrationForm');
        const firstNameInput = document.getElementById('firstName');
        const lastNameInput = document.getElementById('lastName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const roleCards = document.querySelectorAll('.role-card');
        const googleSignInBtn = document.getElementById('googleSignInBtn');

        // Validation Helpers
        const showError = (input, message) => {
            const errorDiv = document.getElementById(`${input.id}Error`);
            input.classList.add('invalid');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        };

        const clearError = (input) => {
            const errorDiv = document.getElementById(`${input.id}Error`);
            input.classList.remove('invalid');
            errorDiv.style.display = 'none';
        };

        // Event Listeners
        roleCards.forEach(card => {
            card.addEventListener('click', () => {
                document.querySelector('.role-card.selected').classList.remove('selected');
                card.classList.add('selected');
                card.querySelector('input[type="radio"]').checked = true;
            });
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const isValid = validateForm();
            if (!isValid) return;

            const firstName = firstNameInput.value.trim();
            const lastName = lastNameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const role = document.querySelector('input[name="role"]:checked').value;
            
            try {
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            first_name: firstName,
                            last_name: lastName,
                            role: role.toLowerCase()
                        }
                    }
                });

                if (authError) throw authError;
                if (!authData.user) throw new Error('Sign up failed. Please try again.');

                if (authData.session) {
                    window.location.href = role.toLowerCase() === 'scout'
                        ? '../scout/dashboard.html'
                        : '../client/dashboard.html'
                } else {
                    window.location.href = 'verify-email.html'
                }

            } catch (error) {
                showError(emailInput, error.message || 'Sign up failed. Please try again.');
            }
        });

        googleSignInBtn.addEventListener('click', async () => {
            try {
                const { error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: 'http://localhost:3000/auth/select-role.html'
                    }
                });
                if (error) throw error;
            } catch (error) {
                console.error('Google Sign-In Error:', error.message);
                alert('Could not sign in with Google. Please try again.');
            }
        });
        
        // Clear errors on input
        [firstNameInput, lastNameInput, emailInput, passwordInput].forEach(input => {
            input.addEventListener('input', () => clearError(input));
        });

        // Validation Logic
        const validateForm = () => {
            let isValid = true;
            
            // Clear all previous errors
            [firstNameInput, lastNameInput, emailInput, passwordInput].forEach(clearError);

            if (firstNameInput.value.trim() === '') {
                showError(firstNameInput, 'First name is required');
                isValid = false;
            }
            if (lastNameInput.value.trim() === '') {
                showError(lastNameInput, 'Last name is required');
                isValid = false;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(emailInput.value.trim())) {
                showError(emailInput, 'Please enter a valid email address');
                isValid = false;
            }
            if (passwordInput.value.length < 8) {
                showError(passwordInput, 'Password must be at least 8 characters');
                isValid = false;
            }
            
            return isValid;
        };

    </script>
</body>
</html>
