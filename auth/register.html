    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const supabase = createClient(
            'https://nyvnvtxhlnjvfhcmnihh.supabase.co',
            'sb_publishable_AZSoskR9Ou8e-rl0QlPWUg_vOehXCRL'
        );

        // DOM Elements
        const form = document.getElementById('registrationForm');
        const firstNameInput = document.getElementById('firstName');
        const lastNameInput = document.getElementById('lastName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const roleCards = document.querySelectorAll('.role-card');
        const googleSignInBtn = document.getElementById('googleSignInBtn');

        // Validation Helpers
        const showError = (input, message) => {
            const errorDiv = document.getElementById(`${input.id}Error`);
            input.classList.add('invalid');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        };

        const clearError = (input) => {
            const errorDiv = document.getElementById(`${input.id}Error`);
            input.classList.remove('invalid');
            errorDiv.style.display = 'none';
        };

        // Event Listeners
        roleCards.forEach(card => {
            card.addEventListener('click', () => {
                document.querySelector('.role-card.selected').classList.remove('selected');
                card.classList.add('selected');
                card.querySelector('input[type="radio"]').checked = true;
            });
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const isValid = validateForm();
            if (!isValid) return;

            const firstName = firstNameInput.value.trim();
            const lastName = lastNameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const role = document.querySelector('input[name="role"]:checked').value;
            
            try {
                // 1. Sign up the user
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });

                if (authError) throw authError;
                if (!authData.user) throw new Error("Sign up successful, but no user data returned.");

                const userId = authData.user.id;

                // 2. Insert into 'users' table
                const { error: userError } = await supabase.from('users').insert({
                    id: userId,
                    first_name: firstName,
                    last_name: lastName,
                    email: email,
                    role: role.toLowerCase(),
                    active_role: role.toLowerCase(),
                    is_email_verified: false,
                    is_active: true
                });

                if (userError) throw userError;

                // 3. Insert into role-specific profile table
                if (role.toLowerCase() === 'client') {
                    const { error: clientProfileError } = await supabase.from('client_profiles').insert({
                        user_id: userId,
                        notification_email: true,
                        notification_in_app: true
                    });
                    if (clientProfileError) throw clientProfileError;
                } else if (role.toLowerCase() === 'scout') {
                    const { error: scoutProfileError } = await supabase.from('scout_profiles').insert({
                        user_id: userId,
                        scout_status: 'PendingVerification',
                        total_completions: 0,
                        notification_email: true,
                        notification_in_app: true
                    });
                    if (scoutProfileError) throw scoutProfileError;
                }
                
                // 4. Redirect
                window.location.href = 'verify-email.html';

            } catch (error) {
                console.error('Sign-up Error:', error.message);
                showError(emailInput, error.message); // Display error, often "User already registered"
            }
        });

        googleSignInBtn.addEventListener('click', async () => {
            try {
                const { error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: 'http://localhost:3000/auth/select-role.html'
                    }
                });
                if (error) throw error;
            } catch (error) {
                console.error('Google Sign-In Error:', error.message);
                alert('Could not sign in with Google. Please try again.');
            }
        });
        
        // Clear errors on input
        [firstNameInput, lastNameInput, emailInput, passwordInput].forEach(input => {
            input.addEventListener('input', () => clearError(input));
        });

        // Validation Logic
        const validateForm = () => {
            let isValid = true;
            
            // Clear all previous errors
            [firstNameInput, lastNameInput, emailInput, passwordInput].forEach(clearError);

            if (firstNameInput.value.trim() === '') {
                showError(firstNameInput, 'First name is required');
                isValid = false;
            }
            if (lastNameInput.value.trim() === '') {
                showError(lastNameInput, 'Last name is required');
                isValid = false;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(emailInput.value.trim())) {
                showError(emailInput, 'Please enter a valid email address');
                isValid = false;
            }
            if (passwordInput.value.length < 8) {
                showError(passwordInput, 'Password must be at least 8 characters');
                isValid = false;
            }
            
            return isValid;
        };

    </script>
</body>
