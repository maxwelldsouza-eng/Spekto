<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Detail - Spekto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    :root { --purple: #560591; --tint: #F5EEFF; --bg: #F7F5FA; --border: #EEE; --green: #22C55E; --red: #DC2626; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; }
    .shell { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: var(--purple); display: flex; flex-direction: column; padding: 28px 0; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 20px 28px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .s-mark { width: 36px; height: 36px; background: rgba(255,255,255,0.15); border-radius: 9px; border: 1px solid rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .s-name { font-family: 'DM Sans', sans-serif; font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -1.5px; }
    .nav { display: flex; flex-direction: column; gap: 2px; padding: 20px 12px; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 500; text-decoration: none; transition: all 0.15s; }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.15); color: #fff; }
    .nav-item i { font-size: 17px; }
    .sidebar-foot { padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
    .user-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .user-name { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 500; }
    .btn-logout-sm { width: 28px; height: 28px; background: rgba(255,255,255,0.08); border: none; border-radius: 6px; color: rgba(255,255,255,0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .btn-logout-sm:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .main { flex: 1; margin-left: 220px; display: flex; flex-direction: column; min-width: 0; }
    .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 50; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .back-btn { width: 36px; height: 36px; border-radius: 8px; border: 1.5px solid #E0E0E0; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--purple); font-size: 18px; text-decoration: none; }
    .topbar-title { font-size: 18px; font-weight: 700; color: #0D0D0D; letter-spacing: -0.3px; }
    .badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; }
    .badge-Posted { background: #EDE4F7; color: #560591; }
    .badge-Accepted { background: #E0F2FE; color: #0369A1; }
    .badge-InProgress { background: #EDE9FE; color: #5B21B6; }
    .badge-Completed { background: #DCFCE7; color: #166534; }
    .badge-PendingPayment { background: #FEF9C3; color: #854D0E; }
    .badge-Disputed { background: #FEE2E2; color: #991B1B; }
    .badge-Paid { background: #D1FAE5; color: #065F46; }
    .topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .btn-action { height: 40px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 6px; padding: 0 18px; }
    .btn-record { background: var(--green); color: #fff; }
    .btn-record:hover { background: #16a34a; }
    .btn-close { background: #fff; color: #444; border: 1.5px solid #E0E0E0 !important; }
    .btn-decline-job { background: #fff; color: var(--red); border: 1.5px solid #FCA5A5 !important; }
    .btn-decline-job:hover { background: #FFF8F8; }
    .decline-confirm-panel { background: #FFF8F8; border-bottom: 1px solid #FEE2E2; padding: 14px 28px; display: none; }
    .decline-inner { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .decline-msg { font-size: 13px; color: #991B1B; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .btn-confirm-decline { background: #991B1B; color: #fff; border: none; border-radius: 7px; padding: 0 16px; height: 36px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
    .btn-cancel-decline { background: #fff; color: #666; border: 1.5px solid #E0E0E0; border-radius: 7px; padding: 0 14px; height: 36px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
    .dispute-banner { background: #FFF8F8; border-bottom: 1px solid #FEE2E2; padding: 14px 28px; }
    .dispute-inner { display: flex; align-items: center; gap: 10px; }
    .dispute-icon { color: #991B1B; font-size: 18px; }
    .dispute-text { font-size: 13px; color: #991B1B; font-weight: 500; }
    .content { padding: 24px 28px; max-width: 720px; margin: 0 auto; }
    .card { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 20px 24px; margin-bottom: 16px; }
    .section-label { font-size: 12px; font-weight: 600; color: #888; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 14px; }
    .detail-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .det-label { font-size: 11px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
    .det-val { font-size: 14px; font-weight: 600; color: #0D0D0D; }
    .det-val.link { color: var(--purple); text-decoration: none; }
    .payout-highlight { background: #DCFCE7; border-radius: 10px; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
    .payout-label { font-size: 13px; font-weight: 600; color: #166534; }
    .payout-amount { font-size: 24px; font-weight: 800; color: #166534; font-family: 'DM Sans', sans-serif; }
    .instructions-list { display: flex; flex-direction: column; gap: 10px; }
    .instruction-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--tint); border-radius: 8px; border: 1px solid #D4B8F5; }
    .instruction-item i { font-size: 16px; color: var(--purple); flex-shrink: 0; }
    .instruction-text { font-size: 13px; color: var(--purple); font-weight: 500; }
    .captures-section { background: #fff; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 16px; }
    .captures-header { padding: 16px 20px; border-bottom: 1px solid #F3F3F3; display: flex; align-items: center; gap: 8px; }
    .captures-title { font-size: 14px; font-weight: 700; color: var(--purple); flex: 1; }
    .capture-count-badge { background: var(--tint); color: var(--purple); font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 10px; }
    .captures-list { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
    .capture-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #F9F9F9; border-radius: 8px; border: 1px solid #F0F0F0; }
    .capture-icon { width: 36px; height: 36px; background: var(--tint); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .capture-icon i { font-size: 17px; color: var(--purple); }
    .capture-name { font-size: 13px; font-weight: 600; color: #0D0D0D; }
    .capture-meta { font-size: 11px; color: #999; margin-top: 2px; }
    .capture-gps { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #16a34a; font-weight: 500; margin-top: 3px; }
    .capture-gps i { font-size: 12px; }
    .state-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 48px 24px; margin-bottom: 16px; text-align: center; }
    .state-icon { font-size: 32px; color: var(--purple); margin-bottom: 16px; }
    .state-heading { font-size: 16px; font-weight: 700; color: #0D0D0D; margin-bottom: 8px; }
    .state-sub { font-size: 13px; color: #999; line-height: 1.6; max-width: 380px; margin: 0 auto 20px; }
    .btn-start-recording { display: inline-flex; align-items: center; gap: 8px; background: var(--green); color: #fff; border: none; border-radius: 10px; padding: 12px 24px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; text-decoration: none; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: #999; font-size: 14px; gap: 10px; }
    .spinner { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #E0E0E0; border-top-color: var(--purple); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .dispute-response-panel { background: #FFFBEB; border-bottom: 1px solid #FDE68A; padding: 20px 28px; }
    .dispute-response-inner { max-width: 680px; }
    .dispute-response-heading { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .dispute-response-heading i { font-size: 20px; color: #B45309; }
    .dispute-response-title { font-size: 15px; font-weight: 700; color: #92400E; }
    .dispute-response-sub { font-size: 13px; color: #92400E; line-height: 1.55; margin-bottom: 14px; }
    .dispute-response-textarea { width: 100%; min-height: 80px; border: 1.5px solid #FCD34D; border-radius: 8px; padding: 10px 12px; font-size: 13px; font-family: 'Inter', sans-serif; color: #0D0D0D; background: #fff; resize: vertical; outline: none; transition: border-color 0.15s; }
    .dispute-response-textarea:focus { border-color: #B45309; }
    .btn-submit-response { margin-top: 10px; height: 40px; background: var(--purple); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; padding: 0 20px; display: inline-flex; align-items: center; gap: 6px; }
    .btn-submit-response:disabled { opacity: 0.6; cursor: not-allowed; }
    .dispute-response-error { font-size: 12px; color: var(--red); margin-top: 6px; display: none; }
    .dispute-submitted-panel { background: #EFF6FF; border-bottom: 1px solid #BFDBFE; padding: 16px 28px; }
    .dispute-submitted-inner { display: flex; align-items: center; gap: 10px; }
    .dispute-submitted-inner i { font-size: 18px; color: #1D4ED8; }
    .dispute-submitted-text { font-size: 13px; color: #1E40AF; font-weight: 500; }
    .dispute-chat { background: #fff; border: 1.5px solid #EEE; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .dispute-chat-title { font-size: 13px; font-weight: 700; color: #333; margin-bottom: 14px; }
    .chat-thread { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .chat-bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
    .chat-bubble.admin { align-self: flex-start; background: #F3F4F6; color: #333; border-bottom-left-radius: 4px; }
    .chat-bubble.self { align-self: flex-end; background: #22C55E; color: #fff; border-bottom-right-radius: 4px; }
    .chat-sender { font-size: 11px; font-weight: 600; margin-bottom: 3px; opacity: 0.7; }
    .chat-time { font-size: 10px; margin-top: 4px; opacity: 0.6; }
    .chat-empty { text-align: center; font-size: 13px; color: #999; padding: 20px 0; }
    .chat-input-row { display: flex; gap: 8px; }
    .chat-textarea { flex: 1; border: 1.5px solid #E0E0E0; border-radius: 8px; padding: 10px 12px; font-size: 13px; font-family: Inter, sans-serif; resize: none; height: 60px; }
    .chat-textarea:focus { outline: none; border-color: #22C55E; }
    .btn-chat-send { height: 60px; padding: 0 18px; background: #22C55E; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: Inter, sans-serif; }
    .btn-chat-send:disabled { opacity: 0.5; cursor: not-allowed; }
    .menu-toggle { display: none; width: 36px; height: 36px; border: none; background: transparent; cursor: pointer; align-items: center; justify-content: center; border-radius: 8px; padding: 0; flex-shrink: 0; }
    .menu-toggle i { font-size: 22px; color: #555; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 99; }
    .sidebar-overlay.open { display: block; }
    @media (max-width: 768px) {
      .btn-submit-response { width: 100%; justify-content: center; }
      .sidebar { transform: translateX(-220px); transition: transform 0.25s ease; }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: flex; }
      .main { margin-left: 0; }
      .content { padding: 16px; }
      .topbar { padding: 14px 16px; }
      .detail-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="s-mark">
        <svg width="20" height="18" viewBox="0 0 30 26" fill="none">
          <rect x="1" y="5" width="28" height="20" rx="4" stroke="white" stroke-width="2"/>
          <path d="M10 5L11.5 2h7L20 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="15" cy="15" r="5" stroke="white" stroke-width="2"/>
          <circle cx="15" cy="15" r="2" fill="white"/>
          <circle cx="24" cy="9" r="1.5" fill="white"/>
        </svg>
      </div>
      <div class="s-name">SPEKTO</div>
    </div>
    <nav class="nav">
      <a class="nav-item active" href="dashboard.html"><i class="ti ti-layout-dashboard"></i> My Jobs</a>
      <a class="nav-item" href="earnings.html"><i class="ti ti-wallet"></i> Earnings</a>
      <a class="nav-item" href="disputes.html"><i class="ti ti-alert-triangle"></i> My Disputes</a>
      <a class="nav-item" href="settings.html"><i class="ti ti-settings"></i> Settings</a>
    </nav>
    <div class="sidebar-foot">
      <div class="user-row">
        <div class="avatar" id="userAvatar">?</div>
        <div class="user-name" id="userName">Loading...</div>
        <button class="btn-logout-sm" id="logoutBtn" title="Sign out">
          <i class="ti ti-logout"></i>
        </button>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menuToggle"><i class="ti ti-menu-2"></i></button>
        <a class="back-btn" href="dashboard.html">&#8592;</a>
        <div class="topbar-title">Job Detail</div>
        <span class="badge" id="statusBadge"></span>
      </div>
      <div class="topbar-right" id="topbarActions"></div>
    </div>

    <div id="disputeBanner"></div>

    <div class="decline-confirm-panel" id="declinePanel">
      <div class="decline-inner">
        <div class="decline-msg"><i class="ti ti-alert-triangle"></i> Are you sure you want to decline this job? It will be returned to the available pool for another Scout.</div>
        <button class="btn-confirm-decline" id="confirmDeclineBtn">Yes, decline job</button>
        <button class="btn-cancel-decline" id="cancelDeclineBtn">Keep job</button>
      </div>
    </div>

    <div class="content" id="mainContent">
      <div class="loading"><div class="spinner"></div> Loading job details...</div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  import { initNotificationBell } from '../config/notifications.js'
  const supabase = createClient(
    'https://nyvnvtxhlnjvfhcmnihh.supabase.co',
    'sb_publishable_AZSoskR9Ou8e-rl0QlPWUg_vOehXCRL'
  )

  let inspection = null
  let dispute = null
  let captures = []
  let currentUser = null
  let scoutVerified = false
  let scoutConnectActive = false
  let scoutRTWApproved = false

  const urlParams = new URLSearchParams(window.location.search)
  const inspectionId = urlParams.get('id')

  async function init() {
    const { data: { user } } = await supabase.auth.getUser()
    if (!user) { window.location.href = '../auth/login.html'; return; }
    currentUser = user

    const { data: userData } = await supabase
      .from('users')
      .select('first_name, last_name')
      .eq('id', user.id)
      .single()

    if (userData) {
      const initials = (userData.first_name?.[0] || '') + (userData.last_name?.[0] || '')
      document.getElementById('userAvatar').textContent = initials.toUpperCase()
      document.getElementById('userName').textContent = userData.first_name + ' ' + userData.last_name
    }

    const [{ data: scoutProfileData }, { data: rtwData }] = await Promise.all([
      supabase.from('scout_profiles').select('id_verified, stripe_connect_status').eq('user_id', currentUser.id).single(),
      supabase.from('rights_to_work').select('vsure_status, admin_decision, visa_expiry_date').eq('scout_id', currentUser.id).eq('is_current', true).maybeSingle()
    ])
    scoutVerified = scoutProfileData?.id_verified === true
    scoutConnectActive = scoutProfileData?.stripe_connect_status === 'Active'
    scoutRTWApproved = !!rtwData && (
      rtwData.vsure_status === 'citizen_pr' ||
      rtwData.vsure_status === 'verified_unlimited' ||
      rtwData.admin_decision === 'allowed'
    ) && (!rtwData.visa_expiry_date || new Date(rtwData.visa_expiry_date) > new Date())

    initNotificationBell(supabase, currentUser.id)
    if (!inspectionId) { window.location.href = 'dashboard.html'; return; }
    await loadInspection()
  }

  async function loadInspection() {
    const { data, error } = await supabase
      .from('inspections')
      .select('*, instructions(*)')
      .eq('id', inspectionId)
      .single()

    if (error || !data) { window.location.href = 'dashboard.html'; return; }
    inspection = data

    if (inspection.scout_id && inspection.scout_id !== currentUser.id) {
      window.location.href = 'dashboard.html'
      return
    }

    if (['Completed','PendingPayment','Paid','Disputed'].includes(inspection.status)) {
      const { data: captureData } = await supabase
        .from('captures')
        .select('*')
        .eq('inspection_id', inspectionId)
        .eq('is_deleted', false)
        .eq('is_replaced', false)
        .order('capture_type', { ascending: true })
        .order('recorded_at', { ascending: true })
      captures = captureData || []
    }

    if (inspection.status === 'Disputed') {
      const { data: disputeData } = await supabase
        .from('disputes')
        .select('id, status, reason, description, scout_responded, due_at')
        .eq('inspection_id', inspectionId)
        .order('created_at', { ascending: false })
        .limit(1)
        .single()
      dispute = disputeData
    }

    render()
  }

  function render() {
    const badge = document.getElementById('statusBadge')
    badge.className = `badge badge-${inspection.status}`
    badge.textContent = inspection.status
      .replace('PendingPayment','Pending Payment')
      .replace('InProgress','In Progress')

    if (inspection.status === 'Disputed') {
      renderDisputeBanner()
    }

    renderActions()
    renderContent()
    setupDeclinePanel()
  }

  function renderDisputeBanner() {
    const banner = document.getElementById('disputeBanner')

    if (!dispute) {
      banner.innerHTML = `
        <div class="dispute-banner">
          <div class="dispute-inner">
            <i class="ti ti-alert-triangle dispute-icon"></i>
            <div class="dispute-text">A dispute has been raised on this inspection. Your payment is on hold pending resolution by Spekto support.</div>
          </div>
        </div>`
      return
    }

    if (dispute.status === 'AwaitingResponse' && !dispute.scout_responded) {
      const dueText = dispute.due_at
        ? new Date(dispute.due_at).toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' })
        : 'as soon as possible'
      banner.innerHTML = `
        <div class="dispute-response-panel" id="disputeResponsePanel">
          <div class="dispute-response-inner">
            <div class="dispute-response-heading">
              <i class="ti ti-alert-circle"></i>
              <div class="dispute-response-title">Your response is required</div>
            </div>
            <div class="dispute-response-sub">Spekto support is reviewing this dispute and requires your account of the recording. Please respond by ${dueText}.</div>
            <textarea id="disputeResponseText" class="dispute-response-textarea" placeholder="Describe what happened during the recording — the more detail the better."></textarea>
            <div class="dispute-response-error" id="disputeResponseError">Please enter a response before submitting.</div>
            <button class="btn-submit-response" id="submitResponseBtn">
              <i class="ti ti-send"></i> Submit Response
            </button>
          </div>
        </div>`

      document.getElementById('submitResponseBtn').addEventListener('click', handleSubmitResponse)
    } else if (dispute.status === 'AwaitingResponse' && dispute.scout_responded) {
      renderDisputeSubmittedPanel()
    } else {
      banner.innerHTML = `
        <div class="dispute-banner">
          <div class="dispute-inner">
            <i class="ti ti-alert-triangle dispute-icon"></i>
            <div class="dispute-text">A dispute has been raised on this inspection. Your payment is on hold pending resolution by Spekto support.</div>
          </div>
        </div>`
    }
  }

  function renderDisputeSubmittedPanel() {
    document.getElementById('disputeBanner').innerHTML = `
      <div class="dispute-submitted-panel">
        <div class="dispute-submitted-inner">
          <i class="ti ti-info-circle"></i>
          <div class="dispute-submitted-text">Response submitted — Spekto support will review your response and notify you of the outcome.</div>
        </div>
      </div>`
  }

  async function handleSubmitResponse() {
    const textarea = document.getElementById('disputeResponseText')
    const errorEl = document.getElementById('disputeResponseError')
    const btn = document.getElementById('submitResponseBtn')
    const responseText = textarea.value.trim()

    errorEl.style.display = 'none'

    if (!responseText) {
      errorEl.style.display = 'block'
      return
    }

    btn.disabled = true
    btn.innerHTML = '<i class="ti ti-loader" style="animation:spin 0.8s linear infinite"></i> Submitting...'

    const { error: msgError } = await supabase
      .from('dispute_messages')
      .insert({
        dispute_id: dispute.id,
        sent_by_type: 'scout',
        sent_by_id: currentUser.id,
        message: responseText,
        message_type: 'ScoutResponse',
        is_internal: false,
        recipient_type: 'admin'
      })

    if (msgError) {
      btn.disabled = false
      btn.innerHTML = '<i class="ti ti-send"></i> Submit Response'
      errorEl.textContent = 'Failed to submit response. Please try again.'
      errorEl.style.display = 'block'
      return
    }

    const { error: updateError } = await supabase
      .from('disputes')
      .update({ scout_responded: true })
      .eq('id', dispute.id)

    if (updateError) {
      btn.disabled = false
      btn.innerHTML = '<i class="ti ti-send"></i> Submit Response'
      errorEl.textContent = 'Response saved but status could not be updated. Please contact support.'
      errorEl.style.display = 'block'
      return
    }

    dispute.scout_responded = true
    renderDisputeSubmittedPanel()
  }

  function renderActions() {
    const container = document.getElementById('topbarActions')
    container.innerHTML = ''

    if (inspection.status === 'Posted') {
      const acceptBtn = document.createElement('button')
      acceptBtn.className = 'btn-action btn-record'  // green button, reuse existing style
      acceptBtn.innerHTML = '<i class="ti ti-check"></i> Accept Job'
      acceptBtn.addEventListener('click', async () => {
        if (!scoutVerified) {
          showVerificationModal()
          return
        }
        if (!scoutConnectActive) {
          showConnectModal()
          return
        }
        if (!scoutRTWApproved) {
          showRTWModal()
          return
        }
        acceptBtn.disabled = true
        acceptBtn.textContent = 'Accepting...'
        const { error } = await supabase
          .from('inspections')
          .update({ scout_id: currentUser.id, status: 'Accepted', updated_at: new Date().toISOString() })
          .eq('id', inspectionId)
          .eq('status', 'Posted')
        if (error) {
          alert('Could not accept this job. It may have already been taken.')
          acceptBtn.disabled = false
          acceptBtn.innerHTML = '<i class="ti ti-check"></i> Accept Job'
        } else {
          window.location.reload()
        }
      })
      container.appendChild(acceptBtn)
    }

    if (inspection.status === 'Accepted' || inspection.status === 'InProgress') {
      const declineBtn = document.createElement('button')
      declineBtn.className = 'btn-action btn-decline-job'
      declineBtn.innerHTML = '<i class="ti ti-x"></i> Decline Job'
      declineBtn.addEventListener('click', () => {
        document.getElementById('declinePanel').style.display = 'block'
        declineBtn.disabled = true
      })
      container.appendChild(declineBtn)

      const recordBtn = document.createElement('a')
      recordBtn.href = `recording.html?id=${inspection.id}`
      recordBtn.className = 'btn-action btn-record'
      recordBtn.innerHTML = '<i class="ti ti-video"></i> Start Recording'
      container.insertBefore(recordBtn, declineBtn)
    }
  }

  function setupDeclinePanel() {
    document.getElementById('confirmDeclineBtn').addEventListener('click', async () => {
      const { error } = await supabase
        .from('inspections')
        .update({
          scout_id: null,
          status: 'Posted',
          updated_at: new Date().toISOString()
        })
        .eq('id', inspectionId)
        .eq('scout_id', currentUser.id)
        .in('status', ['Accepted', 'InProgress'])

      if (!error) {
        window.location.href = 'dashboard.html'
      } else {
        alert('Could not decline this job. Please try again.')
        document.getElementById('declinePanel').style.display = 'none'
      }
    })

    document.getElementById('cancelDeclineBtn').addEventListener('click', () => {
      document.getElementById('declinePanel').style.display = 'none'
      const declineBtn = document.querySelector('.btn-decline-job')
      if (declineBtn) declineBtn.disabled = false
    })
  }

  function renderContent() {
    const typeLabel = inspection.inspection_type === 'external' ? 'External Only'
      : inspection.inspection_type === 'internal' ? 'Internal Only'
      : 'Internal & External'
    const payout = inspection.pricing_snapshot?.pay_to_scout
      ? '$' + parseFloat(inspection.pricing_snapshot.pay_to_scout).toFixed(2)
      : null

    let html = `
      <div class="card">
        <div class="section-label">Job Details</div>
        <div class="detail-grid">
          <div><div class="det-label">Reference</div><div class="det-val">#${inspection.ref_number || '—'}</div></div>
          <div><div class="det-label">Address</div><div class="det-val" style="font-size:13px">${inspection.address}</div></div>
          <div><div class="det-label">Date</div><div class="det-val">${new Date(inspection.date).toLocaleDateString('en-AU', { day:'numeric', month:'long', year:'numeric' })}</div></div>
          <div><div class="det-label">Time</div><div class="det-val">${inspection.time?.slice(0,5) || '—'}</div></div>
          <div><div class="det-label">Type</div><div class="det-val">${typeLabel}</div></div>
          <div><div class="det-label">Status</div><div class="det-val">${inspection.status.replace('PendingPayment','Pending Payment').replace('InProgress','In Progress')}</div></div>
          ${inspection.property_link ? `<div><div class="det-label">Property link</div><a class="det-val link" href="${inspection.property_link}" target="_blank">View listing ↗</a></div>` : '<div></div>'}
        </div>
        ${payout ? `
        <div class="payout-highlight">
          <div class="payout-label"><i class="ti ti-wallet" style="font-size:16px;vertical-align:-2px;margin-right:6px"></i>Your payout for this job</div>
          <div class="payout-amount">${payout}</div>
        </div>` : ''}
      </div>`

    if (inspection.instructions && inspection.instructions.length > 0) {
      html += `
        <div class="card">
          <div class="section-label">Recording Instructions</div>
          <div class="instructions-list">
            ${inspection.instructions
              .sort((a,b) => a.display_order - b.display_order)
              .map(inst => `
                <div class="instruction-item">
                  <i class="ti ti-checkbox"></i>
                  <div class="instruction-text">${inst.text}</div>
                </div>`).join('')}
          </div>
        </div>`
    }

    if (inspection.status === 'Accepted' || inspection.status === 'InProgress') {
      html += `
        <div class="state-card">
          <div class="state-icon"><i class="ti ti-video"></i></div>
          <div class="state-heading">Ready to record</div>
          <div class="state-sub">Head to the property address and start recording when you arrive. Make sure GPS is enabled on your device.</div>
          <a class="btn-start-recording" href="recording.html?id=${inspection.id}">
            <i class="ti ti-video"></i> Start Recording
          </a>
        </div>`
    }

    if (['Completed','PendingPayment','Paid','Disputed'].includes(inspection.status)) {
      const types = inspection.inspection_type === 'external' ? ['external']
        : inspection.inspection_type === 'internal' ? ['internal']
        : ['external', 'internal']

      types.forEach(type => {
        const typeCaptures = captures.filter(c => c.capture_type === type)
        const label = type === 'external' ? 'External Captures' : 'Internal Captures'
        const icon = type === 'external' ? 'ti-home' : 'ti-door-enter'

        html += `
          <div class="captures-section">
            <div class="captures-header">
              <i class="ti ${icon}" style="font-size:16px;color:var(--purple)"></i>
              <div class="captures-title">${label}</div>
              <span class="capture-count-badge">${typeCaptures.length} video${typeCaptures.length !== 1 ? 's' : ''}</span>
            </div>
            <div class="captures-list">
              ${typeCaptures.length === 0
                ? '<div style="text-align:center;padding:20px;font-size:13px;color:#999">No recordings submitted</div>'
                : typeCaptures.map((cap, idx) => {
                    const recordedAt = cap.recorded_at
                      ? new Date(cap.recorded_at).toLocaleString('en-AU', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })
                      : '—'
                    return `
                      <div class="capture-item">
                        <div class="capture-icon"><i class="ti ti-video"></i></div>
                        <div style="flex:1;min-width:0">
                          <div class="capture-name">Video ${idx + 1} — ${cap.file_name || 'Recording'}</div>
                          <div class="capture-meta">Recorded ${recordedAt}</div>
                          ${cap.gps_latitude ? `<div class="capture-gps"><i class="ti ti-map-pin"></i> GPS verified</div>` : ''}
                        </div>
                        <a href="${cap.video_url}" target="_blank" style="font-size:12px;color:var(--purple);font-weight:600;text-decoration:none;flex-shrink:0">View ↗</a>
                      </div>`
                  }).join('')
              }
            </div>
          </div>`
      })

      if (inspection.status === 'PendingPayment') {
        html += `
          <div class="card" style="border-color:#D4B8F5;background:var(--tint)">
            <div style="display:flex;align-items:center;gap:10px">
              <i class="ti ti-clock" style="font-size:20px;color:var(--purple)"></i>
              <div>
                <div style="font-size:14px;font-weight:700;color:var(--purple)">Payment pending</div>
                <div style="font-size:13px;color:#8B4FC8;margin-top:2px">The client has approved your recording. Your payout will be included in the next weekly batch.</div>
              </div>
            </div>
          </div>`
      }

      if (inspection.status === 'Paid') {
        html += `
          <div class="card" style="border-color:#86EFAC;background:#F0FDF4">
            <div style="display:flex;align-items:center;gap:10px">
              <i class="ti ti-circle-check" style="font-size:20px;color:#16a34a"></i>
              <div>
                <div style="font-size:14px;font-weight:700;color:#16a34a">Payment completed</div>
                <div style="font-size:13px;color:#166534;margin-top:2px">Your payout of ${payout || ''} has been processed successfully.</div>
              </div>
            </div>
          </div>`
      }

      if (inspection.status === 'Disputed') {
        html += `
          <div id="scoutDisputeChatSection" class="dispute-chat">
            <div class="dispute-chat-title"><i class="ti ti-message-circle" style="vertical-align:-2px;margin-right:6px"></i>Dispute Communications</div>
            <div class="chat-thread" id="scoutChatThread">
              <div class="chat-empty">Loading messages...</div>
            </div>
            <div class="chat-input-row">
              <textarea class="chat-textarea" id="scoutChatInput" placeholder="Type a message to Spekto support..."></textarea>
              <button class="btn-chat-send" id="scoutChatSendBtn">Send</button>
            </div>
          </div>`
      }
    }

    document.getElementById('mainContent').innerHTML = html

    if (inspection.status === 'Disputed') {
      initScoutDisputeChat()
    }
  }

  async function loadScoutDisputeMessages() {
    if (!dispute) return []
    const { data: msgs } = await supabase
      .from('dispute_messages')
      .select('*')
      .eq('dispute_id', dispute.id)
      .eq('is_internal', false)
      .or('sent_by_type.eq.scout,recipient_type.eq.Scout')
      .order('created_at', { ascending: true })
    return msgs || []
  }

  function renderScoutChatThread(msgs) {
    const thread = document.getElementById('scoutChatThread')
    if (!thread) return
    if (msgs.length === 0) {
      thread.innerHTML = '<div class="chat-empty">No messages yet — Spekto support will be in touch shortly.</div>'
      return
    }
    thread.innerHTML = msgs.map(msg => {
      const isSelf = msg.sent_by_type === 'scout'
      const senderLabel = isSelf ? 'You' : 'Spekto Support'
      const time = new Date(msg.created_at).toLocaleString('en-AU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })
      return `
        <div class="chat-bubble ${isSelf ? 'self' : 'admin'}">
          <div class="chat-sender">${senderLabel}</div>
          ${msg.message}
          <div class="chat-time">${time}</div>
        </div>`
    }).join('')
    thread.scrollTop = thread.scrollHeight
  }

  async function initScoutDisputeChat() {
    const chatSection = document.getElementById('scoutDisputeChatSection')
    if (!chatSection || !dispute) return
    const msgs = await loadScoutDisputeMessages()
    renderScoutChatThread(msgs)

    document.getElementById('scoutChatSendBtn').addEventListener('click', async () => {
      const textarea = document.getElementById('scoutChatInput')
      const sendBtn = document.getElementById('scoutChatSendBtn')
      const text = textarea.value.trim()
      if (!text) return
      sendBtn.disabled = true
      sendBtn.textContent = 'Sending...'
      const { error } = await supabase
        .from('dispute_messages')
        .insert({
          dispute_id: dispute.id,
          sent_by_type: 'scout',
          sent_by_id: currentUser.id,
          message: text,
          message_type: 'FreeFormFollowUp',
          is_internal: false,
          recipient_type: 'admin'
        })
      sendBtn.disabled = false
      sendBtn.textContent = 'Send'
      if (!error) {
        textarea.value = ''
        const updated = await loadScoutDisputeMessages()
        renderScoutChatThread(updated)
      } else {
        alert('Failed to send message. Please try again.')
      }
    })
  }

    document.querySelector('.sidebar').classList.toggle('open')

    document.querySelector('.sidebar').classList.remove('open')
    document.getElementById('sidebarOverlay').classList.remove('open')
  })
  document.querySelectorAll('.sidebar .nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelector('.sidebar').classList.remove('open')
      document.getElementById('sidebarOverlay').classList.remove('open')

</script>
