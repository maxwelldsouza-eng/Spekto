<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Record Inspection - Spekto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    :root { --purple: #560591; --tint: #F5EEFF; --bg: #F7F5FA; --border: #EEE; --green: #22C55E; --red: #DC2626; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; }
    .topbar { background: var(--purple); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .back-btn { width: 36px; height: 36px; border-radius: 8px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 18px; text-decoration: none; }
    .topbar-title { font-size: 16px; font-weight: 700; color: #fff; }
    .topbar-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: rgba(255,255,255,0.2); color: #fff; }
    .gps-pill { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.15); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: #fff; font-weight: 500; }
    .gps-dot { width: 7px; height: 7px; border-radius: 50%; background: #86EFAC; }
    .gps-dot.searching { background: #FCD34D; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .content { padding: 16px 20px; max-width: 640px; margin: 0 auto; }
    .address-banner { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 14px 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .address-icon { width: 36px; height: 36px; background: var(--tint); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .address-icon i { font-size: 17px; color: var(--purple); }
    .address-text { font-size: 14px; font-weight: 600; color: #0D0D0D; }
    .address-sub { font-size: 12px; color: #999; margin-top: 2px; }
    .resume-banner { background: #EFF6FF; border: 1.5px solid #BFDBFE; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .resume-banner i { font-size: 18px; color: #1D4ED8; flex-shrink: 0; }
    .resume-banner-text { font-size: 13px; color: #1D4ED8; font-weight: 500; }
    .section-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .section-tab { flex: 1; padding: 10px; background: #fff; border: 1.5px solid var(--border); border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.15s; }
    .section-tab.active { border-color: var(--purple); background: var(--tint); }
    .section-tab.done { border-color: var(--green); background: #F0FDF4; }
    .section-tab-label { font-size: 12px; font-weight: 700; color: #999; }
    .section-tab.active .section-tab-label { color: var(--purple); }
    .section-tab.done .section-tab-label { color: #166534; }
    .section-tab-count { font-size: 20px; font-weight: 800; font-family: 'DM Sans', sans-serif; color: #ddd; line-height: 1; margin-bottom: 3px; }
    .section-tab.active .section-tab-count { color: var(--purple); }
    .section-tab.done .section-tab-count { color: var(--green); }
    .record-area { background: #fff; border-radius: 14px; border: 2px solid var(--border); overflow: hidden; margin-bottom: 16px; }
    .record-header { padding: 16px 18px; border-bottom: 1px solid #F3F3F3; display: flex; align-items: center; justify-content: space-between; }
    .record-title { font-size: 14px; font-weight: 700; color: #0D0D0D; }
    .record-sub { font-size: 12px; color: #999; margin-top: 2px; }
    .upload-zone { padding: 24px 18px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .upload-circle { width: 80px; height: 80px; border-radius: 50%; background: var(--tint); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px dashed #C4A0E8; transition: all 0.15s; }
    .upload-circle:hover { background: #EAD5FC; }
    .upload-circle i { font-size: 30px; color: var(--purple); }
    .upload-hint { font-size: 13px; color: #999; text-align: center; }
    .upload-hint strong { color: var(--purple); cursor: pointer; }
    .file-input { display: none; }
    .video-preview-list { padding: 0 18px 16px; display: flex; flex-direction: column; gap: 10px; }
    .video-preview-item { display: flex; align-items: center; gap: 10px; background: var(--tint); border-radius: 8px; padding: 10px 12px; border: 1px solid #D4B8F5; }
    .video-preview-item.uploaded { background: #F0FDF4; border-color: #86EFAC; }
    .video-thumb { width: 44px; height: 44px; background: #D4B8F5; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .video-thumb.uploaded-thumb { background: #BBF7D0; }
    .video-thumb video { width: 100%; height: 100%; object-fit: cover; }
    .video-thumb i { font-size: 20px; color: var(--purple); }
    .video-thumb.uploaded-thumb i { color: #16a34a; }
    .video-info { flex: 1; min-width: 0; }
    .video-name { font-size: 12px; font-weight: 600; color: var(--purple); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .video-preview-item.uploaded .video-name { color: #166534; }
    .video-size { font-size: 11px; color: #999; margin-top: 2px; }
    .video-gps { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #16a34a; font-weight: 500; margin-top: 2px; }
    .video-gps i { font-size: 12px; }
    .video-saved-tag { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #16a34a; font-weight: 600; margin-top: 2px; }
    .btn-remove-video { width: 28px; height: 28px; border-radius: 6px; border: none; background: rgba(220,38,38,0.1); color: var(--red); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .btn-add-more { width: 100%; height: 40px; background: transparent; border: 1.5px dashed #C4A0E8; border-radius: 8px; color: var(--purple); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 6px; margin: 0 18px 16px; width: calc(100% - 36px); transition: background 0.15s; }
    .btn-add-more:hover { background: var(--tint); }
    .instructions-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 16px 18px; margin-bottom: 16px; }
    .instructions-title { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .instruction-check { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #F3F3F3; cursor: pointer; }
    .instruction-check:last-child { border-bottom: none; }
    .check-box { width: 20px; height: 20px; border-radius: 5px; border: 2px solid #E0E0E0; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    .check-box.checked { background: var(--purple); border-color: var(--purple); }
    .check-box.checked i { display: block; }
    .check-box i { display: none; font-size: 13px; color: #fff; }
    .check-label { font-size: 13px; color: #555; font-weight: 500; }
    .check-label.done { text-decoration: line-through; color: #aaa; }
    .submit-section { background: #fff; border-radius: 14px; border: 1px solid var(--border); padding: 20px 18px; margin-bottom: 24px; }
    .submit-checklist { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .submit-check-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .check-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .check-icon.ok { background: #DCFCE7; color: #16a34a; }
    .check-icon.warn { background: #FEF9C3; color: #854D0E; }
    .check-icon.fail { background: #FEE2E2; color: var(--red); }
    .check-icon i { font-size: 13px; }
    .check-item-text { color: #555; }
    .check-item-text.ok { color: #166534; }
    .check-item-text.warn { color: #854D0E; }
    .check-item-text.fail { color: var(--red); }
    .btn-submit-final { width: 100%; height: 52px; background: var(--purple); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.15s; }
    .btn-submit-final:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-save-progress { width: 100%; height: 44px; background: #fff; color: var(--purple); border: 1.5px solid var(--purple); border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-save-progress:disabled { opacity: 0.6; cursor: not-allowed; }
    .progress-bar-wrap { background: #F0F0F0; border-radius: 20px; height: 6px; margin: 12px 0; overflow: hidden; display: none; }
    .progress-bar { height: 100%; background: var(--purple); border-radius: 20px; transition: width 0.3s; width: 0%; }
    .upload-status { font-size: 12px; color: #999; text-align: center; margin-top: 4px; display: none; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1F2937; color: #fff; font-size: 13px; font-weight: 500; padding: 12px 20px; border-radius: 10px; z-index: 999; display: none; white-space: nowrap; }
    .toast.error { background: #991B1B; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: #999; font-size: 14px; gap: 10px; }
    .spinner { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #E0E0E0; border-top-color: var(--purple); animation: spin 0.8s linear infinite; }
    .spinner.small { width: 14px; height: 14px; border-width: 2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" id="backBtn" href="dashboard.html">&#8592;</a>
    <div>
      <div class="topbar-title">Recording Session</div>
    </div>
  </div>
  <div class="gps-pill">
    <div class="gps-dot searching" id="gpsDot"></div>
    <span id="gpsLabel">Getting GPS...</span>
  </div>
</div>

<div class="content" id="mainContent">
  <div class="loading"><div class="spinner"></div> Loading inspection...</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient(
    'https://nyvnvtxhlnjvfhcmnihh.supabase.co',
    'sb_publishable_AZSoskR9Ou8e-rl0QlPWUg_vOehXCRL'
  )

  let inspection = null
  let currentUser = null
  let gpsData = { latitude: null, longitude: null, address: null }

  // Each entry: { file, gps, recorded_at, uploaded (bool), capture_id (if uploaded), file_name, file_size_bytes, video_url (if uploaded) }
  let externalVideos = []
  let internalVideos = []
  let activeSection = 'external'
  let checkedInstructions = new Set()
  let hadExistingCaptures = false

  // Populate checkedInstructions from any is_checked values already saved
  // in the database, so a returning Scout sees their previous checklist state.
  function initChecklistState() {
    if (!inspection.instructions) return
    inspection.instructions.forEach(inst => {
      if (inst.is_checked) checkedInstructions.add(inst.id)
    })
  }

  const urlParams = new URLSearchParams(window.location.search)
  const inspectionId = urlParams.get('id')

  function showToast(msg, duration = 3000, isError = false) {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.className = 'toast' + (isError ? ' error' : '')
    t.style.display = 'block'
    setTimeout(() => { t.style.display = 'none' }, duration)
  }

  async function init() {
    const { data: { user } } = await supabase.auth.getUser()
    if (!user) { window.location.href = '../auth/login.html'; return; }
    currentUser = user

    if (!inspectionId) { window.location.href = 'dashboard.html'; return; }

    const { data, error } = await supabase
      .from('inspections')
      .select('*, instructions(*)')
      .eq('id', inspectionId)
      .single()

    if (error || !data) { window.location.href = 'dashboard.html'; return; }
    inspection = data

    if (inspection.scout_id !== currentUser.id) { window.location.href = 'dashboard.html'; return; }
    if (!['Accepted','InProgress'].includes(inspection.status)) {
      window.location.href = `inspection-detail.html?id=${inspectionId}`
      return
    }

    document.getElementById('backBtn').href = `inspection-detail.html?id=${inspectionId}`
    getGPS()
    await markInProgress()
    await loadExistingCaptures()
    initChecklistState()
    renderPage()
  }

  async function markInProgress() {
    if (inspection.status === 'Accepted') {
      await supabase
        .from('inspections')
        .update({ status: 'InProgress', updated_at: new Date().toISOString() })
        .eq('id', inspectionId)
      inspection.status = 'InProgress'
    }
  }

  // Fetch any captures already uploaded for this inspection (e.g. from a previous
  // Save Progress) and pre-populate the preview lists so the Scout can resume.
  async function loadExistingCaptures() {
    const { data: existing, error } = await supabase
      .from('captures')
      .select('*')
      .eq('inspection_id', inspectionId)
      .eq('is_deleted', false)
      .eq('is_replaced', false)
      .order('recorded_at', { ascending: true })

    if (error || !existing || existing.length === 0) return

    hadExistingCaptures = true

    existing.forEach(cap => {
      const entry = {
        uploaded: true,
        capture_id: cap.id,
        file_name: cap.file_name,
        file_size_bytes: cap.file_size_bytes,
        video_url: cap.video_url,
        gps: { latitude: cap.gps_latitude, longitude: cap.gps_longitude },
        recorded_at: cap.recorded_at
      }
      if (cap.capture_type === 'external') externalVideos.push(entry)
      else internalVideos.push(entry)
    })

    // If any existing capture has GPS, reflect that immediately even before
    // a fresh GPS fix comes back, so the readiness checklist isn't misleading.
    const anyGps = existing.find(c => c.gps_latitude)
    if (anyGps && !gpsData.latitude) {
      gpsData.latitude = anyGps.gps_latitude
      gpsData.longitude = anyGps.gps_longitude
    }
  }

  function getGPS() {
    if (!navigator.geolocation) {
      document.getElementById('gpsLabel').textContent = 'GPS unavailable'
      return
    }
    navigator.geolocation.getCurrentPosition(
      pos => {
        gpsData.latitude = pos.coords.latitude
        gpsData.longitude = pos.coords.longitude
        document.getElementById('gpsDot').classList.remove('searching')
        document.getElementById('gpsLabel').textContent =
          pos.coords.latitude.toFixed(4) + '°S'
        updateSubmitChecklist()
      },
      () => {
        document.getElementById('gpsLabel').textContent = 'GPS blocked'
        updateSubmitChecklist()
      },
      { enableHighAccuracy: true, timeout: 15000 }
    )
  }

  function renderPage() {
    const isExternal = ['external','internalExternal'].includes(inspection.inspection_type)
    const isInternal = ['internal','internalExternal'].includes(inspection.inspection_type)
    activeSection = isExternal ? 'external' : 'internal'

    let html = `
      <div class="address-banner">
        <div class="address-icon"><i class="ti ti-map-pin"></i></div>
        <div>
          <div class="address-text">${inspection.address}</div>
          <div class="address-sub">${inspection.inspection_type === 'external' ? 'External only' : inspection.inspection_type === 'internal' ? 'Internal only' : 'Internal & External'} · ${inspection.time?.slice(0,5) || ''}</div>
        </div>
      </div>`

    if (hadExistingCaptures) {
      html += `
        <div class="resume-banner">
          <i class="ti ti-history"></i>
          <div class="resume-banner-text">Welcome back — your previously saved videos are shown below. Continue where you left off.</div>
        </div>`
    }

    if (isExternal && isInternal) {
      html += `
        <div class="section-tabs">
          <div class="section-tab ${activeSection === 'external' ? 'active' : ''}" id="tabExternal" onclick="switchSection('external')">
            <div class="section-tab-count" id="extCount">0</div>
            <div class="section-tab-label">External</div>
          </div>
          <div class="section-tab" id="tabInternal" onclick="switchSection('internal')">
            <div class="section-tab-count" id="intCount">0</div>
            <div class="section-tab-label">Internal</div>
          </div>
        </div>`
    }

    html += `<div id="uploadArea"></div>`

    if (inspection.instructions && inspection.instructions.length > 0) {
      html += `
        <div class="instructions-card">
          <div class="instructions-title">Recording Checklist</div>
          ${inspection.instructions
            .sort((a,b) => a.display_order - b.display_order)
            .map(inst => {
              const isChecked = checkedInstructions.has(inst.id)
              return `
              <div class="instruction-check" onclick="toggleInstruction('${inst.id}')">
                <div class="check-box${isChecked ? ' checked' : ''}" id="check-${inst.id}">
                  <i class="ti ti-check"></i>
                </div>
                <div class="check-label${isChecked ? ' done' : ''}" id="label-${inst.id}">${inst.text}</div>
              </div>`
            }).join('')}
        </div>`
    }

    html += `
      <div class="submit-section">
        <div class="instructions-title" style="margin-bottom:16px">Ready to submit?</div>
        <div class="submit-checklist" id="submitChecklist"></div>
        <div class="progress-bar-wrap" id="progressWrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="upload-status" id="uploadStatus"></div>
        <button class="btn-save-progress" id="saveProgressBtn">Save progress and continue later</button>
        <button class="btn-submit-final" id="submitFinalBtn" disabled>
          <i class="ti ti-send"></i> Submit Inspection
        </button>
      </div>`

    document.getElementById('mainContent').innerHTML = html
    renderUploadArea()
    updateSubmitChecklist()
    document.getElementById('saveProgressBtn').addEventListener('click', saveProgress)
    document.getElementById('submitFinalBtn').addEventListener('click', submitFinal)
  }

  function renderUploadArea() {
    const isExternal = ['external','internalExternal'].includes(inspection.inspection_type)
    const isInternal = ['internal','internalExternal'].includes(inspection.inspection_type)
    const showBoth = isExternal && isInternal
    const videos = activeSection === 'external' ? externalVideos : internalVideos
    const label = activeSection === 'external' ? 'External Recording' : 'Internal Recording'
    const sub = activeSection === 'external'
      ? 'Record the outside of the property — all sides, entrance and street view'
      : 'Record inside the property — all rooms, hallways and key features'

    let html = `
      <div class="record-area">
        <div class="record-header">
          <div>
            <div class="record-title">${label}</div>
            <div class="record-sub">${sub}</div>
          </div>
        </div>`

    if (videos.length === 0) {
      html += `
        <div class="upload-zone">
          <div class="upload-circle" onclick="document.getElementById('fileInput-${activeSection}').click()">
            <i class="ti ti-video-plus"></i>
          </div>
          <div class="upload-hint">Tap to select or record a video<br><strong onclick="document.getElementById('fileInput-${activeSection}').click()">Browse files</strong> or use your camera</div>
        </div>`
    } else {
      html += `<div class="video-preview-list" id="videoList-${activeSection}">`
      videos.forEach((v, idx) => {
        const name = v.uploaded ? v.file_name : v.file.name
        const sizeBytes = v.uploaded ? v.file_size_bytes : v.file.size
        const sizeLabel = sizeBytes ? (sizeBytes / 1024 / 1024).toFixed(1) + ' MB' : ''
        const hasGps = v.uploaded ? !!v.gps.latitude : !!gpsData.latitude
        html += `
          <div class="video-preview-item ${v.uploaded ? 'uploaded' : ''}">
            <div class="video-thumb ${v.uploaded ? 'uploaded-thumb' : ''}"><i class="ti ${v.uploaded ? 'ti-cloud-check' : 'ti-video'}"></i></div>
            <div class="video-info">
              <div class="video-name">${name}</div>
              <div class="video-size">${sizeLabel}</div>
              ${v.uploaded
                ? '<div class="video-saved-tag"><i class="ti ti-check"></i> Saved previously</div>'
                : (hasGps ? '<div class="video-gps"><i class="ti ti-map-pin"></i> GPS captured</div>' : '')}
            </div>
            <button class="btn-remove-video" onclick="removeVideo('${activeSection}', ${idx})">&#215;</button>
          </div>`
      })
      html += `</div>
        <button class="btn-add-more" onclick="document.getElementById('fileInput-${activeSection}').click()">
          <i class="ti ti-plus" style="font-size:14px"></i> Add another video
        </button>`
    }

    html += `
        <input type="file" accept="video/*" multiple capture="environment" class="file-input" id="fileInput-${activeSection}" onchange="handleFiles(event, '${activeSection}')">
      </div>`

    document.getElementById('uploadArea').innerHTML = html

    if (showBoth) {
      const extTab = document.getElementById('tabExternal')
      const intTab = document.getElementById('tabInternal')
      if (extTab && intTab) {
        extTab.className = 'section-tab' + (activeSection === 'external' ? ' active' : '') + (externalVideos.length > 0 ? ' done' : '')
        intTab.className = 'section-tab' + (activeSection === 'internal' ? ' active' : '') + (internalVideos.length > 0 ? ' done' : '')
        document.getElementById('extCount').textContent = externalVideos.length
        document.getElementById('intCount').textContent = internalVideos.length
      }
    }
  }

  window.switchSection = (section) => {
    activeSection = section
    renderUploadArea()
  }

  window.handleFiles = (event, section) => {
    const files = Array.from(event.target.files)
    files.forEach(file => {
      const entry = { file, gps: { ...gpsData }, recorded_at: new Date().toISOString(), uploaded: false }
      if (section === 'external') externalVideos.push(entry)
      else internalVideos.push(entry)
    })
    renderUploadArea()
    updateSubmitChecklist()
  }

  window.removeVideo = async (section, idx) => {
    const list = section === 'external' ? externalVideos : internalVideos
    const entry = list[idx]

    // If this video was already uploaded (from a prior Save Progress), removing
    // it here should also soft-delete the underlying capture row so it doesn't
    // silently reappear or get double-counted.
    if (entry.uploaded && entry.capture_id) {
      await supabase
        .from('captures')
        .update({ is_deleted: true, deleted_at: new Date().toISOString() })
        .eq('id', entry.capture_id)
    }

    list.splice(idx, 1)
    renderUploadArea()
    updateSubmitChecklist()
  }

  window.toggleInstruction = async (id) => {
    const nowChecked = !checkedInstructions.has(id)
    if (nowChecked) checkedInstructions.add(id)
    else checkedInstructions.delete(id)

    const box = document.getElementById(`check-${id}`)
    const label = document.getElementById(`label-${id}`)
    if (box && label) {
      box.className = 'check-box' + (nowChecked ? ' checked' : '')
      label.className = 'check-label' + (nowChecked ? ' done' : '')
    }

    // Persist immediately so the checklist state survives navigating away,
    // the same way Save Progress persists video uploads.
    const { error } = await supabase
      .from('instructions')
      .update({ is_checked: nowChecked })
      .eq('id', id)

    if (error) {
      // Revert the local/visual state if the write failed, and let the
      // Scout know rather than silently losing the change.
      if (nowChecked) checkedInstructions.delete(id)
      else checkedInstructions.add(id)
      if (box && label) {
        box.className = 'check-box' + (checkedInstructions.has(id) ? ' checked' : '')
        label.className = 'check-label' + (checkedInstructions.has(id) ? ' done' : '')
      }
      showToast('Could not save checklist item. Try again.', 3000, true)
    }
  }

  function updateSubmitChecklist() {
    const isExternal = ['external','internalExternal'].includes(inspection.inspection_type)
    const isInternal = ['internal','internalExternal'].includes(inspection.inspection_type)
    const hasExternal = !isExternal || externalVideos.length > 0
    const hasInternal = !isInternal || internalVideos.length > 0
    const hasGps = !!gpsData.latitude || externalVideos.some(v => v.uploaded && v.gps.latitude) || internalVideos.some(v => v.uploaded && v.gps.latitude)
    const allReady = hasExternal && hasInternal && hasGps

    const items = []
    if (isExternal) items.push({ ok: externalVideos.length > 0, text: externalVideos.length > 0 ? `${externalVideos.length} external video${externalVideos.length > 1 ? 's' : ''} ready` : 'External video required' })
    if (isInternal) items.push({ ok: internalVideos.length > 0, text: internalVideos.length > 0 ? `${internalVideos.length} internal video${internalVideos.length > 1 ? 's' : ''} ready` : 'Internal video required' })
    items.push({ ok: hasGps, warn: !hasGps, text: hasGps ? 'GPS location captured' : 'GPS not yet captured — allow location access' })

    const container = document.getElementById('submitChecklist')
    if (container) {
      container.innerHTML = items.map(item => `
        <div class="submit-check-item">
          <div class="check-icon ${item.ok ? 'ok' : item.warn ? 'warn' : 'fail'}">
            <i class="ti ${item.ok ? 'ti-check' : item.warn ? 'ti-clock' : 'ti-x'}"></i>
          </div>
          <div class="check-item-text ${item.ok ? 'ok' : item.warn ? 'warn' : 'fail'}">${item.text}</div>
        </div>`).join('')
    }

    const submitBtn = document.getElementById('submitFinalBtn')
    if (submitBtn) submitBtn.disabled = !allReady
  }

  // Shared upload routine used by both Save Progress and Submit Inspection.
  // Uploads only videos that haven't already been uploaded (uploaded === false).
  // Returns true on success, false if any upload failed.
  async function uploadPendingVideos() {
    const pending = [
      ...externalVideos.map((v, i) => ({ v, i, list: externalVideos, type: 'external' })),
      ...internalVideos.map((v, i) => ({ v, i, list: internalVideos, type: 'internal' }))
    ].filter(item => !item.v.uploaded)

    if (pending.length === 0) return true

    const progressWrap = document.getElementById('progressWrap')
    const progressBar = document.getElementById('progressBar')
    const uploadStatus = document.getElementById('uploadStatus')
    progressWrap.style.display = 'block'
    uploadStatus.style.display = 'block'

    let done = 0

    for (const item of pending) {
      const video = item.v
      uploadStatus.textContent = `Uploading video ${done + 1} of ${pending.length}...`
      progressBar.style.width = (done / pending.length * 100) + '%'

      const fileName = `${inspectionId}/${item.type}-${Date.now()}-${video.file.name.replace(/\s/g,'_')}`

      const { error: uploadError } = await supabase.storage
        .from('captures')
        .upload(fileName, video.file, { cacheControl: '3600', upsert: false })

      if (uploadError) {
        showToast('Upload failed: ' + uploadError.message, 5000, true)
        progressWrap.style.display = 'none'
        uploadStatus.style.display = 'none'
        return false
      }

      const { data: { publicUrl } } = supabase.storage.from('captures').getPublicUrl(fileName)

      const { data: captureRow, error: insertError } = await supabase
        .from('captures')
        .insert({
          inspection_id: inspectionId,
          scout_id: currentUser.id,
          capture_type: item.type,
          video_url: publicUrl,
          file_name: video.file.name,
          file_size_bytes: video.file.size,
          gps_latitude: video.gps.latitude,
          gps_longitude: video.gps.longitude,
          gps_address: inspection.address,
          recorded_at: video.recorded_at
        })
        .select()
        .single()

      if (insertError) {
        showToast('Could not save video record: ' + insertError.message, 5000, true)
        progressWrap.style.display = 'none'
        uploadStatus.style.display = 'none'
        return false
      }

      // Mark this entry as uploaded in place so re-rendering shows it as saved
      // and so a subsequent click of either button won't re-upload it.
      item.list[item.i] = {
        uploaded: true,
        capture_id: captureRow.id,
        file_name: video.file.name,
        file_size_bytes: video.file.size,
        video_url: publicUrl,
        gps: { latitude: video.gps.latitude, longitude: video.gps.longitude },
        recorded_at: video.recorded_at
      }

      done++
    }

    progressBar.style.width = '100%'
    uploadStatus.textContent = 'All videos saved.'
    setTimeout(() => {
      progressWrap.style.display = 'none'
      uploadStatus.style.display = 'none'
    }, 1200)

    return true
  }

  async function saveProgress() {
    const saveBtn = document.getElementById('saveProgressBtn')
    const submitBtn = document.getElementById('submitFinalBtn')
    saveBtn.disabled = true
    submitBtn.disabled = true
    saveBtn.innerHTML = '<div class="spinner small"></div> Saving...'

    const success = await uploadPendingVideos()

    if (!success) {
      saveBtn.disabled = false
      submitBtn.disabled = false
      saveBtn.textContent = 'Save progress and continue later'
      updateSubmitChecklist()
      return
    }

    // Status stays InProgress — this is a save, not a submission.
    await supabase
      .from('inspections')
      .update({ status: 'InProgress', updated_at: new Date().toISOString() })
      .eq('id', inspectionId)

    renderUploadArea()
    updateSubmitChecklist()

    showToast('Progress saved. You can continue later from My Jobs.')
    setTimeout(() => { window.location.href = `inspection-detail.html?id=${inspectionId}` }, 1500)
  }

  async function submitFinal() {
    const submitBtn = document.getElementById('submitFinalBtn')
    const saveBtn = document.getElementById('saveProgressBtn')
    submitBtn.disabled = true
    submitBtn.innerHTML = '<div class="spinner small" style="border-top-color:#fff"></div> Uploading...'
    saveBtn.disabled = true

    const success = await uploadPendingVideos()

    if (!success) {
      submitBtn.disabled = false
      submitBtn.innerHTML = '<i class="ti ti-send"></i> Submit Inspection'
      saveBtn.disabled = false
      renderUploadArea()
      updateSubmitChecklist()
      return
    }

    await supabase
      .from('inspections')
      .update({ status: 'Completed', updated_at: new Date().toISOString() })
      .eq('id', inspectionId)

    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        fetch('https://nyvnvtxhlnjvfhcmnihh.supabase.co/functions/v1/notify', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: inspection.client_id, type: 'inspection_completed', inspection_id: inspectionId }),
        }).catch(() => {})
      }
    }).catch(() => {})

    showToast('Inspection submitted successfully!')
    setTimeout(() => { window.location.href = `inspection-detail.html?id=${inspectionId}` }, 1500)
  }

  init()
</script>
</body>
</html>
