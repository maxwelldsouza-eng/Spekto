<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earnings - Spekto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    :root { --purple: #560591; --tint: #F5EEFF; --bg: #F7F5FA; --border: #EEE; --green: #22C55E; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; }
    .shell { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: var(--purple); display: flex; flex-direction: column; padding: 28px 0; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 20px 28px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .s-mark { width: 36px; height: 36px; background: rgba(255,255,255,0.15); border-radius: 9px; border: 1px solid rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .s-name { font-family: 'DM Sans', sans-serif; font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -1.5px; }
    .nav { display: flex; flex-direction: column; gap: 2px; padding: 20px 12px; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 500; text-decoration: none; transition: all 0.15s; }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.15); color: #fff; }
    .nav-item i { font-size: 17px; }
    .sidebar-foot { padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
    .user-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; overflow: hidden; }
    .user-name { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 500; }
    .btn-logout-sm { width: 28px; height: 28px; background: rgba(255,255,255,0.08); border: none; border-radius: 6px; color: rgba(255,255,255,0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .btn-logout-sm:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .main { flex: 1; margin-left: 220px; display: flex; flex-direction: column; min-width: 0; }
    .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-size: 18px; font-weight: 700; color: #0D0D0D; letter-spacing: -0.3px; }
    .content { padding: 24px 28px; }
    .hero-card { background: var(--purple); border-radius: 16px; padding: 28px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
    .hero-left { display: flex; flex-direction: column; gap: 4px; }
    .hero-label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.5px; }
    .hero-amount { font-size: 42px; font-weight: 800; color: #fff; font-family: 'DM Sans', sans-serif; letter-spacing: -1px; line-height: 1; }
    .hero-sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .hero-right { display: flex; flex-direction: column; gap: 12px; align-items: flex-end; }
    .hero-stat { text-align: right; }
    .hero-stat-val { font-size: 20px; font-weight: 800; color: #fff; font-family: 'DM Sans', sans-serif; }
    .hero-stat-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 16px 18px; }
    .stat-label { font-size: 11px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
    .stat-val { font-size: 22px; font-weight: 800; color: #0D0D0D; letter-spacing: -0.5px; font-family: 'DM Sans', sans-serif; }
    .next-payout-card { background: #fff; border-radius: 12px; border: 1.5px solid #D4B8F5; padding: 18px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 14px; }
    .payout-icon { width: 44px; height: 44px; background: var(--tint); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .payout-icon i { font-size: 20px; color: var(--purple); }
    .payout-info { flex: 1; min-width: 0; }
    .payout-title { font-size: 14px; font-weight: 700; color: #0D0D0D; }
    .payout-sub { font-size: 12px; color: #999; margin-top: 3px; }
    .payout-amount { font-size: 20px; font-weight: 800; color: var(--purple); font-family: 'DM Sans', sans-serif; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-title { font-size: 14px; font-weight: 700; color: #0D0D0D; }
    .earnings-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .earning-item { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 14px 18px; display: flex; align-items: center; gap: 14px; transition: box-shadow 0.15s; }
    .earning-item:hover { box-shadow: 0 2px 8px rgba(86,5,145,0.06); }
    .earning-date-box { text-align: center; background: #F7F5FA; border-radius: 8px; padding: 6px 10px; min-width: 44px; flex-shrink: 0; }
    .earning-day { font-size: 18px; font-weight: 800; color: var(--purple); line-height: 1; font-family: 'DM Sans', sans-serif; }
    .earning-month { font-size: 10px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }
    .earning-info { flex: 1; min-width: 0; }
    .earning-addr { font-size: 13px; font-weight: 600; color: #0D0D0D; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .earning-type { font-size: 12px; color: #999; margin-top: 3px; }
    .earning-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .earning-amount { font-size: 16px; font-weight: 800; color: #0D0D0D; font-family: 'DM Sans', sans-serif; }
    .earning-badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.3px; }
    .badge-Paid { background: #DCFCE7; color: #166534; }
    .badge-PendingPayment { background: #FEF9C3; color: #854D0E; }
    .badge-Disputed { background: #FEE2E2; color: #991B1B; }
    .badge-Completed { background: #E0F2FE; color: #0369A1; }
    .empty-state { text-align: center; padding: 48px 20px; background: #fff; border-radius: 14px; border: 1px solid var(--border); }
    .empty-state i { font-size: 36px; color: #ddd; margin-bottom: 12px; display: block; }
    .empty-state h3 { font-size: 15px; font-weight: 600; color: #0D0D0D; margin-bottom: 6px; }
    .empty-state p { font-size: 13px; color: #999; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: #999; font-size: 14px; gap: 10px; }
    .spinner { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #E0E0E0; border-top-color: var(--purple); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .menu-toggle { display: none; width: 36px; height: 36px; border: none; background: transparent; cursor: pointer; align-items: center; justify-content: center; border-radius: 8px; padding: 0; flex-shrink: 0; }
    .menu-toggle i { font-size: 22px; color: #555; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 99; }
    .sidebar-overlay.open { display: block; }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-220px); transition: transform 0.25s ease; }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: flex; }
      .main { margin-left: 0; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .content { padding: 16px; }
      .topbar { padding: 14px 16px; }
      .hero-amount { font-size: 32px; }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="s-mark">
        <svg width="20" height="18" viewBox="0 0 30 26" fill="none">
          <rect x="1" y="5" width="28" height="20" rx="4" stroke="white" stroke-width="2"/>
          <path d="M10 5L11.5 2h7L20 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="15" cy="15" r="5" stroke="white" stroke-width="2"/>
          <circle cx="15" cy="15" r="2" fill="white"/>
          <circle cx="24" cy="9" r="1.5" fill="white"/>
        </svg>
      </div>
      <div class="s-name">SPEKTO</div>
    </div>
    <nav class="nav">
      <a class="nav-item" href="dashboard.html"><i class="ti ti-layout-dashboard"></i> My Jobs</a>
      <a class="nav-item active" href="earnings.html"><i class="ti ti-wallet"></i> Earnings</a>
      <a class="nav-item" href="ratings.html"><i class="ti ti-star"></i> My Ratings</a>
      <a class="nav-item" href="disputes.html"><i class="ti ti-alert-triangle"></i> My Disputes</a>
      <a class="nav-item" href="settings.html"><i class="ti ti-settings"></i> Settings</a>
    </nav>
    <div class="sidebar-foot">
      <div class="user-row">
        <div class="avatar" id="userAvatar">?</div>
        <div class="user-name" id="userName">Loading...</div>
        <button class="btn-logout-sm" id="logoutBtn" title="Sign out">
          <i class="ti ti-logout"></i>
        </button>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menu-toggle" id="menuToggle"><i class="ti ti-menu-2"></i></button>
      <div class="topbar-title">Earnings</div>
    </div>
    <div class="content" id="mainContent">
      <div class="loading"><div class="spinner"></div> Loading earnings...</div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  import { initNotificationBell } from '../config/notifications.js'
  const supabase = createClient(
    'https://nyvnvtxhlnjvfhcmnihh.supabase.co',
    'sb_publishable_AZSoskR9Ou8e-rl0QlPWUg_vOehXCRL'
  )

  async function init() {
    const { data: { user } } = await supabase.auth.getUser()
    if (!user) { window.location.href = '../auth/login.html'; return; }

    const { data: userData } = await supabase
      .from('users')
      .select('first_name, last_name, avatar_url')
      .eq('id', user.id)
      .single()

    if (userData) {
      const initials = (userData.first_name?.[0] || '') + (userData.last_name?.[0] || '')
      if (userData.avatar_url) {
        document.getElementById('userAvatar').innerHTML = `<img src="${userData.avatar_url}" alt="Avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
      } else {
        document.getElementById('userAvatar').textContent = initials.toUpperCase()
      }
      document.getElementById('userName').textContent = userData.first_name + ' ' + userData.last_name
    }

    initNotificationBell(supabase, user.id)

    // Fetch actual payout records from payout_batch_items
    const [{ data: batchItems }, { data: pendingInspections }] = await Promise.all([
      supabase
        .from('payout_batch_items')
        .select('id, amount, status, stripe_transfer_id, paid_at, created_at, failure_reason, inspections(id, address, date, inspection_type, ref_number)')
        .eq('scout_id', user.id)
        .order('created_at', { ascending: false }),
      // Inspections that are Completed or Disputed but not yet in any batch item
      supabase
        .from('inspections')
        .select('id, address, date, inspection_type, status, pricing_snapshot, ref_number')
        .eq('scout_id', user.id)
        .in('status', ['Completed', 'Disputed', 'PendingPayment'])
        .order('created_at', { ascending: false }),
    ])

    // Find inspection IDs that already have a non-failed batch item
    const batchedInspectionIds = new Set(
      (batchItems || [])
        .filter(b => b.status !== 'failed')
        .map(b => b.inspections?.id)
        .filter(Boolean)
    )

    // Inspections not yet in a batch
    const unbatchedInspections = (pendingInspections || [])
      .filter(i => !batchedInspectionIds.has(i.id))

    renderPage(batchItems || [], unbatchedInspections)
  }

  function renderPage(batchItems, unbatchedInspections) {
    const paidItems = batchItems.filter(b => b.status === 'paid')
    const processingItems = batchItems.filter(b => b.status === 'processing')
    const pendingBatchItems = batchItems.filter(b => b.status === 'pending')

    const totalEarned = paidItems.reduce((s, b) => s + (parseFloat(b.amount) || 0), 0)
    const inBatchAmount = [...processingItems, ...pendingBatchItems]
      .reduce((s, b) => s + (parseFloat(b.amount) || 0), 0)
    const awaitingAmount = unbatchedInspections
      .filter(i => i.status === 'Completed' || i.status === 'PendingPayment')
      .reduce((s, i) => s + (parseFloat(i.pricing_snapshot?.pay_to_scout) || 0), 0)
    const disputedCount = unbatchedInspections.filter(i => i.status === 'Disputed').length

    const nextTuesday = getNextTuesday()

    let html = `
      <div class="hero-card">
        <div class="hero-left">
          <div class="hero-label">Total paid out</div>
          <div class="hero-amount">$${totalEarned.toFixed(2)}</div>
          <div class="hero-sub">${paidItems.length} completed transfer${paidItems.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="hero-right">
          <div class="hero-stat">
            <div class="hero-stat-val">${batchItems.length + unbatchedInspections.length}</div>
            <div class="hero-stat-label">Total jobs</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-val">${disputedCount}</div>
            <div class="hero-stat-label">Disputed</div>
          </div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Paid out</div>
          <div class="stat-val">$${totalEarned.toFixed(2)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">In batch</div>
          <div class="stat-val">${inBatchAmount > 0 ? '$' + inBatchAmount.toFixed(2) : '—'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Awaiting release</div>
          <div class="stat-val">${awaitingAmount > 0 ? '$' + awaitingAmount.toFixed(2) : '—'}</div>
        </div>
      </div>`

    if (inBatchAmount > 0) {
      html += `
        <div class="next-payout-card">
          <div class="payout-icon"><i class="ti ti-calendar"></i></div>
          <div class="payout-info">
            <div class="payout-title">Transfer in progress</div>
            <div class="payout-sub">Your payout is being processed — funds should arrive by ${nextTuesday}</div>
          </div>
          <div class="payout-amount">$${inBatchAmount.toFixed(2)}</div>
        </div>`
    } else if (awaitingAmount > 0) {
      html += `
        <div class="next-payout-card">
          <div class="payout-icon"><i class="ti ti-calendar"></i></div>
          <div class="payout-info">
            <div class="payout-title">Next payout</div>
            <div class="payout-sub">Payments are batched weekly — estimated ${nextTuesday}</div>
          </div>
          <div class="payout-amount">$${awaitingAmount.toFixed(2)}</div>
        </div>`
    }

    html += `
      <div class="section-header">
        <div class="section-title">Earnings history</div>
      </div>`

    // Build unified list: batch items + unbatched inspections, sorted by date
    const allRows = [
      ...batchItems.map(b => ({
        type: 'batch',
        sortDate: b.paid_at || b.created_at,
        amount: parseFloat(b.amount) || 0,
        status: b.status,
        address: b.inspections?.address || '—',
        inspection_id: b.inspections?.id,
        inspection_type: b.inspections?.inspection_type,
        ref_number: b.inspections?.ref_number,
        date: b.inspections?.date,
        transfer_id: b.stripe_transfer_id,
        failure_reason: b.failure_reason,
        paid_at: b.paid_at,
      })),
      ...unbatchedInspections.map(i => ({
        type: 'inspection',
        sortDate: i.date || i.created_at,
        amount: parseFloat(i.pricing_snapshot?.pay_to_scout) || 0,
        status: i.status,
        address: i.address,
        inspection_id: i.id,
        inspection_type: i.inspection_type,
        ref_number: i.ref_number,
        date: i.date,
        transfer_id: null,
        failure_reason: null,
        paid_at: null,
      })),
    ].sort((a, b) => new Date(b.sortDate) - new Date(a.sortDate))

    if (allRows.length === 0) {
      html += `
        <div class="empty-state">
          <i class="ti ti-wallet"></i>
          <h3>No earnings yet</h3>
          <p>Complete your first inspection to start earning</p>
        </div>`
    } else {
      const statusLabelMap = {
        paid: 'Paid',
        processing: 'Processing',
        pending: 'In batch',
        failed: 'Failed',
        reversed: 'Reversed',
        Completed: 'Awaiting release',
        PendingPayment: 'Awaiting release',
        Disputed: 'Disputed',
      }
      const statusBadgeMap = {
        paid: 'Paid',
        processing: 'Completed',
        pending: 'PendingPayment',
        failed: 'Disputed',
        reversed: 'Disputed',
        Completed: 'PendingPayment',
        PendingPayment: 'PendingPayment',
        Disputed: 'Disputed',
      }

      html += '<div class="earnings-list">'
      allRows.forEach(row => {
        const date = row.date ? new Date(row.date) : new Date(row.sortDate)
        const day = date.getDate().toString().padStart(2, '0')
        const month = date.toLocaleString('default', { month: 'short' })
        const amountDisplay = row.amount > 0 ? '$' + row.amount.toFixed(2) : '—'
        const typeLabel = row.inspection_type === 'external' ? 'External only'
          : row.inspection_type === 'internal' ? 'Internal only'
          : 'Internal & External'
        const statusLabel = statusLabelMap[row.status] || row.status
        const badgeKey = statusBadgeMap[row.status] || 'PendingPayment'
        const paidOnLabel = row.paid_at
          ? `<div class="earning-type" style="margin-top:2px;font-size:11px">Paid ${new Date(row.paid_at).toLocaleDateString('en-AU', {day:'numeric',month:'short',year:'numeric'})}</div>`
          : ''
        const transferLabel = row.transfer_id
          ? `<div class="earning-type" style="margin-top:2px;font-size:10px;color:#bbb;font-family:monospace">${row.transfer_id.substring(0,20)}…</div>`
          : ''

        html += `
          <div class="earning-item" ${row.inspection_id ? `onclick="window.location.href='inspection-detail.html?id=${row.inspection_id}'"` : ''} style="cursor:${row.inspection_id?'pointer':'default'}">
            <div class="earning-date-box">
              <div class="earning-day">${day}</div>
              <div class="earning-month">${month}</div>
            </div>
            <div class="earning-info">
              <div class="earning-addr">${row.address}</div>
              <div class="earning-type">${typeLabel}${row.ref_number ? ' · #' + row.ref_number : ''}</div>
              ${paidOnLabel}
              ${transferLabel}
            </div>
            <div class="earning-right">
              <div class="earning-amount">${amountDisplay}</div>
              <span class="earning-badge badge-${badgeKey}">${statusLabel}</span>
            </div>
          </div>`
      })
      html += '</div>'
    }

    document.getElementById('mainContent').innerHTML = html
  }

  function getNextTuesday() {
    const now = new Date()
    const day = now.getDay()
    const daysUntilTuesday = (2 - day + 7) % 7 || 7
    const tuesday = new Date(now)
    tuesday.setDate(now.getDate() + daysUntilTuesday)
    return tuesday.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' })
  }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await supabase.auth.signOut()
    window.location.href = '../auth/login.html'
  })

  init()

  document.getElementById('menuToggle').addEventListener('click', () => {
    document.querySelector('.sidebar').classList.toggle('open')
    document.getElementById('sidebarOverlay').classList.toggle('open')
  })
  document.getElementById('sidebarOverlay').addEventListener('click', () => {
    document.querySelector('.sidebar').classList.remove('open')
    document.getElementById('sidebarOverlay').classList.remove('open')
  })
  document.querySelectorAll('.sidebar .nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelector('.sidebar').classList.remove('open')
      document.getElementById('sidebarOverlay').classList.remove('open')
    })
  })
</script>
</body>
</html>
