<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Spekto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <script>window._googleMapsReady = function(){}</script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBDTc3xKB4nlhqjMPRQQTDYFjPiUc8wa1o&libraries=places&callback=_googleMapsReady"></script>
  <style>
    :root { --purple: #560591; --tint: #F5EEFF; --bg: #F7F5FA; --border: #EEE; --green: #22C55E; --red: #E53935; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; }
    .shell { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: var(--purple); display: flex; flex-direction: column; padding: 28px 0; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 20px 28px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .s-mark { width: 36px; height: 36px; background: rgba(255,255,255,0.15); border-radius: 9px; border: 1px solid rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .s-name { font-family: 'DM Sans', sans-serif; font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -1.5px; }
    .nav { display: flex; flex-direction: column; gap: 2px; padding: 20px 12px; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 500; text-decoration: none; transition: all 0.15s; }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.15); color: #fff; }
    .nav-item i { font-size: 17px; }
    .sidebar-foot { padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
    .user-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .user-name { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 500; }
    .btn-logout-sm { width: 28px; height: 28px; background: rgba(255,255,255,0.08); border: none; border-radius: 6px; color: rgba(255,255,255,0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .btn-logout-sm:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .main { flex: 1; margin-left: 220px; display: flex; flex-direction: column; min-width: 0; }
    .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-size: 18px; font-weight: 700; color: #0D0D0D; letter-spacing: -0.3px; }
    .content { padding: 24px 28px; max-width: 720px; }
    .card { background: #fff; border-radius: 14px; border: 1px solid var(--border); padding: 22px 24px; margin-bottom: 16px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .card-title { font-size: 14px; font-weight: 700; color: #0D0D0D; display: flex; align-items: center; gap: 8px; }
    .card-title i { font-size: 17px; color: var(--purple); }
    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: #444; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 7px; }
    .field input, .field select { width: 100%; height: 42px; border: 1.5px solid #E0E0E0; border-radius: 8px; padding: 0 14px; font-size: 14px; color: #0D0D0D; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s; background: #fff; }
    .field input:focus, .field select:focus { border-color: var(--purple); }
    .field input:disabled { background: #F9F9F9; color: #999; cursor: not-allowed; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .hint { font-size: 11px; color: #aaa; margin-top: 5px; line-height: 1.5; }
    .badge-status { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
    .badge-pending { background: #FEF9C3; color: #854D0E; }
    .badge-verified { background: #DCFCE7; color: #166534; }
    .badge-rejected { background: #FEE2E2; color: #991B1B; }
    .badge-unverified { background: #F3F4F6; color: #6B7280; }
    .id-upload-zone { border: 2px dashed #D4B8F5; border-radius: 10px; padding: 28px; text-align: center; cursor: pointer; transition: background 0.15s; background: #FDFAFF; }
    .id-upload-zone:hover { background: var(--tint); }
    .id-upload-zone i { font-size: 28px; color: var(--purple); margin-bottom: 10px; display: block; }
    .id-upload-title { font-size: 14px; font-weight: 600; color: var(--purple); margin-bottom: 4px; }
    .id-upload-sub { font-size: 12px; color: #aaa; }
    .id-uploaded { display: flex; align-items: center; gap: 12px; background: var(--tint); border: 1.5px solid #D4B8F5; border-radius: 10px; padding: 14px 16px; }
    .id-uploaded-icon { width: 40px; height: 40px; background: var(--purple); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .id-uploaded-icon i { font-size: 18px; color: #fff; }
    .id-uploaded-info { flex: 1; min-width: 0; }
    .id-uploaded-name { font-size: 13px; font-weight: 600; color: var(--purple); }
    .id-uploaded-sub { font-size: 11px; color: #8B4FC8; margin-top: 2px; }
    .btn-change-id { font-size: 12px; font-weight: 600; color: var(--purple); background: none; border: none; cursor: pointer; text-decoration: underline; flex-shrink: 0; }
    .stripe-connect-box { border: 1.5px solid #E0E0E0; border-radius: 10px; padding: 18px; display: flex; align-items: center; gap: 14px; }
    .stripe-connect-box.connected { border-color: #86EFAC; background: #F0FDF4; }
    .stripe-logo { font-size: 13px; font-weight: 800; color: #635BFF; background: #fff; border: 1px solid #E0E0E0; border-radius: 6px; padding: 6px 12px; flex-shrink: 0; font-family: 'DM Sans', sans-serif; }
    .stripe-info { flex: 1; min-width: 0; }
    .stripe-title { font-size: 13px; font-weight: 700; color: #0D0D0D; }
    .stripe-sub { font-size: 12px; color: #999; margin-top: 3px; }
    .stripe-sub.connected { color: #166534; }
    .btn-stripe { height: 38px; background: #635BFF; color: #fff; border: none; border-radius: 8px; padding: 0 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; white-space: nowrap; flex-shrink: 0; }
    .btn-stripe.connected { background: #166534; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #F3F3F3; }
    .toggle-row:last-child { border-bottom: none; padding-bottom: 0; }
    .toggle-label { font-size: 14px; font-weight: 500; color: #0D0D0D; }
    .toggle-sub { font-size: 12px; color: #999; margin-top: 2px; }
    .toggle { width: 44px; height: 24px; background: #E0E0E0; border-radius: 12px; position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0; border: none; }
    .toggle.on { background: var(--purple); }
    .toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: left 0.2s; }
    .toggle.on::after { left: 23px; }
    .btn-save { height: 44px; background: var(--purple); color: #fff; font-size: 14px; font-weight: 700; border: none; border-radius: 10px; padding: 0 28px; cursor: pointer; font-family: 'Inter', sans-serif; transition: opacity 0.15s; }
    .btn-save:hover { opacity: 0.9; }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { height: 44px; background: #fff; color: var(--purple); font-size: 14px; font-weight: 600; border: 1.5px solid var(--purple); border-radius: 10px; padding: 0 28px; cursor: pointer; font-family: 'Inter', sans-serif; transition: opacity 0.15s; }
    .btn-secondary:hover { background: var(--tint); }
    .btn-logout { height: 44px; background: #fff; color: #991B1B; font-size: 14px; font-weight: 600; border: 1.5px solid #FCA5A5; border-radius: 10px; padding: 0 28px; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 8px; }
    .btn-logout:hover { background: #FFF8F8; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1F2937; color: #fff; font-size: 13px; font-weight: 500; padding: 12px 20px; border-radius: 10px; z-index: 999; display: none; }
    .toast.success { background: #166534; }
    .toast.error { background: #991B1B; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: #999; font-size: 14px; gap: 10px; }
    .spinner { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #E0E0E0; border-top-color: var(--purple); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .profile-hero { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #F3F3F3; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--tint); border: 3px solid #D4B8F5; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: var(--purple); font-family: 'DM Sans', sans-serif; flex-shrink: 0; position: relative; cursor: pointer; overflow: hidden; }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .avatar-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.45); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.18s; }
    .profile-avatar:hover .avatar-overlay { opacity: 1; }
    .avatar-overlay i { font-size: 20px; color: #fff; }
    .avatar-uploading { position: absolute; inset: 0; background: rgba(0,0,0,0.55); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .avatar-uploading-spinner { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; animation: spin 0.8s linear infinite; }
    .profile-name { font-size: 18px; font-weight: 700; color: #0D0D0D; }
    .profile-email { font-size: 13px; color: #999; margin-top: 3px; }
    .profile-member { font-size: 11px; color: #bbb; margin-top: 4px; }
    .menu-toggle { display: none; width: 36px; height: 36px; border: none; background: transparent; cursor: pointer; align-items: center; justify-content: center; border-radius: 8px; padding: 0; flex-shrink: 0; }
    .menu-toggle i { font-size: 22px; color: #555; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 99; }
    .sidebar-overlay.open { display: block; }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-220px); transition: transform 0.25s ease; }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: flex; }
      .main { margin-left: 0; }
      .content { padding: 16px; }
      .topbar { padding: 14px 16px; }
      .row2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="s-mark">
        <svg width="20" height="18" viewBox="0 0 30 26" fill="none">
          <rect x="1" y="5" width="28" height="20" rx="4" stroke="white" stroke-width="2"/>
          <path d="M10 5L11.5 2h7L20 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="15" cy="15" r="5" stroke="white" stroke-width="2"/>
          <circle cx="15" cy="15" r="2" fill="white"/>
          <circle cx="24" cy="9" r="1.5" fill="white"/>
        </svg>
      </div>
      <div class="s-name">SPEKTO</div>
    </div>
    <nav class="nav">
      <a class="nav-item" href="dashboard.html"><i class="ti ti-layout-dashboard"></i> My Jobs</a>
      <a class="nav-item" href="earnings.html"><i class="ti ti-wallet"></i> Earnings</a>
      <a class="nav-item" href="ratings.html"><i class="ti ti-star"></i> My Ratings</a>
      <a class="nav-item" href="disputes.html"><i class="ti ti-alert-triangle"></i> My Disputes</a>
      <a class="nav-item active" href="settings.html"><i class="ti ti-settings"></i> Settings</a>
    </nav>
    <div class="sidebar-foot">
      <div class="user-row">
        <div class="avatar" id="userAvatar">?</div>
        <div class="user-name" id="userName">Loading...</div>
        <button class="btn-logout-sm" id="sidebarLogoutBtn" title="Sign out">
          <i class="ti ti-logout"></i>
        </button>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menu-toggle" id="menuToggle"><i class="ti ti-menu-2"></i></button>
      <div class="topbar-title">Settings</div>
    </div>
    <div class="content" id="mainContent">
      <div class="loading"><div class="spinner"></div> Loading settings...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="idFileInput" accept="image/*,.pdf" style="display:none">

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  import { initNotificationBell } from '../config/notifications.js'
  const supabase = createClient(
    'https://nyvnvtxhlnjvfhcmnihh.supabase.co',
    'sb_publishable_AZSoskR9Ou8e-rl0QlPWUg_vOehXCRL'
  )

  let currentUser = null
  let userData = null
  let scoutProfile = null
  let rtwRecord = null
  let idFileName = null
  let notifPrefs = {}
  let _homeLat = null, _homeLng = null
  const _mapsLoaded = new Promise(resolve => {
    if (typeof google !== 'undefined' && google.maps) resolve()
    else window._googleMapsReady = resolve
  })

  async function setupHomeAddressAutocomplete() {
    await _mapsLoaded
    const input = document.getElementById('homeAddress')
    if (!input) return
    const ac = new google.maps.places.Autocomplete(input, {
      types: ['address'],
      componentRestrictions: { country: 'au' }
    })
    ac.addListener('place_changed', () => {
      const place = ac.getPlace()
      if (place.geometry?.location) {
        _homeLat = place.geometry.location.lat()
        _homeLng = place.geometry.location.lng()
      } else {
        _homeLat = null
        _homeLng = null
      }
    })
  }

  const COUNTRIES = {
    'AUS':'Australia','NZL':'New Zealand','GBR':'United Kingdom','IND':'India',
    'CHN':'China','PHL':'Philippines','USA':'United States','NPL':'Nepal',
    'PAK':'Pakistan','LKA':'Sri Lanka','BGD':'Bangladesh','KOR':'South Korea',
    'JPN':'Japan','MYS':'Malaysia','IDN':'Indonesia','VNM':'Vietnam',
    'ZAF':'South Africa','ZWE':'Zimbabwe','IRL':'Ireland','FRA':'France',
    'DEU':'Germany','ITA':'Italy','BRA':'Brazil','CAN':'Canada',
    'TWN':'Taiwan','HKG':'Hong Kong','THA':'Thailand','MMR':'Myanmar',
    'FJI':'Fiji','PNG':'Papua New Guinea','ZZZ':'Other'
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.className = `toast ${type}`
    t.style.display = 'block'
    setTimeout(() => { t.style.display = 'none' }, 3000)
  }

  async function init() {
    const { data: { user } } = await supabase.auth.getUser()
    if (!user) { window.location.href = '../auth/login.html'; return; }
    currentUser = user

    initNotificationBell(supabase, currentUser.id)
    const [{ data: uData }, { data: sData }, { data: rtwData }] = await Promise.all([
      supabase.from('users').select('*').eq('id', user.id).single(),
      supabase.from('scout_profiles').select('*').eq('user_id', user.id).single(),
      supabase.from('rights_to_work').select('*').eq('scout_id', user.id).eq('is_current', true).maybeSingle()
    ])

    userData = uData
    scoutProfile = sData
    rtwRecord = rtwData

    if (userData) {
      const initials = (userData.first_name?.[0] || '') + (userData.last_name?.[0] || '')
      if (userData.avatar_url) {
        document.getElementById('userAvatar').innerHTML = `<img src="${userData.avatar_url}" alt="Avatar">`
      } else {
        document.getElementById('userAvatar').textContent = initials.toUpperCase()
      }
      document.getElementById('userName').textContent = userData.first_name + ' ' + userData.last_name
    }

    _homeLat = scoutProfile?.home_lat || null
    _homeLng = scoutProfile?.home_lng || null

    renderPage()
  }

  function getVerificationBadge() {
    const status = scoutProfile?.id_verified ? 'verified'
      : scoutProfile?.id_document_url ? 'pending'
      : 'unverified'
    const labels = { verified: 'ID Verified', pending: 'Under review', unverified: 'Not submitted' }
    const classes = { verified: 'badge-verified', pending: 'badge-pending', unverified: 'badge-unverified' }
    const icons = { verified: 'ti-circle-check', pending: 'ti-clock', unverified: 'ti-alert-circle' }
    return `<span class="badge-status ${classes[status]}"><i class="ti ${icons[status]}" style="font-size:12px"></i> ${labels[status]}</span>`
  }

  function getRTWCard() {
    if (!rtwRecord) {
      return `
        <div style="background:#FFF7ED;border:1.5px solid #FED7AA;border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <i class="ti ti-alert-circle" style="font-size:20px;color:#C2410C;flex-shrink:0"></i>
          <div style="font-size:13px;color:#9A3412;line-height:1.5">You need to verify your right to work in Australia before accepting inspection jobs.</div>
        </div>
        <button class="btn-save" onclick="openRTWForm()">Submit verification</button>`
    }

    const r = rtwRecord
    const statusMap = {
      citizen_pr: { bg:'#F0FDF4', border:'#86EFAC', icon:'ti-circle-check', iconCol:'#166534', title:'Verified — Australian Citizen / PR', sub:'You have unrestricted work rights in Australia.', textCol:'#166534' },
      verified_unlimited: { bg:'#F0FDF4', border:'#86EFAC', icon:'ti-circle-check', iconCol:'#166534', title:'Verified — Unlimited Work Rights', sub: r.visa_type_name ? `${r.visa_type_name}${r.visa_expiry_date ? ' · Expires ' + new Date(r.visa_expiry_date).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}) : ''}` : 'Your work rights have been verified.', textCol:'#166534' },
      verified_limited: { bg:'#FEF9C3', border:'#FDE047', icon:'ti-clock', iconCol:'#854D0E', title:'Pending Admin Review — Limited Rights', sub:'Your visa has conditional work rights. An admin will review and confirm your eligibility.', textCol:'#854D0E' },
      no_rights: { bg:'#FEF2F2', border:'#FECACA', icon:'ti-x-circle', iconCol:'#991B1B', title:'Work Rights Not Confirmed', sub:"Your submitted details indicate you may not have current work rights in Australia. Contact support if you believe this is incorrect.", textCol:'#991B1B' },
      mismatch: { bg:'#FFF7ED', border:'#FED7AA', icon:'ti-alert-triangle', iconCol:'#C2410C', title:'Pending Review — Data Mismatch', sub:"We couldn’t match your passport details in VEVO. An admin will review your record.", textCol:'#9A3412' },
      failed_technical: { bg:'#FFF7ED', border:'#FED7AA', icon:'ti-alert-triangle', iconCol:'#C2410C', title:'Under Review', sub:"We couldn’t verify your work rights right now. Your account has been flagged for manual review — you’ll be notified once resolved.", textCol:'#9A3412' },
      pending: { bg:'#F3F4F6', border:'#E5E7EB', icon:'ti-loader', iconCol:'#374151', title:'Verification In Progress', sub:'Your check is being processed.', textCol:'#374151' }
    }

    const adminAllowed = r.admin_decision === 'allowed'
    const key = adminAllowed && (r.vsure_status === 'verified_limited' || r.vsure_status === 'mismatch' || r.vsure_status === 'failed_technical')
      ? 'verified_unlimited' : r.vsure_status
    const s = statusMap[key] || statusMap.failed_technical

    const expiringSoon = r.visa_expiry_date && (() => {
      const days = Math.ceil((new Date(r.visa_expiry_date) - new Date()) / 86400000)
      return days > 0 && days < 60 ? days : null
    })()

    return `
      ${expiringSoon ? `<div style="background:#FEF9C3;border:1.5px solid #FDE047;border-radius:8px;padding:10px 14px;font-size:12px;color:#854D0E;font-weight:600;margin-bottom:12px"><i class="ti ti-alarm" style="font-size:13px;vertical-align:-2px"></i> Your work rights verification expires in ${expiringSoon} days. Update your details before it expires to avoid disruption.</div>` : ''}
      <div style="background:${s.bg};border:1.5px solid ${s.border};border-radius:10px;padding:14px 16px;display:flex;align-items:flex-start;gap:10px;margin-bottom:14px">
        <i class="ti ${s.icon}" style="font-size:20px;color:${s.iconCol};flex-shrink:0;margin-top:1px"></i>
        <div>
          <div style="font-size:13px;font-weight:700;color:${s.textCol}">${s.title}</div>
          <div style="font-size:12px;color:${s.textCol};margin-top:3px;line-height:1.5">${s.sub}</div>
        </div>
      </div>
      <button class="btn-secondary" onclick="openRTWForm()" style="margin-right:8px">Update details</button>`
  }

  function getStripeStatus() {
    const status = scoutProfile?.stripe_connect_status
    const active = status === 'Active'
    const pending = status === 'Pending' && !!scoutProfile?.stripe_account_id
    return `
      <div class="stripe-connect-box ${active ? 'connected' : ''}">
        <div class="stripe-logo">stripe</div>
        <div class="stripe-info">

  async function handleAvatarUpload(e) {
    const file = e.target.files[0]
    if (!file) return

    if (file.size > 5 * 1024 * 1024) {
      showToast('Image must be under 5MB.', 'error')
      e.target.value = ''
      return
    }

    const avatarEl = document.getElementById('profileAvatarEl')
    const uploadingDiv = document.createElement('div')
    uploadingDiv.className = 'avatar-uploading'
    uploadingDiv.innerHTML = '<div class="avatar-uploading-spinner"></div>'
    avatarEl.appendChild(uploadingDiv)

    try {
      const ext = file.name.split('.').pop().toLowerCase()
      const path = `${currentUser.id}/avatar.${ext}`

      const { error: uploadError } = await supabase.storage
        .from('avatars')
        .upload(path, file, { upsert: true, contentType: file.type })

      if (uploadError) throw uploadError

      const { data: { publicUrl } } = supabase.storage.from('avatars').getPublicUrl(path)
      const publicUrlWithBust = publicUrl + '?t=' + Date.now()

      const { error: dbError } = await supabase
        .from('users')
        .update({ avatar_url: publicUrl })
        .eq('id', currentUser.id)

      if (dbError) throw dbError

      userData.avatar_url = publicUrl
      avatarEl.innerHTML = `<img src="${publicUrlWithBust}" alt="Profile picture"><div class="avatar-overlay"><i class="ti ti-camera"></i></div>`
      document.getElementById('userAvatar').innerHTML = `<img src="${publicUrlWithBust}" alt="Avatar">`
      showToast('Profile picture updated')
    } catch (err) {
      showToast('Failed to upload image', 'error')
      uploadingDiv.remove()
    }
    e.target.value = ''
  }

  async function loadNotifPrefs() {

      .from('notification_preferences')
      .select('type, email_enabled, inapp_enabled')
      .eq('user_id', currentUser.id)
      .in('type', types)

    notifPrefs = {}
    for (const p of (prefs || [])) notifPrefs[p.type] = { email: p.email_enabled, inapp: p.inapp_enabled }

    const rows = SCOUT_NOTIF_TYPES.map(({ type, label, sub }) => {
      const email = notifPrefs[type]?.email ?? true
      const inapp = notifPrefs[type]?.inapp ?? true
      return `<div style="display:grid;grid-template-columns:1fr 68px 68px;align-items:center;padding:11px 0;border-bottom:1px solid #F5F2FB">

          <button class="toggle ${inapp ? 'on' : ''}" onclick="setNotifPref('${type}','inapp',this)"></button>

  window.setNotifPref = async (type, channel, btn) => {
    const newVal = !btn.classList.contains('on')

    if (!notifPrefs[type]) notifPrefs[type] = { email: true, inapp: true }
    notifPrefs[type][channel] = newVal
    await supabase.from('notification_preferences').upsert({
      user_id: currentUser.id, type,
      email_enabled: notifPrefs[type].email,
      inapp_enabled: notifPrefs[type].inapp,

  window.submitRTW = async function() {
    const country = document.getElementById('rtwCountry').value
    const passport = document.getElementById('rtwPassport').value.trim()
    const given = document.getElementById('rtwGiven').value.trim()
    const family = document.getElementById('rtwFamily').value.trim()
    const dob = document.getElementById('rtwDob').value
    const errorEl = document.getElementById('rtwError')

    if (!country || !passport || !given || !family || !dob) {
      errorEl.textContent = 'All fields are required.'
      errorEl.style.display = 'block'
      return
    }

    const btn = document.getElementById('rtwSubmitBtn')
    btn.disabled = true
    btn.textContent = 'Checking...'
    errorEl.style.display = 'none'

    try {
      const { data: { session } } = await supabase.auth.getSession()
      const res = await fetch('https://nyvnvtxhlnjvfhcmnihh.supabase.co/functions/v1/check-work-rights', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ passport_country: country, passport_number: passport, given_name: given, family_name: family, date_of_birth: dob })
      })
      const result = await res.json()
      if (result.error) throw new Error(result.error)

      rtwRecord = result.row
      document.getElementById('rtwModal').remove()

      const statusMessages = {
        citizen_pr: 'Verified — Australian citizen/PR confirmed.',
        verified_unlimited: 'Verified — unlimited work rights confirmed.',
        verified_limited: 'Submitted — your details are under review (limited rights visa).',
        no_rights: 'Work rights could not be confirmed. Please contact support.',
        mismatch: 'Submitted — your details couldn\'t be matched automatically. An admin will review.',
        failed_technical: 'Submitted — we couldn\'t check right now. Your account is flagged for manual review.'
      }
      const isOk = result.vsure_status === 'citizen_pr' || result.vsure_status === 'verified_unlimited'
      showToast(statusMessages[result.vsure_status] || 'Check submitted.', isOk ? 'success' : 'error')
      renderPage()
    } catch (err) {
      errorEl.textContent = err.message
      errorEl.style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Submit verification'
    }
  }

  window.handleStripeConnect = async () => {
    const btn = document.querySelector('.btn-stripe')
    if (btn) { btn.disabled = true; btn.textContent = 'Connecting...' }
    try {
      const { data: { session } } = await supabase.auth.getSession()
      const res = await fetch('https://nyvnvtxhlnjvfhcmnihh.supabase.co/functions/v1/stripe-connect-onboard', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' }
      })
      const result = await res.json()
      if (result.error) throw new Error(result.error)
      if (result.already_active) {
        showToast('Your bank account is already connected and active.')
        if (btn) { btn.disabled = false; btn.textContent = 'Manage' }
        return
      }
      window.location.href = result.url
    } catch (err) {
      showToast('Could not start bank account setup: ' + err.message, 'error')
      if (btn) { btn.disabled = false; btn.textContent = 'Connect' }
    }
  }

    const lastName = document.getElementById('lastName').value.trim()

      .eq('id', currentUser.id)

    const { error: profileError } = await supabase

      .update({

        id_type: idType || null,

      showToast('Personal details saved successfully')

  async function handleIdUpload() {
    const file = document.getElementById('idFileInput').files[0]
    if (!file) return

    if (file.size > 10 * 1024 * 1024) {
      showToast('File too large. Maximum size is 10MB.', 'error')
      return
    }

    const idType = document.querySelector('input[name="idType"]:checked')?.value
    if (!idType) {
      showToast('Please select Passport or Driver\'s licence before uploading.', 'error')
      return
    }

    showToast('Uploading document...')

    const fileName = `id-documents/${currentUser.id}/${Date.now()}-${file.name.replace(/\s/g, '_')}`

    const { error: uploadError } = await supabase.storage
      .from('id-documents')
      .upload(fileName, file, { cacheControl: '3600', upsert: true })

    if (uploadError) {
      showToast('Upload failed. Please try again.', 'error')
      return
    }

    const { data: signedData } = await supabase.storage
      .from('id-documents')
      .createSignedUrl(fileName, 60 * 60 * 24 * 365 * 10) // 10 years

    const docUrl = signedData?.signedUrl || ''

    await supabase
      .from('scout_profiles')
      .update({ id_document_url: docUrl, id_type: idType, scout_status: 'PendingVerification', updated_at: new Date().toISOString() })
      .eq('user_id', currentUser.id)

    showToast('ID document uploaded. Our team will verify it within 24 hours.')
    setTimeout(() => window.location.reload(), 1500)
  }

  }

  async function handleLogout() {
    await supabase.auth.signOut()
    window.location.href = '../auth/login.html'
  }

  init().then(() => {
    const stripeParam = new URLSearchParams(window.location.search).get('stripe')
    if (stripeParam === 'connected') {
      showToast('Bank account connected successfully! You can now receive payouts.')
      window.history.replaceState({}, '', 'settings.html')
    } else if (stripeParam === 'refresh') {
      showToast('Your setup link expired. Click Connect to try again.', 'error')
      window.history.replaceState({}, '', 'settings.html')
    }
    // Scroll to anchor if arriving from the onboarding gate modal
    if (window.location.hash) {
      const target = document.querySelector(window.location.hash)
      if (target) setTimeout(() => target.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100)
    }
  })

  document.getElementById('menuToggle').addEventListener('click', () => {
    document.querySelector('.sidebar').classList.toggle('open')
    document.getElementById('sidebarOverlay').classList.toggle('open')
  })
  document.getElementById('sidebarOverlay').addEventListener('click', () => {
    document.querySelector('.sidebar').classList.remove('open')
    document.getElementById('sidebarOverlay').classList.remove('open')
  })
  document.querySelectorAll('.sidebar .nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelector('.sidebar').classList.remove('open')
      document.getElementById('sidebarOverlay').classList.remove('open')
    })
  })
</script>
</body>
</html>
